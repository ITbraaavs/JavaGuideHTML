<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Java Guide — Complete Programmer's Reference</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;500;700;800&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:#0d0f14; --bg2:#13161e; --bg3:#1a1e28; --bg4:#20253200;
  --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.13);
  --text:#e8eaf0; --muted:#6b7280;
  --accent:#f97316; --blue:#60a5fa; --green:#4ade80;
  --purple:#a78bfa; --pink:#f472b6; --teal:#2dd4bf;
  --yellow:#facc15; --red:#f87171;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;overflow-x:hidden;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--bg2);}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}

#app{display:flex;min-height:100vh;}

/* SIDEBAR */
.sidebar{width:270px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;overflow-y:auto;z-index:100;transition:transform 0.3s;}
.sb-logo{padding:22px 20px 14px;border-bottom:1px solid var(--border);}
.sb-mark{font-size:10px;letter-spacing:.2em;color:var(--accent);font-weight:700;text-transform:uppercase;margin-bottom:3px;}
.sb-title{font-size:19px;font-weight:800;line-height:1.1;}
.sb-title span{color:var(--accent);}
.sb-search{padding:12px 14px;border-bottom:1px solid var(--border);}
.sb-search input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:7px 12px;font-size:13px;color:var(--text);font-family:'Syne',sans-serif;outline:none;transition:border-color .2s;}
.sb-search input:focus{border-color:var(--accent);}
.sb-search input::placeholder{color:var(--muted);}
.sb-nav{flex:1;padding:6px 0 20px;}
.sb-section{font-size:10px;letter-spacing:.15em;color:var(--muted);text-transform:uppercase;font-weight:700;padding:14px 20px 4px;}
.sb-item{padding:8px 20px;font-size:13px;cursor:pointer;color:var(--muted);transition:all .15s;display:flex;align-items:center;gap:9px;border-left:2px solid transparent;}
.sb-item:hover{color:var(--text);background:rgba(255,255,255,0.03);}
.sb-item.active{color:var(--accent);border-left-color:var(--accent);background:rgba(249,115,22,0.06);font-weight:500;}
.sb-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.sb-cnt{margin-left:auto;font-size:11px;background:var(--bg3);padding:2px 7px;border-radius:99px;color:var(--muted);}

/* MAIN */
.main{margin-left:270px;flex:1;display:flex;flex-direction:column;min-height:100vh;}
.topbar{padding:18px 30px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg);position:sticky;top:0;z-index:50;}
.topbar-left{display:flex;align-items:center;gap:14px;}
.tb-title{font-size:20px;font-weight:800;}
.tb-meta{font-size:12px;color:var(--muted);margin-top:2px;}
.tb-right{display:flex;gap:8px;align-items:center;}
.vbtn{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:6px 14px;font-size:12px;color:var(--muted);cursor:pointer;font-family:'Syne',sans-serif;transition:all .15s;font-weight:500;}
.vbtn.active,.vbtn:hover{color:var(--accent);border-color:var(--accent);}
.menu-toggle{display:none;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:7px 11px;color:var(--text);cursor:pointer;font-size:17px;}

.content{padding:26px 30px;flex:1;}

/* STATS */
.stats{display:flex;gap:12px;margin-bottom:26px;flex-wrap:wrap;}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:11px 18px;}
.stat-v{font-size:21px;font-weight:800;}
.stat-l{font-size:11px;color:var(--muted);margin-top:1px;}

/* SECTION HEADER */
.sec-hdr{margin-bottom:16px;display:flex;align-items:flex-start;gap:12px;}
.sec-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:5px;}
.sec-name{font-size:17px;font-weight:700;}
.sec-sub{font-size:12px;color:var(--muted);margin-top:2px;}

/* CARDS */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px;margin-bottom:36px;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:border-color .2s,transform .15s;cursor:pointer;}
.card:hover{border-color:var(--border2);transform:translateY(-2px);}
.card.open{border-color:var(--accent);}
.card-top{padding:14px 16px;display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
.card-code{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;}
.card-tag{font-size:10px;padding:2px 8px;border-radius:99px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;flex-shrink:0;white-space:nowrap;}
.card-desc{padding:0 16px 12px;font-size:13px;color:var(--muted);line-height:1.6;}
.card-body{padding:0 16px 14px;display:none;}
.card.open .card-body{display:block;}
.lbl{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:5px;margin-top:10px;}
.lbl:first-child{margin-top:0;}
.codeblock{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:13px 15px;font-family:'JetBrains Mono',monospace;font-size:11.5px;line-height:1.85;color:#c9d1d9;overflow-x:auto;white-space:pre;}
.outblock{background:rgba(74,222,128,0.06);border:1px solid rgba(74,222,128,0.18);border-radius:8px;padding:9px 13px;font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--green);line-height:1.7;white-space:pre;}
.card-foot{border-top:1px solid var(--border);padding:9px 16px;display:flex;align-items:center;justify-content:space-between;}
.tog{font-size:12px;color:var(--accent);cursor:pointer;font-family:'Syne',sans-serif;font-weight:500;background:none;border:none;display:flex;align-items:center;gap:4px;}
.arr{transition:transform .2s;display:inline-block;}
.card.open .arr{transform:rotate(180deg);}

/* PROGRAMS */
.prog-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:16px;margin-bottom:36px;}
.prog-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:border-color .2s;}
.prog-card:hover{border-color:var(--border2);}
.prog-card.open{border-color:var(--accent);}
.prog-head{padding:16px 18px;cursor:pointer;}
.prog-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:6px;}
.prog-name{font-size:14px;font-weight:700;}
.prog-diff{font-size:10px;padding:2px 9px;border-radius:99px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;}
.diff-beg{background:rgba(74,222,128,0.12);color:#4ade80;}
.diff-int{background:rgba(250,204,21,0.12);color:#facc15;}
.diff-adv{background:rgba(249,115,22,0.12);color:#f97316;}
.prog-desc{font-size:12px;color:var(--muted);line-height:1.6;}
.prog-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
.prog-tag{font-size:10px;padding:2px 8px;border-radius:99px;background:var(--bg3);color:var(--muted);border:1px solid var(--border);}
.prog-body{display:none;padding:0 18px 16px;}
.prog-card.open .prog-body{display:block;}
.prog-what{font-size:12px;color:var(--muted);line-height:1.7;margin-bottom:10px;padding:10px 12px;background:var(--bg3);border-radius:8px;border-left:3px solid var(--accent);}
.copy-btn{font-size:11px;padding:5px 12px;border-radius:7px;background:var(--bg3);border:1px solid var(--border2);color:var(--muted);cursor:pointer;font-family:'Syne',sans-serif;transition:all .15s;float:right;margin-bottom:6px;}
.copy-btn:hover{color:var(--accent);border-color:var(--accent);}
.copy-btn.copied{color:var(--green);border-color:var(--green);}

/* TABLE */
.tbl-wrap{margin-bottom:36px;overflow-x:auto;}
table.ref{width:100%;border-collapse:collapse;min-width:600px;}
table.ref th{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:9px 13px;border-bottom:1px solid var(--border2);text-align:left;font-weight:600;}
table.ref td{padding:10px 13px;border-bottom:1px solid var(--border);font-size:12.5px;vertical-align:top;}
table.ref td:first-child{font-family:'JetBrains Mono',monospace;font-size:11.5px;font-weight:600;}
table.ref tr:hover td{background:rgba(255,255,255,0.02);}
table.ref tr:last-child td{border-bottom:none;}

/* NO RESULTS */
.nores{text-align:center;padding:50px 20px;color:var(--muted);font-size:14px;}

/* OVERLAY */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:99;}
.overlay.show{display:block;}

/* SYNTAX COLORS */
.kw{color:#f97316;} .str{color:#4ade80;} .cm{color:#6b7280;font-style:italic;}
.num{color:#60a5fa;} .fn{color:#a78bfa;} .cls{color:#2dd4bf;} .op{color:#f472b6;}
.ann{color:#facc15;}

@media(max-width:768px){
  .sidebar{transform:translateX(-100%);}
  .sidebar.open{transform:translateX(0);}
  .main{margin-left:0;}
  .menu-toggle{display:block;}
  .content{padding:18px 14px;}
  .topbar{padding:13px 14px;}
  .grid,.prog-grid{grid-template-columns:1fr;}
  .stats{gap:8px;}
  .overlay.show{display:block;}
}
</style>
</head>
<body>
<div id="app">

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
  <div class="sb-logo">
    <div class="sb-mark">&#9650; Programmer's Guide</div>
    <div class="sb-title">Java<span>Guide</span></div>
  </div>
  <div class="sb-search">
    <input type="text" id="srch" placeholder="Search anything..." oninput="doSearch()"/>
  </div>
  <nav class="sb-nav" id="sbNav"></nav>
</aside>

<div class="overlay" id="overlay" onclick="closeSB()"></div>

<!-- MAIN -->
<main class="main">
  <div class="topbar">
    <div class="topbar-left">
      <button class="menu-toggle" onclick="openSB()">&#9776;</button>
      <div>
        <div class="tb-title" id="tbTitle">Welcome</div>
        <div class="tb-meta" id="tbMeta"></div>
      </div>
    </div>
    <div class="tb-right">
      <button class="vbtn active" id="btnRef" onclick="setMode('ref')">&#9632; Reference</button>
      <button class="vbtn" id="btnProg" onclick="setMode('prog')">&#10095; Programs</button>
      <button class="vbtn" id="btnTbl" onclick="setMode('tbl')">&#9776; Table</button>
    </div>
  </div>

  <div class="content">
    <div class="stats" id="statsBar"></div>
    <div id="refView"></div>
    <div id="progView" style="display:none"></div>
    <div id="tblView" style="display:none"></div>
  </div>
</main>
</div>

<script>
/* ===== DATA ===== */
const REF = [
  { id:"imports", name:"Imports & Packages", color:"#c084fc", tBg:"rgba(192,132,252,0.12)", tC:"#c084fc", items:[
    {code:"import",       desc:"Imports a specific class from a package.",
     syn:`<span class="kw">import</span> java.util.<span class="cls">Scanner</span>;\n<span class="kw">import</span> java.util.<span class="cls">ArrayList</span>;\n\n<span class="kw">public class</span> <span class="cls">Main</span> {\n    <span class="kw">public static void</span> <span class="fn">main</span>(<span class="cls">String</span>[] args) {\n        <span class="cls">Scanner</span> sc = <span class="kw">new</span> <span class="cls">Scanner</span>(<span class="cls">System</span>.in);\n        <span class="cls">ArrayList</span>&lt;<span class="cls">String</span>&gt; list = <span class="kw">new</span> <span class="cls">ArrayList</span>&lt;&gt;();\n        <span class="cls">System</span>.<span class="fn">out</span>.<span class="fn">println</span>(<span class="str">"Imported!"</span>);\n    }\n}`, out:"Imported!"},
    {code:"import wildcard (*)",desc:"Imports all classes from a package at once.",
     syn:`<span class="kw">import</span> java.util.*;   <span class="cm">// imports ALL classes in java.util</span>\n\n<span class="kw">public class</span> <span class="cls">Main</span> {\n    <span class="kw">public static void</span> <span class="fn">main</span>(<span class="cls">String</span>[] args) {\n        <span class="cls">ArrayList</span>&lt;<span class="cls">String</span>&gt; a = <span class="kw">new</span> <span class="cls">ArrayList</span>&lt;&gt;();\n        <span class="cls">HashMap</span>&lt;<span class="cls">String</span>,<span class="cls">Integer</span>&gt; m = <span class="kw">new</span> <span class="cls">HashMap</span>&lt;&gt;();\n        <span class="cls">System</span>.<span class="fn">out</span>.<span class="fn">println</span>(<span class="str">"All util imported"</span>);\n    }\n}`, out:"All util imported"},
    {code:"import static", desc:"Imports static members so you can use them without class name.",
     syn:`<span class="kw">import static</span> java.lang.<span class="cls">Math</span>.PI;\n<span class="kw">import static</span> java.lang.<span class="cls">Math</span>.sqrt;\n<span class="kw">import static</span> java.lang.<span class="cls">Math</span>.pow;\n\n<span class="kw">public class</span> <span class="cls">Main</span> {\n    <span class="kw">public static void</span> <span class="fn">main</span>(<span class="cls">String</span>[] args) {\n        <span class="cls">System</span>.<span class="fn">out</span>.<span class="fn">println</span>(PI);          <span class="cm">// no Math. needed</span>\n        <span class="cls">System</span>.<span class="fn">out</span>.<span class="fn">println</span>(<span class="fn">sqrt</span>(<span class="num">144</span>));  <span class="cm">// no Math. needed</span>\n        <span class="cls">System</span>.<span class="fn">out</span>.<span class="fn">println</span>(<span class="fn">pow</span>(<span class="num">2</span>,<span class="num">10</span>));  <span class="cm">// no Math. needed</span>\n    }\n}`, out:"3.141592653589793\n12.0\n1024.0"},
    {code:"package",      desc:"Declares which package this class belongs to.",
     syn:`<span class="kw">package</span> com.myapp.models;  <span class="cm">// must be FIRST line</span>\n\n<span class="kw">public class</span> <span class="cls">User</span> {\n    <span class="cls">String</span> name;\n    <span class="cls">User</span>(<span class="cls">String</span> name) { <span class="kw">this</span>.name = name; }\n}\n<span class="cm">// File must be at: com/myapp/models/User.java</span>`, out:"(organizes classes into folders)"},
    {code:"java.util.*",  desc:"Collections, Scanner, Date, Random, etc.",
     syn:`<span class="kw">import</span> java.util.<span class="cls">Scanner</span>;     <span class="cm">// user input</span>\n<span class="kw">import</span> java.util.<span class="cls">ArrayList</span>;   <span class="cm">// dynamic list</span>\n<span class="kw">import</span> java.util.<span class="cls">HashMap</span>;     <span class="cm">// key-value map</span>\n<span class="kw">import</span> java.util.<span class="cls">Arrays</span>;      <span class="cm">// array utilities</span>\n<span class="kw">import</span> java.util.<span class="cls">Collections</span>; <span class="cm">// sort, reverse, etc.</span>\n<span class="kw">import</span> java.util.<span class="cls">Random</span>;      <span class="cm">// random numbers</span>\n<span class="kw">import</span> java.util.<span class="cls">Date</span>;        <span class="cm">// date/time</span>`, out:"(commonly used imports)"},
    {code:"java.io.*",    desc:"File reading/writing — FileWriter, BufferedReader, etc.",
     syn:`<span class="kw">import</span> java.io.<span class="cls">File</span>;             <span class="cm">// file reference</span>\n<span class="kw">import</span> java.io.<span class="cls">FileWriter</span>;       <span class="cm">// write to file</span>\n<span class="kw">import</span> java.io.<span class="cls">FileReader</span>;       <span class="cm">// read from file</span>\n<span class="kw">import</span> java.io.<span class="cls">BufferedReader</span>;   <span class="cm">// efficient reading</span>\n<span class="kw">import</span> java.io.<span class="cls">BufferedWriter</span>;   <span class="cm">// efficient writing</span>\n<span class="kw">import</span> java.io.<span class="cls">IOException</span>;     <span class="cm">// file error handling</span>`, out:"(file I/O imports)"},
    {code:"java.lang.*",  desc:"Auto-imported. String, Math, System, Integer, etc.",
     syn:`<span class="cm">// java.lang is ALWAYS imported automatically</span>\n<span class="cm">// You never need to write: import java.lang.*;</span>\n\n<span class="cm">// These are all from java.lang:</span>\n<span class="cls">String</span> s = <span class="str">"auto"</span>;\n<span class="kw">int</span> n = <span class="cls">Integer</span>.<span class="fn">parseInt</span>(<span class="str">"42"</span>);\n<span class="kw">double</span> r = <span class="cls">Math</span>.<span class="fn">sqrt</span>(<span class="num">16</span>);\n<span class="cls">System</span>.<span class="fn">out</span>.<span class="fn">println</span>(s + <span class="str">" "</span> + n + <span class="str">" "</span> + r);`, out:"auto 42 4.0"},
    {code:"java.time.*",  desc:"Modern date/time API (Java 8+).",
     syn:`<span class="kw">import</span> java.time.<span class="cls">LocalDate</span>;\n<span class="kw">import</span> java.time.<span class="cls">LocalTime</span>;\n<span class="kw">import</span> java.time.<span class="cls">LocalDateTime</span>;\n<span class="kw">import</span> java.time.format.<span class="cls">DateTimeFormatter</span>;\n\n<span class="cls">LocalDate</span> today = <span class="cls">LocalDate</span>.<span class="fn">now</span>();\n<span class="cls">LocalTime</span> now = <span class="cls">LocalTime</span>.<span class="fn">now</span>();\n<span class="cls">System</span>.<span class="fn">out</span>.<span class="fn">println</span>(<span class="str">"Date: "</span> + today);\n<span class="cls">System</span>.<span class="fn">out</span>.<span class="fn">println</span>(<span class="str">"Time: "</span> + now);`, out:"Date: 2026-03-25\nTime: 15:47:30.123"},
  ]},
  { id:"types", name:"Data types & variables", color:"#a78bfa", tBg:"rgba(167,139,250,0.13)", tC:"#a78bfa", items:[
    {code:"int",         desc:"Whole number (-2B to 2B).",
     syn:`<span class="kw">int</span> age = <span class="num">25</span>;\n<span class="kw">int</span> score = <span class="num">100</span>;\n<span class="kw">int</span> sum = age + score;\n<span class="cls">System</span>.<span class="fn">out</span>.<span class="fn">println</span>(sum);`, out:"125"},
    {code:"double",      desc:"Decimal number (64-bit precision).",
     syn:`<span class="kw">double</span> price = <span class="num">9.99</span>;\n<span class="kw">double</span> tax = price * <span class="num">0.12</span>;\n<span class="cls">System</span>.<span class="fn">out</span>.<span class="fn">println</span>(price + tax);`, out:"11.1888"},
    {code:"float",       desc:"Decimal number (32-bit). Append f.",
     syn:`<span class="kw">float</span> temp = <span class="num">36.6f</span>;\n<span class="cls">System</span>.<span class="fn">out</span>.<span class="fn">println</span>(temp);`, out:"36.6"},
    {code:"long",        desc:"Large whole number. Append L.",
     syn:`<span class="kw">long</span> population = <span class="num">8000000000L</span>;\n<span class="cls">System</span>.<span class="fn">out</span>.<span class="fn">println</span>(population);`, out:"8000000000"},
    {code:"boolean",     desc:"True or false only.",
     syn:`<span class="kw">boolean</span> isActive = <span class="kw">true</span>;\n<span class="kw">boolean</span> isAdmin = <span class="kw">false</span>;\n<span class="cls">System</span>.<span class="fn">out</span>.<span class="fn">println</span>(isActive && !isAdmin);`, out:"true"},
    {code:"char",        desc:"Single character. Use single quotes.",
     syn:`<span class="kw">char</span> grade = <span class="str">'A'</span>;\n<span class="kw">char</span> symbol = <span class="str">'@'</span>;\n<span class="cls">System</span>.<span class="fn">out</span>.<span class="fn">println</span>(grade);`, out:"A"},
    {code:"String",      desc:"Text sequence. Use double quotes.",
     syn:`<span class="cls">String</span> first = <span class="str">"Maria"</span>;\n<span class="cls">String</span> last = <span class="str">"Cruz"</span>;\n<span class="cls">String</span> full = first + <span class="str">" "</span> + last;\n<span class="cls">System</span>.<span class="fn">out</span>.<span class="fn">println</span>(full);`, out:"Maria Cruz"},
    {code:"var",         desc:"Type inferred automatically (Java 10+).",
     syn:`<span class="kw">var</span> count = <span class="num">10</span>;       <span class="cm">// int</span>\n<span class="kw">var</span> name = <span class="str">"Java"</span>;   <span class="cm">// String</span>\n<span class="kw">var</span> pi = <span class="num">3.14</span>;       <span class="cm">// double</span>\n<span class="cls">System</span>.<span class="fn">out</span>.<span class="fn">println</span>(name + <span class="str">" v"</span> + count);`, out:"Java v10"},
  ]},
  { id:"ops", name:"Operators", color:"#e879f9", tBg:"rgba(232,121,249,0.12)", tC:"#e879f9", items:[
    {code:"Arithmetic (+, -, *, /, %)",desc:"Basic math operations.",
     syn:`<span class="kw">int</span> a = <span class="num">17</span>, b = <span class="num">5</span>;\n<span class="cls">System</span>.<span class="fn">out</span>.<span class="fn">println</span>(a + b);   <span class="cm">// 22</span>\n<span class="cls">System</span>.<span class="fn">out</span>.<span class="fn">println</span>(a - b);   <span class="cm">// 12</span>\n<span class="cls">System</span>.<span class="fn">out</span>.<span class="fn">println</span>(a * b);   <span class="cm">// 85</span>\n<span class="cls">System</span>.<span class="fn">out</span>.<span class="fn">println</span>(a / b);   <span class="cm">// 3 (int division)</span>\n<span class="cls">System</span>.<span class="fn">out</span>.<span class="fn">println</span>(a % b);   <span class="cm">// 2 (remainder)</span>`, out:"22\n12\n85\n3\n2"},
    {code:"Comparison (==, !=, <, >, <=, >=)",desc:"Compares two values, returns boolean.",

    {code:"Assignment (=, +=, -=, *=, /=)",desc:"Assigns and updates values.",

  { id:"flow", name:"Control flow", color:"#4ade80", tBg:"rgba(74,222,128,0.12)", tC:"#4ade80", items:[

  { id:"prog-int", name:"Intermediate programs", color:"#facc15", items:[
    { name:"Student grade manager", diff:"int", desc:"Stores students and their grades in a HashMap.", tags:["HashMap","OOP","collections"],
      what:"A real-world-style program using classes, HashMap and ArrayList to manage student records.",
      code:`import java.util.*;

public class GradeManager {
    static HashMap<String, ArrayList<Integer>> students = new HashMap<>();

    static void addGrade(String name, int grade) {
        students.putIfAbsent(name, new ArrayList<>());
        students.get(name).add(grade);
    }

    static double average(ArrayList<Integer> grades) {
        int sum = 0;
        for (int g : grades) sum += g;
        return (double) sum / grades.size();
    }

    public static void main(String[] args) {
        addGrade("Alice", 95); addGrade("Alice", 88); addGrade("Alice", 92);
        addGrade("Bob",   78); addGrade("Bob",   82); addGrade("Bob",   75);
        addGrade("Maria", 99); addGrade("Maria", 97); addGrade("Maria", 100);

        System.out.println("=== Grade Report ===");
        for (var entry : students.entrySet()) {
            String name = entry.getKey();
            double avg = average(entry.getValue());
            String letter = avg >= 90 ? "A" : avg >= 80 ? "B" : "C";
            System.out.printf("%-8s Avg: %.1f  Grade: %s%n", name, avg, letter);
        }
    }
}`,      out:"=== Grade Report ===\nAlice    Avg: 91.7  Grade: A\nBob      Avg: 78.3  Grade: C\nMaria    Avg: 98.7  Grade: A"},
    { name:"Bank account system", diff:"int", desc:"Simulates deposit, withdrawal and balance.", tags:["OOP","class","encapsulation"],
      what:"Demonstrates encapsulation — private fields with public getter/setter methods to protect data.",
      code:`public class BankAccount {
    private String owner;
    private double balance;

    public BankAccount(String owner, double initialBalance) {
        this.owner = owner;
        this.balance = initialBalance;
    }

    public void deposit(double amount) {
        if (amount <= 0) { System.out.println("Invalid amount."); return; }
        balance += amount;
        System.out.printf("Deposited: $%.2f | New balance: $%.2f%n", amount, balance);
    }

    public void withdraw(double amount) {
        if (amount > balance) { System.out.println("Insufficient funds."); return; }
        balance -= amount;
        System.out.printf("Withdrawn: $%.2f | New balance: $%.2f%n", amount, balance);
    }

    public void showBalance() {
        System.out.printf("[%s] Balance: $%.2f%n", owner, balance);
    }

    public static void main(String[] args) {
        BankAccount acc = new BankAccount("Maria", 1000.00);
        acc.showBalance();
        acc.deposit(500);
        acc.withdraw(200);
        acc.withdraw(2000);
        acc.showBalance();

      code:`import java.util.Arrays;

public class BubbleSort {
    static void bubbleSort(int[] arr) {
        int n = arr.length;
        for (int i = 0; i < n - 1; i++) {
            for (int j = 0; j < n - i - 1; j++) {
                if (arr[j] > arr[j + 1]) {
                    // Swap
                    int temp = arr[j];
                    arr[j] = arr[j + 1];
                    arr[j + 1] = temp;
                }
            }
        }
    }

    public static void main(String[] args) {
        int[] nums = {64, 34, 25, 12, 22, 11, 90};
        System.out.println("Before: " + Arrays.toString(nums));
        bubbleSort(nums);
        System.out.println("After:  " + Arrays.toString(nums));
    }
}`,      out:"Before: [64, 34, 25, 12, 22, 11, 90]\nAfter:  [11, 12, 22, 25, 34, 64, 90]"},

        T data;
        Node next;
        Node(T data) { this.data = data; }
    }

    private int size;

    public void addFirst(T value) {
        Node n = new Node(value);
        n.next = head;
        head = n;
        size++;
    }

    public void addLast(T value) {
        Node n = new Node(value);

        cur.next = n;
        size++;

    }

    { name:"Generic stack",            diff:"adv", desc:"A type-safe stack using Java generics.", tags:["generics","OOP","data structures"],
      what:"Uses Java generics <T> so the same Stack class can hold integers, strings, or any object.",
      code:`public class GenericStack<T> {
    private Object[] data;
    private int top = -1;
    private int capacity;

    public GenericStack(int capacity) {
        this.capacity = capacity;
        data = new Object[capacity];
    }

    public void push(T item) {
        if (top == capacity - 1) { System.out.println("Stack full!"); return; }
        data[++top] = item;
    }

    @SuppressWarnings("unchecked")
    public T pop() {
        if (top == -1) throw new RuntimeException("Stack empty!");
        return (T) data[top--];
    }

    @SuppressWarnings("unchecked")
    public T peek() { return (T) data[top]; }

    public boolean isEmpty() { return top == -1; }
    public int size() { return top + 1; }

    public static void main(String[] args) {
        GenericStack<String> s = new GenericStack<>(5);
        s.push("Java"); s.push("Python"); s.push("C++");
        System.out.println("Size: " + s.size());
        System.out.println("Peek: " + s.peek());
        System.out.println("Pop:  " + s.pop());
        System.out.println("Pop:  " + s.pop());
        System.out.println("Size: " + s.size());

    { name:"Binary search algorithm",   diff:"adv", desc:"Efficiently searches a sorted array in O(log n).", tags:["algorithms","arrays","recursion"],
      what:"Binary search halves the search space every step, making it far faster than linear search for large arrays.",
      code:`public class BinarySearch {
    // Iterative version
    static int searchIterative(int[] arr, int target) {
        int left = 0, right = arr.length - 1;
        while (left <= right) {
            int mid = left + (right - left) / 2;
            if (arr[mid] == target) return mid;
            if (arr[mid] < target)  left  = mid + 1;
            else                    right = mid - 1;
        }
        return -1;
    }

    // Recursive version
    static int searchRecursive(int[] arr, int target, int left, int right) {
        if (left > right) return -1;
        int mid = left + (right - left) / 2;
        if (arr[mid] == target) return mid;
        if (arr[mid] < target)  return searchRecursive(arr, target, mid+1, right);
        return searchRecursive(arr, target, left, mid-1);
    }

    public static void main(String[] args) {
        int[] arr = {2, 5, 8, 12, 16, 23, 38, 45, 56, 72, 91};
        System.out.println("Array: sorted, 11 elements");

        int idx = searchIterative(arr, 23);
        System.out.println("Search 23 (iterative): index " + idx);

        idx = searchRecursive(arr, 56, 0, arr.length-1);
        System.out.println("Search 56 (recursive): index " + idx);

        idx = searchIterative(arr, 99);
        System.out.println("Search 99: " + (idx == -1 ? "not found" : "index " + idx));
    }
}`,      out:"Array: sorted, 11 elements\nSearch 23 (iterative): index 5\nSearch 56 (recursive): index 8\nSearch 99: not found"},

/* ===== STATE ===== */
let mode = "ref";
let activeId = "all";
let srchQ = "";
const openCards = new Set();

/* ===== SIDEBAR BUILD ===== */
function buildSB() {
  let h = `<div class="sb-section">Reference</div>
    <div class="sb-item ${activeId==='all'?'active':''}" onclick="go('all')">
      <span class="sb-dot" style="background:#f97316"></span>All codes
      <span class="sb-cnt">${REF.reduce((a,g)=>a+g.items.length,0)}</span>
    </div>`;
  for (const g of REF)
    h += `<div class="sb-item ${activeId===g.id?'active':''}" onclick="go('${g.id}')">
      <span class="sb-dot" style="background:${g.color}"></span>${g.name}
      <span class="sb-cnt">${g.items.length}</span>
    </div>`;
  h += `<div class="sb-section" style="margin-top:4px">Programs</div>`;
  for (const p of PROG)
    h += `<div class="sb-item ${activeId===p.id?'active':''}" onclick="go('${p.id}')">
      <span class="sb-dot" style="background:${p.color}"></span>${p.name}
      <span class="sb-cnt">${p.items.length}</span>
    </div>`;
  document.getElementById("sbNav").innerHTML = h;
}

function go(id) {
  activeId = id;
  // auto switch mode
  if (id.startsWith("prog-")) mode = "prog";
  else if (mode === "prog") mode = "ref";
  buildSB();
  render();
  if (window.innerWidth <= 768) closeSB();
}

function setMode(m) {
  mode = m;
  ["btnRef","btnProg","btnTbl"].forEach(b => document.getElementById(b).classList.remove("active"));
  document.getElementById(m === "ref" ? "btnRef" : m === "prog" ? "btnProg" : "btnTbl").classList.add("active");
  render();
}

function doSearch() {
  srchQ = document.getElementById("srch").value.toLowerCase();
  render();
}

function toggleCard(uid) {
  openCards.has(uid) ? openCards.delete(uid) : openCards.add(uid);
  render();
}

function copyCode(uid, code) {
  navigator.clipboard.writeText(code).then(() => {
    const btn = document.getElementById("cpbtn-"+uid);
    if (!btn) return;
    btn.textContent = "Copied!";
    btn.classList.add("copied");
    setTimeout(() => { btn.textContent = "Copy"; btn.classList.remove("copied"); }, 1500);
  });
}

/* ===== RENDER ===== */
function getRefFiltered() {
  return REF.map(g => {
    if (activeId !== "all" && activeId === g.id || activeId === "all" || (!activeId.startsWith("prog-") && activeId === g.id)) {
      if (activeId !== "all" && g.id !== activeId) return {...g, items:[]};
      return {...g, items: g.items.filter(i =>
        i.code.toLowerCase().includes(srchQ) || i.desc.toLowerCase().includes(srchQ))};
    }
    return {...g, items:[]};
  }).filter(g => g.items.length);
}

function getProgFiltered() {
  return PROG.map(g => {
    const pid = g.id;
    if (activeId !== "all" && !activeId.startsWith("prog-") && pid !== activeId) return {...g, items:[]};
    if (activeId.startsWith("prog-") && pid !== activeId) return {...g, items:[]};
    return {...g, items: g.items.filter(i =>
      i.name.toLowerCase().includes(srchQ) ||
      i.desc.toLowerCase().includes(srchQ) ||
      i.tags.some(t => t.toLowerCase().includes(srchQ)))};
  }).filter(g => g.items.length);
}

function render() {
  const rv = document.getElementById("refView");
  const pv = document.getElementById("progView");
  const tv = document.getElementById("tblView");
  rv.style.display = pv.style.display = tv.style.display = "none";

  const refF = getRefFiltered();
  const progF = getProgFiltered();
  const refTotal = refF.reduce((a,g)=>a+g.items.length,0);
  const progTotal = progF.reduce((a,g)=>a+g.items.length,0);
  const total = mode === "prog" ? progTotal : refTotal;

  // Stats
  document.getElementById("statsBar").innerHTML = `
    <div class="stat"><div class="stat-v" style="color:var(--accent)">${REF.length}</div><div class="stat-l">Reference groups</div></div>
    <div class="stat"><div class="stat-v" style="color:var(--blue)">${REF.reduce((a,g)=>a+g.items.length,0)}</div><div class="stat-l">Total codes</div></div>
    <div class="stat"><div class="stat-v" style="color:var(--green)">${PROG.reduce((a,g)=>a+g.items.length,0)}</div><div class="stat-l">Programs</div></div>
    <div class="stat"><div class="stat-v" style="color:var(--yellow)">${total}</div><div class="stat-l">Showing</div></div>`;

  // Title
  const grp = [...REF,...PROG].find(g=>g.id===activeId);
  document.getElementById("tbTitle").innerHTML = activeId==="all"
    ? `All <span style="color:var(--accent)">Codes</span>`
    : `<span style="color:${grp?.color||'var(--accent)'}">${grp?.name||''}</span>`;
  document.getElementById("tbMeta").textContent = `${total} item${total!==1?'s':''} found`;

  // Buttons
  document.getElementById("btnRef").classList.toggle("active", mode==="ref");
  document.getElementById("btnProg").classList.toggle("active", mode==="prog");
  document.getElementById("btnTbl").classList.toggle("active", mode==="tbl");

  if (mode === "ref") { rv.style.display = "block"; renderRef(rv, refF); }
  else if (mode === "prog") { pv.style.display = "block"; renderProg(pv, progF); }
  else { tv.style.display = "block"; renderTbl(tv, refF); }
}

      const uid = g.id+"_"+p.name.replace(/\s+/g,"_");
      const isOpen = openCards.has(uid);
      const diffClass = p.diff==="beg"?"diff-beg":p.diff==="int"?"diff-int":"diff-adv";
      const diffLabel = p.diff==="beg"?"Beginner":p.diff==="int"?"Intermediate":"Advanced";
      const escaped = p.code.replace(/`/g,"\\`");
      h += `<div class="prog-card ${isOpen?'open':''}">
        <div class="prog-head" onclick="toggleCard('${uid}')">
          <div class="prog-top">
            <div class="prog-name">${p.name}</div>
            <span class="prog-diff ${diffClass}">${diffLabel}</span>
          </div>
          <div class="prog-desc">${p.desc}</div>
          <div class="prog-tags">${p.tags.map(t=>`<span class="prog-tag">${t}</span>`).join("")}</div>
        </div>
        <div class="prog-body">
          <div class="prog-what">${p.what}</div>
          <button class="copy-btn" id="cpbtn-${uid}" onclick="copyCode('${uid}',\`${escaped}\`)">Copy</button>
          <div class="lbl">Complete program</div>
          <div class="codeblock">${p.code.replace(/</g,"&lt;").replace(/>/g,"&gt;")}</div>
          <div class="lbl" style="margin-top:10px">Expected output</div>
          <div class="outblock">${p.out}</div>
        </div>
      </div>`;
    }
    h += `</div></div>`;
  }
  el.innerHTML = h;
}

function renderTbl(el, filtered) {
  if (!filtered.length) { el.innerHTML = `<div class="nores">No codes found for "${srchQ}"</div>`; return; }
  let h = "";
  for (const g of filtered) {
    h += `<div style="margin-bottom:32px">
      <div class="sec-hdr">
        <span class="sec-dot" style="background:${g.color}"></span>
        <div><div class="sec-name">${g.name}</div></div>
      </div>
      <div class="tbl-wrap"><table class="ref">
        <thead><tr><th>Code</th><th>Function</th><th>Output</th></tr></thead>
        <tbody>`;
    for (const item of g.items) {
      h += `<tr>
        <td style="color:${g.color}">${item.code}</td>
        <td style="color:var(--muted)">${item.desc}</td>
        <td style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--green)">${item.out.split('\n')[0]}</td>
      </tr>`;
    }
    h += `</tbody></table></div></div>`;
  }
  el.innerHTML = h;
}

function openSB()  { document.getElementById("sidebar").classList.add("open"); document.getElementById("overlay").classList.add("show"); }
function closeSB() { document.getElementById("sidebar").classList.remove("open"); document.getElementById("overlay").classList.remove("show"); }

buildSB();
render();
</script>
</body>
</html>
