        syn: `&lt;<span class="cls">!DOCTYPE html</span>&gt;\n&lt;<span class="cls">html</span>&gt;\n&lt;<span class="cls">head</span>&gt;\n  &lt;<span class="cls">script</span> <span class="ann">src</span>=<span class="str">"https://unpkg.com/react@18/umd/react.development.js"</span>&gt;&lt;/<span class="cls">script</span>&gt;\n  &lt;<span class="cls">script</span> <span class="ann">src</span>=<span class="str">"https://unpkg.com/react-dom@18/umd/react-dom.development.js"</span>&gt;&lt;/<span class="cls">script</span>&gt;\n  &lt;<span class="cls">script</span> <span class="ann">src</span>=<span class="str">"https://unpkg.com/@babel/standalone/babel.min.js"</span>&gt;&lt;/<span class="cls">script</span>&gt;\n&lt;/<span class="cls">head</span>&gt;\n&lt;<span class="cls">body</span>&gt;\n  &lt;<span class="cls">div</span> <span class="ann">id</span>=<span class="str">"root"</span>&gt;&lt;/<span class="cls">div</span>&gt;\n  &lt;<span class="cls">script</span> <span class="ann">type</span>=<span class="str">"text/babel"</span>&gt;\n    <span class="kw">function</span> <span class="cls">App</span>() {\n      <span class="kw">return</span> &lt;<span class="cls">h1</span>&gt;Hello from React!&lt;/<span class="cls">h1</span>&gt;;\n    }\n    ReactDOM.<span class="fn">createRoot</span>(document.<span class="fn">getElementById</span>(<span class="str">"root"</span>)).<span class="fn">render</span>(&lt;<span class="cls">App</span> /&gt;);\n  &lt;/<span class="cls">script</span>&gt;\n&lt;/<span class="cls">body</span>&gt;\n&lt;/<span class="cls">html</span>&gt;`,
        out: "// Page shows: Hello from React!" },
      { code: "Vite project structure",
        desc: "After npm create vite, you get a standard folder layout. index.html is the single entry point. main.jsx mounts your App component into the #root div. All your components go in src/.",
        syn: `<span class="cm">my-app/</span>\n<span class="cm">├── index.html        ← entry HTML, has &lt;div id="root"&gt;</span>\n<span class="cm">├── src/</span>\n<span class="cm">│   ├── main.jsx      ← mounts App into #root</span>\n<span class="cm">│   ├── App.jsx       ← root component (start editing here)</span>\n<span class="cm">│   └── App.css       ← styles for App</span>\n<span class="cm">├── public/           ← static assets (images, fonts)</span>\n<span class="cm">├── package.json      ← dependencies & scripts</span>\n<span class="cm">└── vite.config.js    ← Vite configuration</span>`,
        out: "// Edit src/App.jsx to build your UI" },
      { code: "How React connects to HTML",
        desc: "React renders into a single <div id='root'> in index.html. main.jsx uses ReactDOM.createRoot() to take control of that div and render your component tree into it. React manages all DOM updates from that point.",
        syn: `<span class="cm">&lt;!-- index.html — React targets this div --&gt;</span>\n&lt;<span class="cls">div</span> <span class="ann">id</span>=<span class="str">"root"</span>&gt;&lt;/<span class="cls">div</span>&gt;\n\n<span class="cm">// main.jsx — connects React to the DOM</span>\n<span class="kw">import</span> { <span class="cls">StrictMode</span> } <span class="kw">from</span> <span class="str">"react"</span>;\n<span class="kw">import</span> { <span class="fn">createRoot</span> } <span class="kw">from</span> <span class="str">"react-dom/client"</span>;\n<span class="kw">import</span> <span class="cls">App</span> <span class="kw">from</span> <span class="str">"./App.jsx"</span>;\n\n<span class="fn">createRoot</span>(document.<span class="fn">getElementById</span>(<span class="str">"root"</span>)).<span class="fn">render</span>(\n  &lt;<span class="cls">StrictMode</span>&gt;\n    &lt;<span class="cls">App</span> /&gt;\n  &lt;/<span class="cls">StrictMode</span>&gt;\n);`,
        out: "// React now owns #root — all DOM updates go through React" },
    ]
  },
  {
    id: "react-setup", name: "Quick Install Guide", color: "#a78bfa",
    tBg: "rgba(167,139,250,0.12)", tC: "#a78bfa",
    items: [
      { code: "Step 1 — Install Node.js 18+",
        desc: "React requires Node.js to run its build tools and dev server. Install Node 18 or higher (LTS). npm comes bundled with Node — you'll use it to install React and all packages.",
        syn: `<span class="cm">## macOS / Linux — nvm recommended</span>\ncurl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.7/install.sh | bash\nnvm install 20\nnvm use 20\n\n<span class="cm">## Windows — nvm-windows</span>\n<span class="cm">## https://github.com/coreybutler/nvm-windows</span>\nnvm install lts\n\n<span class="cm">## Or download directly: https://nodejs.org (LTS)</span>\n\nnode --version   <span class="cm"># must be v18+ for React</span>\nnpm --version`,
        out: "v20.x.x" },
      { code: "Step 2 — Create React app with Vite",
        desc: "Vite is the modern standard for React projects. It starts in seconds, supports hot-reload, and builds fast. One command does everything.",
        syn: `<span class="cm">## Create a new React project</span>\nnpm create vite@latest my-app -- --template react\n\n<span class="cm">## Go into the project</span>\ncd my-app\n\n<span class="cm">## Install all dependencies</span>\nnpm install\n\n<span class="cm">## Start the dev server</span>\nnpm run dev\n<span class="cm">## → open http://localhost:5173</span>\n\n<span class="cm">## Build for production when ready</span>\nnpm run build`,
        out: "// http://localhost:5173 — edit App.jsx to start" },
      { code: "Step 3 — VS Code extensions for React",
        desc: "These extensions make React development much smoother — JSX snippets, instant error feedback, and automatic import completion.",
        syn: `<span class="cm">// Install in VS Code (Ctrl+Shift+X)</span>\n\n<span class="cm">// ES7+ React/Redux/GraphQL Snippets</span>\n<span class="cm">// → type "rafce" → generates full component skeleton</span>\n\n<span class="cm">// Prettier — Code Formatter</span>\n<span class="cm">// → auto-formats JSX/JS on save</span>\n\n<span class="cm">// ESLint</span>\n<span class="cm">// → underlines errors & bad patterns in real time</span>\n\n<span class="cm">// Auto Import — ES6, TS, JSX</span>\n<span class="cm">// → automatically adds import statements</span>\n\n<span class="cm">// vscode-styled-components (if using styled-components)</span>`,
        out: "// Tip: type 'rafce' in a .jsx file for instant component" },
      { code: "Step 4 — Install React DevTools",
        desc: "React DevTools is a browser extension that lets you inspect your component tree, view props and state live, and profile performance. Essential for debugging.",
        syn: `<span class="cm">// Chrome: search "React Developer Tools" in Chrome Web Store</span>\n<span class="cm">// Firefox: search in Firefox Add-ons</span>\n\n<span class="cm">// After installing:</span>\n<span class="cm">// F12 → new "Components" tab   → inspect component tree</span>\n<span class="cm">// F12 → new "Profiler" tab     → find performance issues</span>\n\n<span class="cm">// You can see:</span>\n<span class="cm">// • Every component in your app</span>\n<span class="cm">// • The props each component receives</span>\n<span class="cm">// • State values (useState hooks)</span>\n<span class="cm">// • Which components re-render on state change</span>`,
        out: "// React DevTools = your best debugging companion" },
      { code: "Minimal React starter (copy-paste ready)",
        desc: "The smallest possible React app. Paste this into a plain .html file — no Node.js, no install. Works directly in the browser using CDN scripts.",
        syn: `&lt;<span class="cls">!DOCTYPE html</span>&gt;&lt;<span class="cls">html</span>&gt;&lt;<span class="cls">body</span>&gt;\n  &lt;<span class="cls">div</span> <span class="ann">id</span>=<span class="str">"root"</span>&gt;&lt;/<span class="cls">div</span>&gt;\n  &lt;<span class="cls">script</span> <span class="ann">src</span>=<span class="str">"https://unpkg.com/react@18/umd/react.development.js"</span>&gt;&lt;/<span class="cls">script</span>&gt;\n  &lt;<span class="cls">script</span> <span class="ann">src</span>=<span class="str">"https://unpkg.com/react-dom@18/umd/react-dom.development.js"</span>&gt;&lt;/<span class="cls">script</span>&gt;\n  &lt;<span class="cls">script</span> <span class="ann">src</span>=<span class="str">"https://unpkg.com/@babel/standalone/babel.min.js"</span>&gt;&lt;/<span class="cls">script</span>&gt;\n  &lt;<span class="cls">script</span> <span class="ann">type</span>=<span class="str">"text/babel"</span>&gt;\n    <span class="kw">function</span> <span class="cls">App</span>() {\n      <span class="kw">const</span> [count, setCount] = React.<span class="fn">useState</span>(<span class="num">0</span>);\n      <span class="kw">return</span> &lt;<span class="cls">button</span> <span class="ann">onClick</span>={() => <span class="fn">setCount</span>(count + <span class="num">1</span>)}&gt;Clicks: {count}&lt;/<span class="cls">button</span>&gt;;\n    }\n    ReactDOM.<span class="fn">createRoot</span>(document.<span class="fn">getElementById</span>(<span class="str">"root"</span>)).<span class="fn">render</span>(&lt;<span class="cls">App</span>/&gt;);\n  &lt;/<span class="cls">script</span>&gt;\n&lt;/<span class="cls">body</span>&gt;&lt;/<span class="cls">html</span>&gt;`,
        out: "// Save as .html, open in browser — fully working React!" },
    ]
  },
  {
    id: "react-tips", name: "Do's & Don'ts", color: "#4ade80",
    tBg: "rgba(74,222,128,0.12)", tC: "#4ade80",
    items: [
      { code: "Never mutate state directly",
        desc: "React detects changes by comparing object references. If you mutate state directly, React won't know to re-render. Always pass a new value to the setter function.",
        syn: `<span class="kw">const</span> [user, setUser] = <span class="fn">useState</span>({ name: <span class="str">"Ana"</span>, age: <span class="num">30</span> });\n\n<span class="cm">// ✗ DON'T — mutates existing object, React doesn't re-render</span>\nuser.name = <span class="str">"Bob"</span>;\n<span class="fn">setUser</span>(user); <span class="cm">// same reference → no re-render!</span>\n\n<span class="cm">// ✓ DO — create a new object with spread</span>\n<span class="fn">setUser</span>({ ...user, name: <span class="str">"Bob"</span> });\n\n<span class="cm">// ✓ DO — same for arrays</span>\n<span class="kw">const</span> [list, setList] = <span class="fn">useState</span>([<span class="num">1</span>, <span class="num">2</span>, <span class="num">3</span>]);\n<span class="fn">setList</span>([...list, <span class="num">4</span>]); <span class="cm">// new array → re-renders correctly</span>`,
        out: "// New reference = React sees the change = re-render" },
      { code: "Keys in lists — never use index",
        desc: "React uses keys to track which items changed in a list. Using index as key breaks when items are reordered or deleted. Use a unique, stable ID from your data.",
        syn: `<span class="kw">const</span> items = [{ id: <span class="num">1</span>, name: <span class="str">"Alice"</span> }, { id: <span class="num">2</span>, name: <span class="str">"Bob"</span> }];\n\n<span class="cm">// ✗ DON'T — index as key breaks on reorder/delete</span>\nitems.<span class="fn">map</span>((item, i) => &lt;<span class="cls">li</span> <span class="ann">key</span>={i}&gt;{item.name}&lt;/<span class="cls">li</span>&gt;)\n\n<span class="cm">// ✓ DO — use a stable, unique ID</span>\nitems.<span class="fn">map</span>(item => &lt;<span class="cls">li</span> <span class="ann">key</span>={item.id}&gt;{item.name}&lt;/<span class="cls">li</span>&gt;)`,
        out: "// Stable keys = correct animations & form values in lists" },
      { code: "Rules of Hooks",
        desc: "React Hooks have two strict rules: only call them at the top level of a component (not inside loops, conditions, or nested functions), and only call them from React functions.",
        syn: `<span class="cm">// ✗ DON'T — hook inside a condition</span>\n<span class="kw">function</span> <span class="cls">Bad</span>({ show }) {\n  <span class="kw">if</span> (show) {\n    <span class="kw">const</span> [val, setVal] = <span class="fn">useState</span>(<span class="num">0</span>); <span class="cm">// ← breaks React rules!</span>\n  }\n}\n\n<span class="cm">// ✓ DO — all hooks at the top level</span>\n<span class="kw">function</span> <span class="cls">Good</span>({ show }) {\n  <span class="kw">const</span> [val, setVal] = <span class="fn">useState</span>(<span class="num">0</span>); <span class="cm">// ← always called</span>\n  <span class="kw">if</span> (!show) <span class="kw">return</span> <span class="kw">null</span>;\n  <span class="kw">return</span> &lt;<span class="cls">div</span>&gt;{val}&lt;/<span class="cls">div</span>&gt;;\n}`,
        out: "// ESLint plugin react-hooks catches these violations" },
      { code: "Don't create components inside components",
        desc: "Defining a component inside another component means React creates a new component type on every render — causing full unmount/remount, losing state and focus.",
        syn: `<span class="cm">// ✗ DON'T — Inner is recreated on every Parent render</span>\n<span class="kw">function</span> <span class="cls">Parent</span>() {\n  <span class="kw">function</span> <span class="cls">Inner</span>() { <span class="kw">return</span> &lt;<span class="cls">p</span>&gt;Hi&lt;/<span class="cls">p</span>&gt;; } <span class="cm">// ← new fn each render</span>\n  <span class="kw">return</span> &lt;<span class="cls">Inner</span> /&gt;;\n}\n\n<span class="cm">// ✓ DO — define components at the module top level</span>\n<span class="kw">function</span> <span class="cls">Inner</span>() { <span class="kw">return</span> &lt;<span class="cls">p</span>&gt;Hi&lt;/<span class="cls">p</span>&gt;; } <span class="cm">// ← defined once</span>\n\n<span class="kw">function</span> <span class="cls">Parent</span>() {\n  <span class="kw">return</span> &lt;<span class="cls">Inner</span> /&gt;;\n}`,
        out: "// Top-level components keep their state between renders" },
      { code: "useEffect cleanup & dependencies",
        desc: "Return a cleanup function from useEffect to cancel timers, subscriptions, or event listeners. Always include everything you use in the dependency array.",
        syn: `<span class="cm">// ✗ DON'T — missing cleanup, missing dependency</span>\n<span class="fn">useEffect</span>(() => {\n  <span class="kw">const</span> id = <span class="fn">setInterval</span>(() => <span class="fn">tick</span>(), <span class="num">1000</span>);\n  <span class="cm">// timer leaks when component unmounts!</span>\n}, []);  <span class="cm">// ← tick() used but not listed</span>\n\n<span class="cm">// ✓ DO — cleanup + all deps listed</span>\n<span class="fn">useEffect</span>(() => {\n  <span class="kw">const</span> id = <span class="fn">setInterval</span>(() => <span class="fn">tick</span>(), <span class="num">1000</span>);\n  <span class="kw">return</span> () => <span class="fn">clearInterval</span>(id); <span class="cm">// ← cleanup</span>\n}, [tick]);  <span class="cm">// ← tick listed as dependency</span>`,
        out: "// Cleanup prevents memory leaks & stale callbacks" },
    ]
  },
  {
    id: "react-jsx", name: "JSX Syntax", color: "#61dafb",
    tBg: "rgba(97,218,251,0.12)", tC: "#61dafb",
    items: [
      { code: "JSX basics", desc: "JSX is HTML-like syntax inside JavaScript. It compiles to React.createElement() calls. Must return a single root element.",
        syn: `<span class="cm">// JSX looks like HTML but it's JavaScript</span>\n<span class="kw">const</span> el = &lt;<span class="cls">h1</span>&gt;Hello, World\!&lt;/<span class="cls">h1</span>&gt;;\n\n<span class="cm">// Embed JS expressions with {}</span>\n<span class="kw">const</span> name = <span class="str">"Maria"</span>;\n<span class="kw">const</span> greeting = &lt;<span class="cls">p</span>&gt;Hello, {name}\!&lt;/<span class="cls">p</span>&gt;;\n\n<span class="cm">// Multi-line: wrap in parentheses</span>\n<span class="kw">const</span> card = (\n  &lt;<span class="cls">div</span>&gt;\n    &lt;<span class="cls">h2</span>&gt;Title&lt;/<span class="cls">h2</span>&gt;\n    &lt;<span class="cls">p</span>&gt;Body text here&lt;/<span class="cls">p</span>&gt;\n  &lt;/<span class="cls">div</span>&gt;\n);`,
        out: "(renders HTML to DOM)" },
      { code: "className & style", desc: "JSX uses className instead of class. Inline style takes a JS object with camelCase properties.",
        syn: `<span class="cm">// className (not class)</span>\n<span class="kw">const</span> el = &lt;<span class="cls">div</span> <span class="ann">className</span>=<span class="str">"container active"</span>&gt;Box&lt;/<span class="cls">div</span>&gt;;\n\n<span class="cm">// Inline styles: JS object, camelCase properties</span>\n<span class="kw">const</span> style = { backgroundColor: <span class="str">"#1a1a2e"</span>, fontSize: <span class="str">"16px"</span>, padding: <span class="str">"1rem"</span> };\n<span class="kw">const</span> styled = &lt;<span class="cls">div</span> <span class="ann">style</span>={style}&gt;Styled\!&lt;/<span class="cls">div</span>&gt;;\n\n<span class="cm">// Or inline object literal</span>\n<span class="kw">const</span> box = &lt;<span class="cls">div</span> <span class="ann">style</span>={{ color: <span class="str">"red"</span>, fontWeight: <span class="str">"bold"</span> }}&gt;Red&lt;/<span class="cls">div</span>&gt;;`,
        out: "(className and style applied to DOM)" },
      { code: "JSX Fragments (<> </>)", desc: "Return multiple elements without adding an extra DOM node. Use <> </> short syntax or <React.Fragment>.",
        syn: `<span class="cm">// Without Fragment: error — JSX must have one root</span>\n<span class="cm">// return &lt;h1&gt;...&lt;/h1&gt; &lt;p&gt;...&lt;/p&gt;; ← not allowed</span>\n\n<span class="cm">// With Fragment (short syntax)</span>\n<span class="kw">function</span> <span class="cls">Info</span>() {\n  <span class="kw">return</span> (\n    &lt;&gt;\n      &lt;<span class="cls">h1</span>&gt;Title&lt;/<span class="cls">h1</span>&gt;\n      &lt;<span class="cls">p</span>&gt;Paragraph&lt;/<span class="cls">p</span>&gt;\n    &lt;/&gt;\n  );\n}`,
        out: "(two sibling elements, no wrapper div)" },
      { code: "Expressions in JSX", desc: "{} can hold any JS expression: variables, ternaries, function calls, template literals. Not statements (no if/for).",
        syn: `<span class="kw">const</span> isLoggedIn = <span class="kw">true</span>;\n<span class="kw">const</span> items = [<span class="str">"a"</span>, <span class="str">"b"</span>, <span class="str">"c"</span>];\n\n<span class="kw">const</span> ui = (\n  &lt;<span class="cls">div</span>&gt;\n    &lt;<span class="cls">p</span>&gt;{isLoggedIn ? <span class="str">"Welcome back\!"</span> : <span class="str">"Please log in"</span>}&lt;/<span class="cls">p</span>&gt;\n    &lt;<span class="cls">p</span>&gt;Count: {items.length}&lt;/<span class="cls">p</span>&gt;\n    {isLoggedIn && &lt;<span class="cls">button</span>&gt;Logout&lt;/<span class="cls">button</span>&gt;}\n  &lt;/<span class="cls">div</span>&gt;\n);`,
        out: "(ternary, count, conditional element)" },
      { code: "Self-closing tags", desc: "Any element without children must be self-closed in JSX. HTML void elements (img, input, br) must use />.",
        syn: `<span class="cm">// All of these must be self-closed in JSX</span>\n<span class="kw">const</span> elements = (\n  &lt;<span class="cls">div</span>&gt;\n    &lt;<span class="cls">img</span> <span class="ann">src</span>=<span class="str">"photo.jpg"</span> <span class="ann">alt</span>=<span class="str">"Photo"</span> /&gt;\n    &lt;<span class="cls">input</span> <span class="ann">type</span>=<span class="str">"text"</span> <span class="ann">placeholder</span>=<span class="str">"Type..."</span> /&gt;\n    &lt;<span class="cls">br</span> /&gt;\n    &lt;<span class="cls">hr</span> /&gt;\n    &lt;<span class="cls">MyComponent</span> /&gt;  {/* custom components too */}\n  &lt;/<span class="cls">div</span>&gt;\n);`,
        out: "(self-closing required in JSX)" },
    ]
  },
  {
    id: "react-comp", name: "Components", color: "#60a5fa",
    tBg: "rgba(96,165,250,0.12)", tC: "#60a5fa",
    items: [
      { code: "Functional component", desc: "A plain JavaScript function that returns JSX. The building block of every React application.",
        syn: `<span class="cm">// Simple functional component</span>\n<span class="kw">function</span> <span class="cls">Welcome</span>({ name }) {\n  <span class="kw">return</span> &lt;<span class="cls">h1</span>&gt;Hello, {name}\!&lt;/<span class="cls">h1</span>&gt;;\n}\n\n<span class="cm">// Arrow function style</span>\n<span class="kw">const</span> <span class="cls">Greeting</span> = ({ name }) => &lt;<span class="cls">p</span>&gt;Hi {name}&lt;/<span class="cls">p</span>&gt;;\n\n<span class="cm">// Usage</span>\n<span class="kw">const</span> app = (\n  &lt;<span class="cls">div</span>&gt;\n    &lt;<span class="cls">Welcome</span> <span class="ann">name</span>=<span class="str">"Maria"</span> /&gt;\n    &lt;<span class="cls">Greeting</span> <span class="ann">name</span>=<span class="str">"Ana"</span> /&gt;\n  &lt;/<span class="cls">div</span>&gt;\n);`,
        out: "<h1>Hello, Maria\!</h1><p>Hi Ana</p>" },
      { code: "children prop", desc: "Anything placed between opening and closing component tags is passed as props.children.",
        syn: `<span class="kw">function</span> <span class="cls">Card</span>({ title, children }) {\n  <span class="kw">return</span> (\n    &lt;<span class="cls">div</span> <span class="ann">className</span>=<span class="str">"card"</span>&gt;\n      &lt;<span class="cls">h2</span>&gt;{title}&lt;/<span class="cls">h2</span>&gt;\n      &lt;<span class="cls">div</span> <span class="ann">className</span>=<span class="str">"card-body"</span>&gt;{children}&lt;/<span class="cls">div</span>&gt;\n    &lt;/<span class="cls">div</span>&gt;\n  );\n}\n\n<span class="cm">// Usage</span>\n&lt;<span class="cls">Card</span> <span class="ann">title</span>=<span class="str">"My Card"</span>&gt;\n  &lt;<span class="cls">p</span>&gt;Any content goes here\!&lt;/<span class="cls">p</span>&gt;\n  &lt;<span class="cls">button</span>&gt;Click me&lt;/<span class="cls">button</span>&gt;\n&lt;/<span class="cls">Card</span>&gt;`,
        out: "(card with title and slotted content)" },
      { code: "Component composition", desc: "Build complex UIs by composing small, reusable components. Each component has one job.",
        syn: `<span class="kw">const</span> <span class="cls">Avatar</span> = ({ src, name }) => (\n  &lt;<span class="cls">img</span> <span class="ann">src</span>={src} <span class="ann">alt</span>={name} <span class="ann">className</span>=<span class="str">"avatar"</span> /&gt;\n);\n\n<span class="kw">const</span> <span class="cls">UserInfo</span> = ({ user }) => (\n  &lt;<span class="cls">div</span> <span class="ann">className</span>=<span class="str">"user"</span>&gt;\n    &lt;<span class="cls">Avatar</span> <span class="ann">src</span>={user.avatar} <span class="ann">name</span>={user.name} /&gt;\n    &lt;<span class="cls">p</span>&gt;{user.name}&lt;/<span class="cls">p</span>&gt;\n  &lt;/<span class="cls">div</span>&gt;\n);\n\n<span class="kw">const</span> <span class="cls">App</span> = () => &lt;<span class="cls">UserInfo</span> <span class="ann">user</span>={currentUser} /&gt;;`,
        out: "(Avatar inside UserInfo inside App)" },
    ]
  },
  {
    id: "react-props", name: "Props", color: "#a78bfa",
    tBg: "rgba(167,139,250,0.12)", tC: "#a78bfa",
    items: [
      { code: "Passing props", desc: "Props are inputs passed to components as HTML-like attributes. They are read-only — never mutate props directly.",
        syn: `<span class="kw">function</span> <span class="cls">Button</span>({ label, color, onClick, disabled }) {\n  <span class="kw">return</span> (\n    &lt;<span class="cls">button</span>\n      <span class="ann">style</span>={{ background: color }}\n      <span class="ann">onClick</span>={onClick}\n      <span class="ann">disabled</span>={disabled}\n    &gt;\n      {label}\n    &lt;/<span class="cls">button</span>&gt;\n  );\n}\n\n&lt;<span class="cls">Button</span> <span class="ann">label</span>=<span class="str">"Save"</span> <span class="ann">color</span>=<span class="str">"#4ade80"</span> <span class="ann">onClick</span>={<span class="fn">handleSave</span>} /&gt;`,
        out: "(button with label, color, handler)" },
      { code: "Default props", desc: "Provide fallback values when props aren't passed. Use ES6 default parameter syntax in the destructuring.",
        syn: `<span class="kw">function</span> <span class="cls">Badge</span>({ text = <span class="str">"New"</span>, color = <span class="str">"#f97316"</span>, size = <span class="str">"md"</span> }) {\n  <span class="kw">return</span> (\n    &lt;<span class="cls">span</span> <span class="ann">style</span>={{ background: color, padding: size === <span class="str">"sm"</span> ? <span class="str">"2px 6px"</span> : <span class="str">"4px 10px"</span> }}&gt;\n      {text}\n    &lt;/<span class="cls">span</span>&gt;\n  );\n}\n\n&lt;<span class="cls">Badge</span> /&gt;                         {/* uses all defaults */}\n&lt;<span class="cls">Badge</span> <span class="ann">text</span>=<span class="str">"Sale"</span> <span class="ann">color</span>=<span class="str">"#f87171"</span> /&gt;  {/* overrides two */}`,
        out: "(New badge, Sale badge with custom color)" },
      { code: "Prop spreading", desc: "Use spread (...props) to forward all props to a child. Useful for wrapper components. Be careful — avoid passing DOM-invalid props.",
        syn: `<span class="kw">function</span> <span class="cls">Input</span>({ label, ...rest }) {\n  <span class="kw">return</span> (\n    &lt;<span class="cls">label</span>&gt;\n      {label}\n      &lt;<span class="cls">input</span> {...rest} /&gt;  {/* forwards type, value, onChange, etc. */}\n    &lt;/<span class="cls">label</span>&gt;\n  );\n}\n\n&lt;<span class="cls">Input</span>\n  <span class="ann">label</span>=<span class="str">"Email"</span>\n  <span class="ann">type</span>=<span class="str">"email"</span>\n  <span class="ann">value</span>={email}\n  <span class="ann">onChange</span>={e => <span class="fn">setEmail</span>(e.target.value)}\n/&gt;`,
        out: "(label + input with all forwarded props)" },
      { code: "Prop types pattern", desc: "Document expected props with TypeScript or PropTypes. Catches bugs early and serves as documentation.",
        syn: `<span class="cm">// TypeScript (preferred in modern React)</span>\n<span class="kw">type</span> <span class="cls">CardProps</span> = {\n  title:    <span class="kw">string</span>;\n  count:    <span class="kw">number</span>;\n  onClose?: () => <span class="kw">void</span>; <span class="cm">// optional</span>\n};\n\n<span class="kw">function</span> <span class="cls">Card</span>({ title, count, onClose }: <span class="cls">CardProps</span>) {\n  <span class="kw">return</span> &lt;<span class="cls">div</span>&gt;{title} ({count}) {onClose && &lt;<span class="cls">button</span> <span class="ann">onClick</span>={onClose}&gt;×&lt;/<span class="cls">button</span>&gt;}&lt;/<span class="cls">div</span>&gt;;\n}`,
        out: "(typed component with optional prop)" },
    ]
  },
  {
    id: "react-state", name: "useState Hook", color: "#f97316",
    tBg: "rgba(249,115,22,0.12)", tC: "#f97316",
    items: [
      { code: "useState basics", desc: "Returns [value, setter]. Calling setter triggers a re-render. Never mutate state directly — always use the setter.",
        syn: `<span class="kw">import</span> { useState } <span class="kw">from</span> <span class="str">'react'</span>;\n\n<span class="kw">function</span> <span class="cls">Counter</span>() {\n  <span class="kw">const</span> [count, setCount] = <span class="fn">useState</span>(<span class="num">0</span>);\n\n  <span class="kw">return</span> (\n    &lt;<span class="cls">div</span>&gt;\n      &lt;<span class="cls">p</span>&gt;Count: {count}&lt;/<span class="cls">p</span>&gt;\n      &lt;<span class="cls">button</span> <span class="ann">onClick</span>={() => <span class="fn">setCount</span>(count + <span class="num">1</span>)}&gt;+&lt;/<span class="cls">button</span>&gt;\n      &lt;<span class="cls">button</span> <span class="ann">onClick</span>={() => <span class="fn">setCount</span>(<span class="num">0</span>)}&gt;Reset&lt;/<span class="cls">button</span>&gt;\n    &lt;/<span class="cls">div</span>&gt;\n  );\n}`,
        out: "(count display with + and reset buttons)" },
      { code: "Functional updates", desc: "When new state depends on old state, always use the function form: setter(prev => newValue). Avoids stale closures.",
        syn: `<span class="kw">const</span> [count, setCount] = <span class="fn">useState</span>(<span class="num">0</span>);\n\n<span class="cm">// ✓ Function form — always safe</span>\n<span class="kw">const</span> <span class="fn">increment</span> = () => <span class="fn">setCount</span>(prev => prev + <span class="num">1</span>);\n<span class="kw">const</span> <span class="fn">double</span>    = () => <span class="fn">setCount</span>(prev => prev * <span class="num">2</span>);\n\n<span class="cm">// ✗ Direct form — stale in async/callbacks</span>\n<span class="kw">const</span> <span class="fn">buggy</span> = () => <span class="fn">setCount</span>(count + <span class="num">1</span>); <span class="cm">// may be stale\!</span>`,
        out: "(always use prev => prev + 1 form)" },
      { code: "Object & array state", desc: "State can be any type. For objects/arrays, always create a new reference — React won't re-render if you mutate in place.",
        syn: `<span class="kw">const</span> [user, setUser] = <span class="fn">useState</span>({ name: <span class="str">"Ana"</span>, age: <span class="num">25</span> });\n\n<span class="cm">// ✓ Spread to create new object</span>\n<span class="fn">setUser</span>(prev => ({ ...prev, age: prev.age + <span class="num">1</span> }));\n\n<span class="kw">const</span> [items, setItems] = <span class="fn">useState</span>([<span class="str">"a"</span>, <span class="str">"b"</span>]);\n\n<span class="cm">// ✓ Spread array to create new array</span>\n<span class="fn">setItems</span>(prev => [...prev, <span class="str">"c"</span>]);           <span class="cm">// add</span>\n<span class="fn">setItems</span>(prev => prev.<span class="fn">filter</span>(x => x \!== <span class="str">"b"</span>)); <span class="cm">// remove</span>`,
        out: "(immutable updates: spread then modify)" },
      { code: "Multiple state variables", desc: "Each useState call manages one piece of state. Use many for unrelated values, one for related values.",
        syn: `<span class="kw">function</span> <span class="cls">Form</span>() {\n  <span class="kw">const</span> [name,  setName]  = <span class="fn">useState</span>(<span class="str">""</span>);\n  <span class="kw">const</span> [email, setEmail] = <span class="fn">useState</span>(<span class="str">""</span>);\n  <span class="kw">const</span> [error, setError] = <span class="fn">useState</span>(<span class="kw">null</span>);\n\n  <span class="kw">return</span> (\n    &lt;<span class="cls">form</span>&gt;\n      &lt;<span class="cls">input</span> <span class="ann">value</span>={name}  <span class="ann">onChange</span>={e => <span class="fn">setName</span>(e.target.value)}  /&gt;\n      &lt;<span class="cls">input</span> <span class="ann">value</span>={email} <span class="ann">onChange</span>={e => <span class="fn">setEmail</span>(e.target.value)} /&gt;\n      {error && &lt;<span class="cls">p</span> <span class="ann">className</span>=<span class="str">"error"</span>&gt;{error}&lt;/<span class="cls">p</span>&gt;}\n    &lt;/<span class="cls">form</span>&gt;\n  );\n}`,
        out: "(name, email, and error state)" },
    ]
  },
  {
    id: "react-effect", name: "useEffect Hook", color: "#4ade80",
    tBg: "rgba(74,222,128,0.12)", tC: "#4ade80",
    items: [
      { code: "useEffect basics", desc: "Runs after render. Controls when via the dependency array: [] = once on mount, [dep] = when dep changes, omit = every render.",
        syn: `<span class="kw">import</span> { useState, useEffect } <span class="kw">from</span> <span class="str">'react'</span>;\n\n<span class="kw">function</span> <span class="cls">Timer</span>() {\n  <span class="kw">const</span> [seconds, setSeconds] = <span class="fn">useState</span>(<span class="num">0</span>);\n\n  <span class="fn">useEffect</span>(() => {\n    <span class="kw">const</span> id = <span class="fn">setInterval</span>(() => {\n      <span class="fn">setSeconds</span>(s => s + <span class="num">1</span>);\n    }, <span class="num">1000</span>);\n    <span class="kw">return</span> () => <span class="fn">clearInterval</span>(id); <span class="cm">// cleanup\!</span>\n  }, []); <span class="cm">// [] = run once on mount</span>\n\n  <span class="kw">return</span> &lt;<span class="cls">p</span>&gt;{seconds}s&lt;/<span class="cls">p</span>&gt;;\n}`,
        out: "(seconds ticking up, cleared on unmount)" },
      { code: "Fetching data", desc: "useEffect is the standard place to fetch data. Use AbortController to cancel stale requests on unmount.",
        syn: `<span class="fn">useEffect</span>(() => {\n  <span class="kw">const</span> controller = <span class="kw">new</span> <span class="cls">AbortController</span>();\n\n  <span class="kw">async function</span> <span class="fn">load</span>() {\n    <span class="kw">try</span> {\n      <span class="fn">setLoading</span>(<span class="kw">true</span>);\n      <span class="kw">const</span> res  = <span class="kw">await</span> <span class="fn">fetch</span>(<span class="str">\`/api/users/\${id}\`</span>, { signal: controller.signal });\n      <span class="kw">const</span> data = <span class="kw">await</span> res.<span class="fn">json</span>();\n      <span class="fn">setUser</span>(data);\n    } <span class="kw">catch</span> (e) {\n      <span class="kw">if</span> (e.name \!== <span class="str">"AbortError"</span>) <span class="fn">setError</span>(e.message);\n    } <span class="kw">finally</span> { <span class="fn">setLoading</span>(<span class="kw">false</span>); }\n  }\n  <span class="fn">load</span>();\n  <span class="kw">return</span> () => controller.<span class="fn">abort</span>();\n}, [id]);`,
        out: "(fetches user when id changes, cancels stale)" },
      { code: "Dependency array", desc: "The dep array controls when the effect re-runs. Missing deps cause stale closure bugs. Extra deps cause infinite loops.",
        syn: `<span class="fn">useEffect</span>(() => { <span class="fn">doSomething</span>(); });         <span class="cm">// runs every render</span>\n<span class="fn">useEffect</span>(() => { <span class="fn">doSomething</span>(); }, []);        <span class="cm">// runs once (mount)</span>\n<span class="fn">useEffect</span>(() => { <span class="fn">doSomething</span>(x); }, [x]);     <span class="cm">// runs when x changes</span>\n<span class="fn">useEffect</span>(() => { <span class="fn">doSomething</span>(x, y); }, [x,y]); <span class="cm">// runs when x OR y changes</span>\n\n<span class="cm">// cleanup: return a function</span>\n<span class="fn">useEffect</span>(() => {\n  <span class="kw">const</span> sub = <span class="fn">subscribe</span>(handler);\n  <span class="kw">return</span> () => <span class="fn">unsubscribe</span>(sub); <span class="cm">// runs before next effect or unmount</span>\n}, [handler]);`,
        out: "(4 dependency array patterns + cleanup)" },
    ]
  },
  {
    id: "react-events", name: "Event Handling", color: "#f472b6",
    tBg: "rgba(244,114,182,0.12)", tC: "#f472b6",
    items: [
      { code: "onClick & synthetic events", desc: "React wraps native events in SyntheticEvent. Use event.preventDefault() to stop default behaviour.",
        syn: `<span class="kw">function</span> <span class="cls">ActionButtons</span>() {\n  <span class="kw">const</span> <span class="fn">handleClick</span> = (e) => {\n    <span class="fn">console</span>.<span class="fn">log</span>(<span class="str">"Button clicked\!"</span>, e.target.textContent);\n  };\n\n  <span class="kw">const</span> <span class="fn">handleLink</span> = (e) => {\n    e.<span class="fn">preventDefault</span>(); <span class="cm">// prevent navigation</span>\n    <span class="fn">console</span>.<span class="fn">log</span>(<span class="str">"link stopped"</span>);\n  };\n\n  <span class="kw">return</span> (\n    &lt;<span class="cls">div</span>&gt;\n      &lt;<span class="cls">button</span> <span class="ann">onClick</span>={handleClick}&gt;Click me&lt;/<span class="cls">button</span>&gt;\n      &lt;<span class="cls">a</span> <span class="ann">href</span>=<span class="str">"/"</span> <span class="ann">onClick</span>={handleLink}&gt;Link&lt;/<span class="cls">a</span>&gt;\n    &lt;/<span class="cls">div</span>&gt;\n  );\n}`,
        out: "(click handler, link prevented)" },
      { code: "onChange for inputs", desc: "onChange fires on every keystroke for inputs/textareas. event.target.value gives the current value.",
        syn: `<span class="kw">function</span> <span class="cls">Search</span>() {\n  <span class="kw">const</span> [query, setQuery] = <span class="fn">useState</span>(<span class="str">""</span>);\n\n  <span class="kw">return</span> (\n    &lt;<span class="cls">div</span>&gt;\n      &lt;<span class="cls">input</span>\n        <span class="ann">type</span>=<span class="str">"text"</span>\n        <span class="ann">value</span>={query}\n        <span class="ann">onChange</span>={e => <span class="fn">setQuery</span>(e.target.value)}\n        <span class="ann">placeholder</span>=<span class="str">"Search..."</span>\n      /&gt;\n      &lt;<span class="cls">p</span>&gt;You typed: {query}&lt;/<span class="cls">p</span>&gt;\n    &lt;/<span class="cls">div</span>&gt;\n  );\n}`,
        out: "(controlled input: typed text displayed)" },
      { code: "onSubmit form", desc: "Handle form submission with onSubmit on the form element. Always call event.preventDefault() to stop page reload.",
        syn: `<span class="kw">function</span> <span class="cls">LoginForm</span>() {\n  <span class="kw">const</span> [email, setEmail] = <span class="fn">useState</span>(<span class="str">""</span>);\n\n  <span class="kw">const</span> <span class="fn">handleSubmit</span> = (e) => {\n    e.<span class="fn">preventDefault</span>();\n    <span class="fn">console</span>.<span class="fn">log</span>(<span class="str">"Submitted:"</span>, email);\n  };\n\n  <span class="kw">return</span> (\n    &lt;<span class="cls">form</span> <span class="ann">onSubmit</span>={handleSubmit}&gt;\n      &lt;<span class="cls">input</span> <span class="ann">value</span>={email} <span class="ann">onChange</span>={e => <span class="fn">setEmail</span>(e.target.value)} /&gt;\n      &lt;<span class="cls">button</span> <span class="ann">type</span>=<span class="str">"submit"</span>&gt;Login&lt;/<span class="cls">button</span>&gt;\n    &lt;/<span class="cls">form</span>&gt;\n  );\n}`,
        out: "(form submission logged, no page reload)" },
      { code: "Event with data (passing args)", desc: "To pass extra data to an event handler, wrap it in an arrow function or use .bind().",
        syn: `<span class="kw">function</span> <span class="cls">ItemList</span>({ items }) {\n  <span class="kw">const</span> <span class="fn">handleDelete</span> = (id) => {\n    <span class="fn">console</span>.<span class="fn">log</span>(<span class="str">"Delete item:"</span>, id);\n  };\n\n  <span class="kw">return</span> (\n    &lt;<span class="cls">ul</span>&gt;\n      {items.<span class="fn">map</span>(item => (\n        &lt;<span class="cls">li</span> <span class="ann">key</span>={item.id}&gt;\n          {item.name}\n          &lt;<span class="cls">button</span> <span class="ann">onClick</span>={() => <span class="fn">handleDelete</span>(item.id)}&gt;×&lt;/<span class="cls">button</span>&gt;\n        &lt;/<span class="cls">li</span>&gt;\n      ))}\n    &lt;/<span class="cls">ul</span>&gt;\n  );\n}`,
        out: "(each item has its own delete handler)" },
    ]
  },
  {
    id: "react-lists", name: "Lists & Keys", color: "#38bdf8",
    tBg: "rgba(56,189,248,0.12)", tC: "#38bdf8",
    items: [
      { code: "Rendering lists with .map()", desc: "Use Array.map() to transform data arrays into JSX elements. Each element must have a unique key prop.",
        syn: `<span class="kw">const</span> fruits = [<span class="str">"apple"</span>, <span class="str">"banana"</span>, <span class="str">"cherry"</span>];\n\n<span class="kw">function</span> <span class="cls">FruitList</span>() {\n  <span class="kw">return</span> (\n    &lt;<span class="cls">ul</span>&gt;\n      {fruits.<span class="fn">map</span>(fruit => (\n        &lt;<span class="cls">li</span> <span class="ann">key</span>={fruit}&gt;{fruit}&lt;/<span class="cls">li</span>&gt;\n      ))}\n    &lt;/<span class="cls">ul</span>&gt;\n  );\n}`,
        out: "<ul><li>apple</li><li>banana</li><li>cherry</li></ul>" },
      { code: "key prop", desc: "Keys help React identify which items changed. Use stable, unique IDs (not array index). Index is OK only for static lists.",
        syn: `<span class="cm">// ✓ Use stable unique ID</span>\nitems.<span class="fn">map</span>(item => &lt;<span class="cls">Row</span> <span class="ann">key</span>={item.id} <span class="ann">data</span>={item} /&gt;);\n\n<span class="cm">// ✗ Avoid index for dynamic lists</span>\nitems.<span class="fn">map</span>((item, i) => &lt;<span class="cls">Row</span> <span class="ann">key</span>={i} /&gt;); <span class="cm">// causes bugs on reorder/delete</span>\n\n<span class="cm">// ✓ Index is OK for static, non-reordered lists</span>\n<span class="kw">const</span> STEPS = [<span class="str">"Plan"</span>, <span class="str">"Build"</span>, <span class="str">"Deploy"</span>];\nSTEPS.<span class="fn">map</span>((s, i) => &lt;<span class="cls">Step</span> <span class="ann">key</span>={i} <span class="ann">label</span>={s} /&gt;);`,
        out: "(key should be stable unique ID from data)" },
      { code: "Filtering & sorting lists", desc: "Chain filter/sort before map to display only the data you need. Always sort a copy ([...arr]) to avoid mutating state.",
        syn: `<span class="kw">function</span> <span class="cls">UserList</span>({ users, filter }) {\n  <span class="kw">const</span> visible = [...users]\n    .<span class="fn">filter</span>(u => u.name.<span class="fn">toLowerCase</span>().<span class="fn">includes</span>(filter))\n    .<span class="fn">sort</span>((a, b) => a.name.<span class="fn">localeCompare</span>(b.name));\n\n  <span class="kw">if</span> (\!visible.length) <span class="kw">return</span> &lt;<span class="cls">p</span>&gt;No users found&lt;/<span class="cls">p</span>&gt;;\n\n  <span class="kw">return</span> (\n    &lt;<span class="cls">ul</span>&gt;\n      {visible.<span class="fn">map</span>(u => &lt;<span class="cls">li</span> <span class="ann">key</span>={u.id}&gt;{u.name}&lt;/<span class="cls">li</span>&gt;)}\n    &lt;/<span class="cls">ul</span>&gt;\n  );\n}`,
        out: "(filtered + sorted user list, empty state)" },
    ]
  },
  {
    id: "react-cond", name: "Conditional Rendering", color: "#facc15",
    tBg: "rgba(250,204,21,0.12)", tC: "#facc15",
    items: [
      { code: "Ternary operator", desc: "The most common way to conditionally render. condition ? <A /> : <B />. Use null to render nothing.",
        syn: `<span class="kw">function</span> <span class="cls">Greeting</span>({ isLoggedIn }) {\n  <span class="kw">return</span> (\n    &lt;<span class="cls">div</span>&gt;\n      {isLoggedIn\n        ? &lt;<span class="cls">h1</span>&gt;Welcome back\!&lt;/<span class="cls">h1</span>&gt;\n        : &lt;<span class="cls">h1</span>&gt;Please sign in&lt;/<span class="cls">h1</span>&gt;\n      }\n    &lt;/<span class="cls">div</span>&gt;\n  );\n}\n\n<span class="cm">// null renders nothing</span>\n{error ? &lt;<span class="cls">ErrorMsg</span> <span class="ann">msg</span>={error} /&gt; : <span class="kw">null</span>}`,
        out: "(shows login or welcome message)" },
      { code: "Short-circuit &&", desc: "condition && <Element /> renders the element only if condition is truthy. Beware: 0 renders '0' — use \!\! or ternary.",
        syn: `<span class="kw">const</span> [error, setError] = <span class="fn">useState</span>(<span class="kw">null</span>);\n<span class="kw">const</span> [items, setItems] = <span class="fn">useState</span>([]);\n\n<span class="kw">return</span> (\n  &lt;<span class="cls">div</span>&gt;\n    {error    && &lt;<span class="cls">Alert</span> <span class="ann">message</span>={error} /&gt;}\n    {\!\!items.length && &lt;<span class="cls">List</span> <span class="ann">items</span>={items} /&gt;} {/* \!\! prevents "0" */}\n    {\!items.length && &lt;<span class="cls">Empty</span> /&gt;}\n  &lt;/<span class="cls">div</span>&gt;\n);`,
        out: "(alert if error, list or empty state)" },
      { code: "Early return pattern", desc: "Return early before the main JSX for loading/error/empty states. Keeps the happy path clean.",
        syn: `<span class="kw">function</span> <span class="cls">UserProfile</span>({ user, loading, error }) {\n  <span class="kw">if</span> (loading) <span class="kw">return</span> &lt;<span class="cls">Spinner</span> /&gt;;\n  <span class="kw">if</span> (error)   <span class="kw">return</span> &lt;<span class="cls">Error</span> <span class="ann">msg</span>={error} /&gt;;\n  <span class="kw">if</span> (\!user)   <span class="kw">return</span> <span class="kw">null</span>;\n\n  <span class="cm">// happy path — clean, no nesting</span>\n  <span class="kw">return</span> (\n    &lt;<span class="cls">div</span>&gt;\n      &lt;<span class="cls">h1</span>&gt;{user.name}&lt;/<span class="cls">h1</span>&gt;\n      &lt;<span class="cls">p</span>&gt;{user.email}&lt;/<span class="cls">p</span>&gt;\n    &lt;/<span class="cls">div</span>&gt;\n  );\n}`,
        out: "(spinner → error → null → profile)" },
    ]
  },
  {
    id: "react-forms", name: "Forms & Inputs", color: "#fb923c",
    tBg: "rgba(251,146,60,0.12)", tC: "#fb923c",
    items: [
      { code: "Controlled input", desc: "React owns the input value via state. value={state} + onChange={setter} = controlled. Input value always matches state.",
        syn: `<span class="kw">function</span> <span class="cls">ControlledInput</span>() {\n  <span class="kw">const</span> [text, setText] = <span class="fn">useState</span>(<span class="str">""</span>);\n\n  <span class="kw">return</span> (\n    &lt;<span class="cls">div</span>&gt;\n      &lt;<span class="cls">input</span>\n        <span class="ann">type</span>=<span class="str">"text"</span>\n        <span class="ann">value</span>={text}\n        <span class="ann">onChange</span>={e => <span class="fn">setText</span>(e.target.value)}\n      /&gt;\n      &lt;<span class="cls">p</span>&gt;Length: {text.length}&lt;/<span class="cls">p</span>&gt;\n      &lt;<span class="cls">button</span> <span class="ann">onClick</span>={() => <span class="fn">setText</span>(<span class="str">""</span>)}&gt;Clear&lt;/<span class="cls">button</span>&gt;\n    &lt;/<span class="cls">div</span>&gt;\n  );\n}`,
        out: "(input synced to state, clear button)" },
      { code: "Select & Checkbox", desc: "Select uses value/onChange like text inputs. Checkbox uses checked={bool} and reads event.target.checked.",
        syn: `<span class="kw">const</span> [size,    setSize]    = <span class="fn">useState</span>(<span class="str">"md"</span>);\n<span class="kw">const</span> [agree,   setAgree]   = <span class="fn">useState</span>(<span class="kw">false</span>);\n\n&lt;<span class="cls">select</span> <span class="ann">value</span>={size} <span class="ann">onChange</span>={e => <span class="fn">setSize</span>(e.target.value)}&gt;\n  &lt;<span class="cls">option</span> <span class="ann">value</span>=<span class="str">"sm"</span>&gt;Small&lt;/<span class="cls">option</span>&gt;\n  &lt;<span class="cls">option</span> <span class="ann">value</span>=<span class="str">"md"</span>&gt;Medium&lt;/<span class="cls">option</span>&gt;\n  &lt;<span class="cls">option</span> <span class="ann">value</span>=<span class="str">"lg"</span>&gt;Large&lt;/<span class="cls">option</span>&gt;\n&lt;/<span class="cls">select</span>&gt;\n\n&lt;<span class="cls">input</span>\n  <span class="ann">type</span>=<span class="str">"checkbox"</span>\n  <span class="ann">checked</span>={agree}\n  <span class="ann">onChange</span>={e => <span class="fn">setAgree</span>(e.target.checked)}\n/&gt;`,
        out: "(size dropdown + agree checkbox)" },
      { code: "Generic change handler", desc: "Handle many form fields with one handler using event.target.name. Spread previous state and update one field.",
        syn: `<span class="kw">const</span> [form, setForm] = <span class="fn">useState</span>({ name: <span class="str">""</span>, email: <span class="str">""</span>, message: <span class="str">""</span> });\n\n<span class="kw">const</span> <span class="fn">handleChange</span> = (e) => {\n  <span class="kw">const</span> { name, value } = e.target;\n  <span class="fn">setForm</span>(prev => ({ ...prev, [name]: value }));\n};\n\n&lt;<span class="cls">input</span>    <span class="ann">name</span>=<span class="str">"name"</span>    <span class="ann">value</span>={form.name}    <span class="ann">onChange</span>={handleChange} /&gt;\n&lt;<span class="cls">input</span>    <span class="ann">name</span>=<span class="str">"email"</span>   <span class="ann">value</span>={form.email}   <span class="ann">onChange</span>={handleChange} /&gt;\n&lt;<span class="cls">textarea</span> <span class="ann">name</span>=<span class="str">"message"</span> <span class="ann">value</span>={form.message} <span class="ann">onChange</span>={handleChange} /&gt;`,
        out: "(one handler for all fields via name)" },
    ]
  },
  {
    id: "react-context", name: "Context API", color: "#2dd4bf",
    tBg: "rgba(45,212,191,0.12)", tC: "#2dd4bf",
    items: [
      { code: "createContext & useContext", desc: "Share data across the component tree without prop drilling. Create a context, wrap with Provider, consume with useContext.",
        syn: `<span class="kw">import</span> { createContext, useContext, useState } <span class="kw">from</span> <span class="str">'react'</span>;\n\n<span class="kw">const</span> <span class="cls">ThemeContext</span> = <span class="fn">createContext</span>(<span class="str">"light"</span>); <span class="cm">// default value</span>\n\n<span class="kw">function</span> <span class="cls">App</span>() {\n  <span class="kw">const</span> [theme, setTheme] = <span class="fn">useState</span>(<span class="str">"dark"</span>);\n  <span class="kw">return</span> (\n    &lt;<span class="cls">ThemeContext</span>.<span class="cls">Provider</span> <span class="ann">value</span>={{ theme, setTheme }}&gt;\n      &lt;<span class="cls">Page</span> /&gt;\n    &lt;/<span class="cls">ThemeContext</span>.<span class="cls">Provider</span>&gt;\n  );\n}\n\n<span class="kw">function</span> <span class="cls">Button</span>() {\n  <span class="kw">const</span> { theme, setTheme } = <span class="fn">useContext</span>(<span class="cls">ThemeContext</span>);\n  <span class="kw">return</span> &lt;<span class="cls">button</span> <span class="ann">onClick</span>={() => <span class="fn">setTheme</span>(t => t === <span class="str">"dark"</span> ? <span class="str">"light"</span> : <span class="str">"dark"</span>)}&gt;{theme}&lt;/<span class="cls">button</span>&gt;;\n}`,
        out: "(theme shared across tree, toggleable)" },
      { code: "Custom context hook", desc: "Wrap useContext in a custom hook for better ergonomics and error handling if used outside the provider.",
        syn: `<span class="kw">const</span> <span class="cls">AuthContext</span> = <span class="fn">createContext</span>(<span class="kw">null</span>);\n\n<span class="kw">export function</span> <span class="cls">AuthProvider</span>({ children }) {\n  <span class="kw">const</span> [user, setUser] = <span class="fn">useState</span>(<span class="kw">null</span>);\n  <span class="kw">return</span> (\n    &lt;<span class="cls">AuthContext</span>.<span class="cls">Provider</span> <span class="ann">value</span>={{ user, setUser }}&gt;\n      {children}\n    &lt;/<span class="cls">AuthContext</span>.<span class="cls">Provider</span>&gt;\n  );\n}\n\n<span class="kw">export function</span> <span class="fn">useAuth</span>() {\n  <span class="kw">const</span> ctx = <span class="fn">useContext</span>(<span class="cls">AuthContext</span>);\n  <span class="kw">if</span> (\!ctx) <span class="kw">throw new</span> <span class="cls">Error</span>(<span class="str">"useAuth must be inside AuthProvider"</span>);\n  <span class="kw">return</span> ctx;\n}`,
        out: "(useAuth hook with guard)" },
    ]
  },
  {
    id: "react-ref", name: "useRef Hook", color: "#c084fc",
    tBg: "rgba(192,132,252,0.12)", tC: "#c084fc",
    items: [
      { code: "DOM reference", desc: "useRef gives direct access to a DOM node. Useful for focusing, measuring, or triggering animations without setState.",
        syn: `<span class="kw">import</span> { useRef } <span class="kw">from</span> <span class="str">'react'</span>;\n\n<span class="kw">function</span> <span class="cls">SearchInput</span>() {\n  <span class="kw">const</span> inputRef = <span class="fn">useRef</span>(<span class="kw">null</span>);\n\n  <span class="kw">const</span> <span class="fn">focus</span> = () => inputRef.current?.<span class="fn">focus</span>();\n\n  <span class="kw">return</span> (\n    &lt;<span class="cls">div</span>&gt;\n      &lt;<span class="cls">input</span> <span class="ann">ref</span>={inputRef} <span class="ann">placeholder</span>=<span class="str">"Search..."</span> /&gt;\n      &lt;<span class="cls">button</span> <span class="ann">onClick</span>={focus}&gt;Focus input&lt;/<span class="cls">button</span>&gt;\n    &lt;/<span class="cls">div</span>&gt;\n  );\n}`,
        out: "(button click focuses the input)" },
      { code: "Mutable value (no re-render)", desc: "Refs persist across renders without triggering re-renders. Perfect for timers, previous values, and tracking without state.",
        syn: `<span class="kw">function</span> <span class="cls">Timer</span>() {\n  <span class="kw">const</span> [running, setRunning] = <span class="fn">useState</span>(<span class="kw">false</span>);\n  <span class="kw">const</span> intervalRef = <span class="fn">useRef</span>(<span class="kw">null</span>);\n\n  <span class="kw">const</span> <span class="fn">start</span> = () => {\n    <span class="fn">setRunning</span>(<span class="kw">true</span>);\n    intervalRef.current = <span class="fn">setInterval</span>(() => <span class="fn">tick</span>(), <span class="num">1000</span>);\n  };\n  <span class="kw">const</span> <span class="fn">stop</span> = () => {\n    <span class="fn">setRunning</span>(<span class="kw">false</span>);\n    <span class="fn">clearInterval</span>(intervalRef.current);\n  };\n\n  <span class="kw">return</span> &lt;<span class="cls">button</span> <span class="ann">onClick</span>={running ? stop : start}&gt;{running ? <span class="str">"Stop"</span> : <span class="str">"Start"</span>}&lt;/<span class="cls">button</span>&gt;;\n}`,
        out: "(interval ID stored in ref, not state)" },
    ]
  },
  {
    id: "react-hooks", name: "Custom Hooks", color: "#fb7185",
    tBg: "rgba(251,113,133,0.12)", tC: "#fb7185",
    items: [
      { code: "Custom hook pattern", desc: "Extract reusable stateful logic into a function starting with 'use'. Custom hooks can use other hooks internally.",
        syn: `<span class="cm">// useToggle.js — reusable boolean toggle</span>\n<span class="kw">function</span> <span class="fn">useToggle</span>(initial = <span class="kw">false</span>) {\n  <span class="kw">const</span> [value, setValue] = <span class="fn">useState</span>(initial);\n  <span class="kw">const</span> <span class="fn">toggle</span> = () => <span class="fn">setValue</span>(v => \!v);\n  <span class="kw">return</span> [value, toggle];\n}\n\n<span class="cm">// Usage</span>\n<span class="kw">function</span> <span class="cls">Modal</span>() {\n  <span class="kw">const</span> [isOpen, toggleOpen] = <span class="fn">useToggle</span>(<span class="kw">false</span>);\n  <span class="kw">return</span> (\n    &lt;<span class="cls">div</span>&gt;\n      &lt;<span class="cls">button</span> <span class="ann">onClick</span>={toggleOpen}&gt;{isOpen ? <span class="str">"Close"</span> : <span class="str">"Open"</span>}&lt;/<span class="cls">button</span>&gt;\n      {isOpen && &lt;<span class="cls">div</span> <span class="ann">className</span>=<span class="str">"modal"</span>&gt;Content&lt;/<span class="cls">div</span>&gt;}\n    &lt;/<span class="cls">div</span>&gt;\n  );\n}`,
        out: "(reusable toggle extracted into hook)" },
      { code: "useFetch hook", desc: "Encapsulates the fetch + loading + error pattern. Any component can use it without repeating the useEffect boilerplate.",
        syn: `<span class="kw">function</span> <span class="fn">useFetch</span>(url) {\n  <span class="kw">const</span> [data,    setData]    = <span class="fn">useState</span>(<span class="kw">null</span>);\n  <span class="kw">const</span> [loading, setLoading] = <span class="fn">useState</span>(<span class="kw">true</span>);\n  <span class="kw">const</span> [error,   setError]   = <span class="fn">useState</span>(<span class="kw">null</span>);\n\n  <span class="fn">useEffect</span>(() => {\n    <span class="fn">fetch</span>(url)\n      .<span class="fn">then</span>(r => r.<span class="fn">json</span>())\n      .<span class="fn">then</span>(<span class="fn">setData</span>)\n      .<span class="fn">catch</span>(<span class="fn">setError</span>)\n      .<span class="fn">finally</span>(() => <span class="fn">setLoading</span>(<span class="kw">false</span>));\n  }, [url]);\n\n  <span class="kw">return</span> { data, loading, error };\n}\n\n<span class="cm">// Usage</span>\n<span class="kw">const</span> { data, loading } = <span class="fn">useFetch</span>(<span class="str">"/api/users"</span>);`,
        out: "({data, loading, error} from any URL)" },
      { code: "useLocalStorage hook", desc: "Persist state to localStorage. Reads initial value from storage, syncs on every change.",
        syn: `<span class="kw">function</span> <span class="fn">useLocalStorage</span>(key, initial) {\n  <span class="kw">const</span> [value, setValue] = <span class="fn">useState</span>(() => {\n    <span class="kw">try</span> {\n      <span class="kw">const</span> stored = <span class="fn">localStorage</span>.<span class="fn">getItem</span>(key);\n      <span class="kw">return</span> stored ? <span class="cls">JSON</span>.<span class="fn">parse</span>(stored) : initial;\n    } <span class="kw">catch</span> { <span class="kw">return</span> initial; }\n  });\n\n  <span class="kw">const</span> <span class="fn">set</span> = (v) => {\n    <span class="fn">setValue</span>(v);\n    <span class="fn">localStorage</span>.<span class="fn">setItem</span>(key, <span class="cls">JSON</span>.<span class="fn">stringify</span>(v));\n  };\n  <span class="kw">return</span> [value, set];\n}\n\n<span class="kw">const</span> [theme, setTheme] = <span class="fn">useLocalStorage</span>(<span class="str">"theme"</span>, <span class="str">"dark"</span>);`,
        out: "(state persisted across page refreshes)" },
    ]
  },
  {
    id: "react-perf", name: "Performance Hooks", color: "#a3e635",
    tBg: "rgba(163,230,53,0.12)", tC: "#a3e635",
    items: [
      { code: "useMemo", desc: "Cache the result of an expensive calculation. Only recomputes when dependencies change. Don't overuse — profiling first.",
        syn: `<span class="kw">import</span> { useMemo } <span class="kw">from</span> <span class="str">'react'</span>;\n\n<span class="kw">function</span> <span class="cls">ExpensiveList</span>({ items, filter }) {\n  <span class="kw">const</span> filtered = <span class="fn">useMemo</span>(\n    () => items\n      .<span class="fn">filter</span>(i => i.name.<span class="fn">includes</span>(filter))\n      .<span class="fn">sort</span>((a, b) => a.score - b.score),\n    [items, filter] <span class="cm">// only recalculate when these change</span>\n  );\n\n  <span class="kw">return</span> &lt;<span class="cls">List</span> <span class="ann">data</span>={filtered} /&gt;;\n}`,
        out: "(filtered list cached, skips re-sort)" },
      { code: "useCallback", desc: "Cache a function reference. Prevents child re-renders when the function is passed as a prop. Pair with React.memo.",
        syn: `<span class="kw">import</span> { useCallback } <span class="kw">from</span> <span class="str">'react'</span>;\n\n<span class="kw">function</span> <span class="cls">Parent</span>() {\n  <span class="kw">const</span> [count, setCount] = <span class="fn">useState</span>(<span class="num">0</span>);\n\n  <span class="cm">// Stable reference — Child won't re-render needlessly</span>\n  <span class="kw">const</span> <span class="fn">handleClick</span> = <span class="fn">useCallback</span>(() => {\n    <span class="fn">setCount</span>(c => c + <span class="num">1</span>);\n  }, []); <span class="cm">// no deps needed — uses functional update</span>\n\n  <span class="kw">return</span> &lt;<span class="cls">Child</span> <span class="ann">onClick</span>={handleClick} /&gt;;\n}`,
        out: "(stable onClick reference, Child doesn't re-render)" },
      { code: "React.memo", desc: "Wraps a component to skip re-rendering if props haven't changed. Works best with useCallback/useMemo for prop stability.",
        syn: `<span class="kw">import</span> { memo } <span class="kw">from</span> <span class="str">'react'</span>;\n\n<span class="cm">// Only re-renders if name or score props change</span>\n<span class="kw">const</span> <span class="cls">ScoreRow</span> = <span class="fn">memo</span>(({ name, score }) => (\n  &lt;<span class="cls">tr</span>&gt;\n    &lt;<span class="cls">td</span>&gt;{name}&lt;/<span class="cls">td</span>&gt;\n    &lt;<span class="cls">td</span>&gt;{score}&lt;/<span class="cls">td</span>&gt;\n  &lt;/<span class="cls">tr</span>&gt;\n));\n\n<span class="cm">// Custom comparison</span>\n<span class="kw">const</span> <span class="cls">Item</span> = <span class="fn">memo</span>(<span class="cls">Component</span>, (prev, next) => prev.id === next.id);`,
        out: "(component skips re-render if props unchanged)" },
    ]
  },
  {
    id: "react-a11y", name: "Accessibility (a11y)", color: "#34d399",
    tBg: "rgba(52,211,153,0.12)", tC: "#34d399",
    items: [
      { code: "aria-label", desc: "Use aria-label to describe interactive elements that have no visible text. Essential for icon buttons, close buttons, and inputs without a visible label.",
        syn: `<span class="cm">// ✗ DON'T — screen reader just says "button"</span>\n&lt;<span class="cls">button</span> <span class="ann">onClick</span>={onClose}&gt;✕&lt;/<span class="cls">button</span>&gt;\n\n<span class="cm">// ✓ DO — screen reader says "Close menu"</span>\n&lt;<span class="cls">button</span> <span class="ann">onClick</span>={onClose} <span class="ann">aria-label</span>=<span class="str">"Close menu"</span>&gt;✕&lt;/<span class="cls">button</span>&gt;\n\n<span class="cm">// ✓ Search input with no visible label</span>\n&lt;<span class="cls">input</span>\n  <span class="ann">type</span>=<span class="str">"search"</span>\n  <span class="ann">aria-label</span>=<span class="str">"Search topics"</span>\n  <span class="ann">placeholder</span>=<span class="str">"Search..."</span>\n/&gt;\n\n<span class="cm">// ✓ Nav landmark with label</span>\n&lt;<span class="cls">nav</span> <span class="ann">aria-label</span>=<span class="str">"Main navigation"</span>&gt;\n  ...\n&lt;/<span class="cls">nav</span>&gt;`,
        out: "(screen readers now announce the element's purpose)" },
      { code: "aria-labelledby", desc: "Links an element to a visible label elsewhere in the DOM using its ID. Preferred over aria-label when a visible heading or label already exists on screen.",
        syn: `<span class="kw">function</span> <span class="cls">SearchSection</span>() {\n  <span class="kw">return</span> (\n    &lt;<span class="cls">section</span>&gt;\n      &lt;<span class="cls">h2</span> <span class="ann">id</span>=<span class="str">"search-heading"</span>&gt;Find a Topic&lt;/<span class="cls">h2</span>&gt;\n\n      &lt;<span class="cm">// input inherits the h2 as its label</span>&gt;\n      &lt;<span class="cls">input</span>\n        <span class="ann">type</span>=<span class="str">"text"</span>\n        <span class="ann">aria-labelledby</span>=<span class="str">"search-heading"</span>\n        <span class="ann">placeholder</span>=<span class="str">"Type here..."</span>\n      /&gt;\n    &lt;/<span class="cls">section</span>&gt;\n  );\n}\n\n<span class="cm">// Can reference multiple IDs (space-separated)</span>\n&lt;<span class="cls">input</span> <span class="ann">aria-labelledby</span>=<span class="str">"first-name-label required-label"</span> /&gt;`,
        out: "(input announced as 'Find a Topic' by screen readers)" },
      { code: "aria-expanded & aria-hidden", desc: "aria-expanded signals whether a collapsible section is open or closed. aria-hidden removes decorative elements (icons, arrows) from the accessibility tree so they are not read aloud.",
        syn: `<span class="kw">function</span> <span class="cls">Accordion</span>({ title, children }) {\n  <span class="kw">const</span> [open, setOpen] = <span class="fn">useState</span>(<span class="kw">false</span>);\n\n  <span class="kw">return</span> (\n    &lt;<span class="cls">div</span>&gt;\n      &lt;<span class="cls">button</span>\n        <span class="ann">aria-expanded</span>={open}\n        <span class="ann">onClick</span>={() => <span class="fn">setOpen</span>(o => \!o)}\n      &gt;\n        {title}\n        <span class="cm">{/* hide decorative arrow from screen readers */}</span>\n        &lt;<span class="cls">span</span> <span class="ann">aria-hidden</span>=<span class="str">"true"</span>&gt;{open ? <span class="str">"▲"</span> : <span class="str">"▼"</span>}&lt;/<span class="cls">span</span>&gt;\n      &lt;/<span class="cls">button</span>&gt;\n\n      {open && &lt;<span class="cls">div</span>&gt;{children}&lt;/<span class="cls">div</span>&gt;}\n    &lt;/<span class="cls">div</span>&gt;\n  );\n}`,
        out: '(button announces "expanded" or "collapsed" to screen readers)' },
      { code: "aria-live", desc: "Marks a region as live so screen readers automatically announce content changes. Use 'polite' for non-urgent updates (waits for user to finish), 'assertive' for critical alerts (interrupts immediately).",
        syn: `<span class="kw">function</span> <span class="cls">StatusMessage</span>() {\n  <span class="kw">const</span> [msg, setMsg] = <span class="fn">useState</span>(<span class="str">""</span>);\n\n  <span class="kw">const</span> <span class="fn">handleSave</span> = <span class="kw">async</span> () => {\n    <span class="kw">await</span> <span class="fn">saveData</span>();\n    <span class="fn">setMsg</span>(<span class="str">"Changes saved successfully\!"</span>);\n  };\n\n  <span class="kw">return</span> (\n    &lt;<span class="cls">div</span>&gt;\n      &lt;<span class="cls">button</span> <span class="ann">onClick</span>={handleSave}&gt;Save&lt;/<span class="cls">button</span>&gt;\n\n      <span class="cm">{/* polite = waits for user, then announces */}</span>\n      &lt;<span class="cls">p</span> <span class="ann">aria-live</span>=<span class="str">"polite"</span> <span class="ann">aria-atomic</span>=<span class="str">"true"</span>&gt;\n        {msg}\n      &lt;/<span class="cls">p</span>&gt;\n    &lt;/<span class="cls">div</span>&gt;\n  );\n}\n\n<span class="cm">// 'assertive' for errors — interrupts immediately</span>\n&lt;<span class="cls">p</span> <span class="ann">aria-live</span>=<span class="str">"assertive"</span>&gt;{errorMsg}&lt;/<span class="cls">p</span>&gt;`,
        out: '(screen reader announces "Changes saved successfully!" after save)' },
      { code: "Focus management with useRef", desc: "Move keyboard focus programmatically when content changes. Open a modal → focus the modal. Close it → return focus to the trigger button. Prevents keyboard users from getting lost.",
        syn: `<span class="kw">import</span> { useRef, useState } <span class="kw">from</span> <span class="str">'react'</span>;\n\n<span class="kw">function</span> <span class="cls">Modal</span>() {\n  <span class="kw">const</span> [open, setOpen] = <span class="fn">useState</span>(<span class="kw">false</span>);\n  <span class="kw">const</span> modalRef   = <span class="fn">useRef</span>(<span class="kw">null</span>);\n  <span class="kw">const</span> triggerRef = <span class="fn">useRef</span>(<span class="kw">null</span>);\n\n  <span class="kw">const</span> <span class="fn">openModal</span> = () => {\n    <span class="fn">setOpen</span>(<span class="kw">true</span>);\n    <span class="fn">setTimeout</span>(() => modalRef.current?.<span class="fn">focus</span>(), <span class="num">0</span>);\n  };\n\n  <span class="kw">const</span> <span class="fn">closeModal</span> = () => {\n    <span class="fn">setOpen</span>(<span class="kw">false</span>);\n    triggerRef.current?.<span class="fn">focus</span>(); <span class="cm">// return focus to trigger</span>\n  };\n\n  <span class="kw">return</span> (\n    &lt;<span class="cls">div</span>&gt;\n      &lt;<span class="cls">button</span> <span class="ann">ref</span>={triggerRef} <span class="ann">onClick</span>={openModal}&gt;Open&lt;/<span class="cls">button</span>&gt;\n      {open && (\n        &lt;<span class="cls">dialog</span>\n          <span class="ann">ref</span>={modalRef}\n          <span class="ann">tabIndex</span>={-<span class="num">1</span>}\n          <span class="ann">aria-modal</span>=<span class="str">"true"</span>\n          <span class="ann">aria-label</span>=<span class="str">"Settings dialog"</span>\n        &gt;\n          &lt;<span class="cls">button</span> <span class="ann">onClick</span>={closeModal}&gt;Close&lt;/<span class="cls">button</span>&gt;\n        &lt;/<span class="cls">dialog</span>&gt;\n      )}\n    &lt;/<span class="cls">div</span>&gt;\n  );\n}`,

      { code: "Accessible forms", desc: "Always link labels to inputs with htmlFor + id. Use aria-describedby for helper text and aria-invalid for validation errors so screen readers announce them.",

      code:`import { useState } from 'react';

function TodoApp() {
  const [todos, setTodos] = useState([
    { id: 1, text: 'Learn React', done: false },
    { id: 2, text: 'Build a project', done: false },
  ]);
  const [input, setInput] = useState('');

  const add = () => {
    if (!input.trim()) return; // stop if the input is empty
    setTodos(previousTodos => [
      ...previousTodos,
      { id: Date.now(), text: input.trim(), done: false },
    ]);
    setInput('');
  };

  const toggle = (id) => setTodos(previousTodos =>
    previousTodos.map(todo =>
      todo.id === id ? { ...todo, done: !todo.done } : todo
    )
  ); // id = todo item to update

  const remove = (id) => setTodos(previousTodos =>
    previousTodos.filter(todo => todo.id !== id)
  ); // id = todo item to delete

  return (
    <div style={{ maxWidth: '400px', margin: '2rem auto' }}>
      <h1>Todo List</h1>

      <div style={{ display: 'flex', gap: '0.5rem', marginBottom: '1rem' }}>

          style={{ flex: 1 }}

        <button onClick={add}>Add</button>

    { name:"Data Fetcher", diff:"int", desc:"Fetch and display posts from an API with loading and error states.", tags:["useEffect","fetch","async","loading"],
      what:"The classic data-fetching pattern: useEffect triggers fetch, state manages loading/error/data, early returns handle edge cases.",
      code:`import { useEffect, useState } from 'react';

function DataFetcher() {
  const [posts, setPosts] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState('');

  useEffect(() => {
    let ignore = false; // prevents state update if component unmounts

    async function loadPosts() {
      try {
        setLoading(true);
        setError('');

        const response = await fetch(
          'https://jsonplaceholder.typicode.com/posts?_limit=5'
        );

        if (!response.ok) {
          throw new Error('Failed to load posts');
        }

        const data = await response.json();

        if (!ignore) {
          setPosts(data);
        }
      } catch (err) {
        if (!ignore) {
          setError(err.message); // err = the thrown error object
        }
      } finally {
        if (!ignore) {
          setLoading(false);
        }
      }
    }

    loadPosts();

    return () => {
      ignore = true;
    };
  }, []);

  if (loading) return <p>Loading...</p>;
  if (error) return <p style={{ color: 'red' }}>Error: {error}</p>;

  return (
    <ul>
      {posts.map((post) => (
        <li key={post.id}>
          <strong>{post.title}</strong>
          <p>{post.body.slice(0, 60)}...</p>
        </li>
      ))}
    </ul>
  );
}

export default DataFetcher;`,
      out:"5 posts from API with title and body preview" },
    { name:"Theme Toggle (Context)", diff:"int", desc:"Light/dark theme toggle using Context API.", tags:["useContext","createContext","custom-hooks"],
      what:"Shows Context API for global state without prop drilling. A custom hook makes consumption clean and safe.",
      code:`import { createContext, useContext, useState } from 'react';

const ThemeContext = createContext(null);

function ThemeProvider({ children }) {
  const [dark, setDark] = useState(true);

  const value = {
    dark,
    toggle: () => setDark(previousDark => !previousDark),
  };

  return (
    <ThemeContext.Provider value={value}>
      {children} {/* children = components wrapped by ThemeProvider */}
    </ThemeContext.Provider>
  );
}

function useTheme() {
  const contextValue = useContext(ThemeContext);

  if (!contextValue) {
    throw new Error('useTheme must be used inside ThemeProvider');
  }

  return contextValue;
}

function Page() {
  const { dark, toggle } = useTheme();

  return (
    <div style={{
      minHeight: '100vh',
      background: dark ? '#0d0f14' : '#f8fafc',
      color: dark ? '#e8eaf0' : '#0d0f14',
      display: 'flex',
      flexDirection: 'column',
      alignItems: 'center',
      justifyContent: 'center',
    }}>
      <h1>{dark ? '🌙 Dark Mode' : '☀️ Light Mode'}</h1>
      <button onClick={toggle}>Toggle Theme</button>
    </div>
  );
}

function App() {
  return (
    <ThemeProvider>
      <Page />
    </ThemeProvider>
  );
}

export default App;`,
