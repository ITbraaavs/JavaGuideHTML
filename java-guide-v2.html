        out: "Rex says: Woof!\nBella, age 5, Poodle" },
      { code: "constructor", desc: "Special method with same name as the class. Runs automatically when new is called. Used to set initial values.",
        syn: `<span class="kw">class</span> <span class="cls">Car</span> {\n    <span class="cls">String</span> brand;\n    <span class="kw">int</span> year;\n\n    <span class="cls">Car</span>(<span class="cls">String</span> brand, <span class="kw">int</span> year) {  <span class="cm">// constructor</span>\n        <span class="kw">this</span>.brand = brand;\n        <span class="kw">this</span>.year  = year;\n    }\n\n    <span class="kw">void</span> <span class="fn">info</span>() {\n        <span class="cls">System</span>.<span class="fn">out</span>.<span class="fn">println</span>(year + <span class="str">" "</span> + brand);\n    }\n}\n\n<span class="cls">Car</span> c = <span class="kw">new</span> <span class="cls">Car</span>(<span class="str">"Toyota"</span>, <span class="num">2024</span>);\nc.<span class="fn">info</span>();`,
        out: "2024 Toyota" },
      { code: "this", desc: "Refers to the current object. Used to distinguish fields from parameters with the same name.",
        syn: `<span class="kw">class</span> <span class="cls">Person</span> {\n    <span class="cls">String</span> name;  <span class="cm">// field</span>\n    <span class="kw">int</span> age;\n\n    <span class="cls">Person</span>(<span class="cls">String</span> name, <span class="kw">int</span> age) {\n        <span class="kw">this</span>.name = name;  <span class="cm">// this.name = field, name = param</span>\n        <span class="kw">this</span>.age  = age;\n    }\n\n    <span class="kw">void</span> <span class="fn">greet</span>() {\n        <span class="cls">System</span>.<span class="fn">out</span>.<span class="fn">println</span>(<span class="str">"I am "</span> + <span class="kw">this</span>.name);\n    }\n}\n<span class="kw">new</span> <span class="cls">Person</span>(<span class="str">"Ana"</span>, <span class="num">22</span>).<span class="fn">greet</span>();`,
        out: "I am Ana" },
      { code: "extends — Inheritance", desc: "Child class inherits all fields and methods from parent. Java supports single inheritance only (one parent). 'is-a' relationship.",
        syn: `<span class="kw">class</span> <span class="cls">Animal</span> {\n    <span class="cls">String</span> name;\n    <span class="kw">void</span> <span class="fn">breathe</span>() { <span class="cls">System</span>.<span class="fn">out</span>.<span class="fn">println</span>(name + <span class="str">" breathes"</span>); }\n}\n\n<span class="kw">class</span> <span class="cls">Dog</span> <span class="kw">extends</span> <span class="cls">Animal</span> {  <span class="cm">// Dog IS-A Animal</span>\n    <span class="kw">void</span> <span class="fn">bark</span>() { <span class="cls">System</span>.<span class="fn">out</span>.<span class="fn">println</span>(name + <span class="str">": Woof!"</span>); }\n}\n\n<span class="cls">Dog</span> d = <span class="kw">new</span> <span class="cls">Dog</span>();\nd.name = <span class="str">"Rex"</span>;\nd.<span class="fn">breathe</span>();  <span class="cm">// inherited</span>\nd.<span class="fn">bark</span>();     <span class="cm">// own method</span>`,
        out: "Rex breathes\nRex: Woof!" },
      { code: "super", desc: "Calls parent class constructor or method. super() must be the first line in a child constructor.",
        syn: `<span class="kw">class</span> <span class="cls">Animal</span> {\n    <span class="cls">String</span> name;\n    <span class="cls">Animal</span>(<span class="cls">String</span> n) { name = n; <span class="cls">System</span>.<span class="fn">out</span>.<span class="fn">println</span>(<span class="str">"Animal: "</span>+n); }\n    <span class="kw">void</span> <span class="fn">speak</span>() { <span class="cls">System</span>.<span class="fn">out</span>.<span class="fn">println</span>(<span class="str">"..."</span>); }\n}\n<span class="kw">class</span> <span class="cls">Dog</span> <span class="kw">extends</span> <span class="cls">Animal</span> {\n    <span class="cls">Dog</span>(<span class="cls">String</span> n) { <span class="kw">super</span>(n); }  <span class="cm">// calls Animal constructor</span>\n    <span class="kw">void</span> <span class="fn">speak</span>() {\n        <span class="kw">super</span>.<span class="fn">speak</span>();           <span class="cm">// calls Animal.speak()</span>\n        <span class="cls">System</span>.<span class="fn">out</span>.<span class="fn">println</span>(name + <span class="str">": Woof!"</span>);\n    }\n}\n<span class="kw">new</span> <span class="cls">Dog</span>(<span class="str">"Rex"</span>).<span class="fn">speak</span>();`,
        out: "Animal: Rex\n...\nRex: Woof!" },
      { code: "@Override — Polymorphism", desc: "Child class redefines a parent method. At runtime, Java calls the actual object's version. This is runtime polymorphism.",
        syn: `<span class="kw">class</span> <span class="cls">Shape</span> {\n    <span class="kw">double</span> <span class="fn">area</span>() { <span class="kw">return</span> <span class="num">0</span>; }\n}\n<span class="kw">class</span> <span class="cls">Circle</span> <span class="kw">extends</span> <span class="cls">Shape</span> {\n    <span class="kw">double</span> r;\n    <span class="cls">Circle</span>(<span class="kw">double</span> r) { <span class="kw">this</span>.r = r; }\n    <span class="ann">@Override</span> <span class="kw">double</span> <span class="fn">area</span>() { <span class="kw">return</span> Math.PI * r * r; }\n}\n<span class="kw">class</span> <span class="cls">Rect</span> <span class="kw">extends</span> <span class="cls">Shape</span> {\n    <span class="kw">double</span> w, h;\n    <span class="cls">Rect</span>(<span class="kw">double</span> w, <span class="kw">double</span> h) { <span class="kw">this</span>.w=w; <span class="kw">this</span>.h=h; }\n    <span class="ann">@Override</span> <span class="kw">double</span> <span class="fn">area</span>() { <span class="kw">return</span> w * h; }\n}\n\n<span class="cls">Shape</span>[] shapes = { <span class="kw">new</span> <span class="cls">Circle</span>(<span class="num">5</span>), <span class="kw">new</span> <span class="cls">Rect</span>(<span class="num">4</span>, <span class="num">6</span>) };\n<span class="kw">for</span> (<span class="cls">Shape</span> s : shapes)\n    <span class="cls">System</span>.<span class="fn">out</span>.<span class="fn">printf</span>(<span class="str">"%.2f%n"</span>, s.<span class="fn">area</span>());`,
        out: "78.54\n24.00" },
      { code: "interface", desc: "Defines a contract — methods a class MUST implement. A class can implement multiple interfaces (unlike extends).",
        syn: `<span class="kw">interface</span> <span class="cls">Drawable</span>  { <span class="kw">void</span> <span class="fn">draw</span>(); }\n<span class="kw">interface</span> <span class="cls">Resizable</span> { <span class="kw">void</span> <span class="fn">resize</span>(<span class="kw">double</span> f); }\n\n<span class="kw">class</span> <span class="cls">Circle</span> <span class="kw">implements</span> <span class="cls">Drawable</span>, <span class="cls">Resizable</span> {\n    <span class="kw">double</span> r = <span class="num">5</span>;\n    <span class="kw">public void</span> <span class="fn">draw</span>()              { <span class="cls">System</span>.<span class="fn">out</span>.<span class="fn">println</span>(<span class="str">"Circle r="</span>+r); }\n    <span class="kw">public void</span> <span class="fn">resize</span>(<span class="kw">double</span> f) { r *= f; }\n}\n\n<span class="cls">Circle</span> c = <span class="kw">new</span> <span class="cls">Circle</span>();\nc.<span class="fn">draw</span>();\nc.<span class="fn">resize</span>(<span class="num">2.0</span>);\nc.<span class="fn">draw</span>();`,
        out: "Circle r=5.0\nCircle r=10.0" },
      { code: "abstract class", desc: "Cannot be instantiated directly. Mix of abstract methods (no body — must override) and regular methods (shared logic).",
        syn: `<span class="kw">abstract class</span> <span class="cls">Vehicle</span> {\n    <span class="cls">String</span> brand;\n    <span class="kw">abstract void</span> <span class="fn">startEngine</span>();  <span class="cm">// subclass MUST implement</span>\n    <span class="kw">void</span> <span class="fn">honk</span>() { <span class="cls">System</span>.<span class="fn">out</span>.<span class="fn">println</span>(brand + <span class="str">": Beep!"</span>); }\n}\n\n<span class="kw">class</span> <span class="cls">Car</span> <span class="kw">extends</span> <span class="cls">Vehicle</span> {\n    <span class="cls">Car</span>(<span class="cls">String</span> b) { brand = b; }\n    <span class="kw">void</span> <span class="fn">startEngine</span>() {\n        <span class="cls">System</span>.<span class="fn">out</span>.<span class="fn">println</span>(brand + <span class="str">": Vroom!"</span>);\n    }\n}\n<span class="cls">Car</span> c = <span class="kw">new</span> <span class="cls">Car</span>(<span class="str">"BMW"</span>);\nc.<span class="fn">startEngine</span>();\nc.<span class="fn">honk</span>();`,
        out: "BMW: Vroom!\nBMW: Beep!" },
      { code: "Encapsulation", desc: "Hide fields with private, expose via public getters/setters. Prevents invalid data from the outside.",
        syn: `<span class="kw">class</span> <span class="cls">BankAccount</span> {\n    <span class="kw">private double</span> balance;\n    <span class="cls">BankAccount</span>(<span class="kw">double</span> b) { balance = b; }\n    <span class="kw">public double</span> <span class="fn">getBalance</span>()       { <span class="kw">return</span> balance; }\n    <span class="kw">public void</span>   <span class="fn">deposit</span>(<span class="kw">double</span> a) {\n        <span class="kw">if</span> (a > <span class="num">0</span>) balance += a;\n    }\n    <span class="kw">public void</span>   <span class="fn">withdraw</span>(<span class="kw">double</span> a) {\n        <span class="kw">if</span> (a <= balance) balance -= a;\n        <span class="kw">else</span> <span class="cls">System</span>.<span class="fn">out</span>.<span class="fn">println</span>(<span class="str">"Insufficient funds"</span>);\n    }\n}\n<span class="cls">BankAccount</span> acc = <span class="kw">new</span> <span class="cls">BankAccount</span>(<span class="num">1000</span>);\nacc.<span class="fn">deposit</span>(<span class="num">500</span>); acc.<span class="fn">withdraw</span>(<span class="num">200</span>);\n<span class="cls">System</span>.<span class="fn">out</span>.<span class="fn">println</span>(<span class="str">"$"</span> + acc.<span class="fn">getBalance</span>());`,
        out: "$1300.0" },

      { code: "protected", desc: "Accessible within the same package AND in subclasses (even different packages).",

    { name:"Student grade manager", diff:"int", desc:"Stores students and their grades in a HashMap.", tags:["HashMap","OOP","collections"],
      what:"A real-world-style program using classes, HashMap and ArrayList to manage student records.",
      code:`import java.util.*;

public class GradeManager {
    static HashMap<String, ArrayList<Integer>> students = new HashMap<>();

    static void addGrade(String name, int grade) {
        students.putIfAbsent(name, new ArrayList<>());
        students.get(name).add(grade);
    }

    static double average(ArrayList<Integer> grades) {
        int sum = 0;
        for (int g : grades) sum += g;
        return (double) sum / grades.size();
    }

    public static void main(String[] args) {
        addGrade("Alice", 95); addGrade("Alice", 88); addGrade("Alice", 92);
        addGrade("Bob",   78); addGrade("Bob",   82); addGrade("Bob",   75);
        addGrade("Maria", 99); addGrade("Maria", 97); addGrade("Maria", 100);

        System.out.println("=== Grade Report ===");
        for (var entry : students.entrySet()) {
            String name = entry.getKey();
            double avg = average(entry.getValue());
            String letter = avg >= 90 ? "A" : avg >= 80 ? "B" : "C";
            System.out.printf("%-8s Avg: %.1f  Grade: %s%n", name, avg, letter);
        }
    }
}`,      out:"=== Grade Report ===\nAlice    Avg: 91.7  Grade: A\nBob      Avg: 78.3  Grade: C\nMaria    Avg: 98.7  Grade: A"},

        this.owner = owner;
        this.balance = initialBalance;

        if (amount <= 0) { System.out.println("Invalid amount."); return; }

    public void withdraw(double amount) {
        if (amount > balance) { System.out.println("Insufficient funds."); return; }
        balance -= amount;

    { name:"Bubble sort algorithm", diff:"int", desc:"Sorts an array using the bubble sort algorithm.", tags:["arrays","sorting","loops"],
      what:"Repeatedly compares adjacent elements and swaps them if out of order until the array is sorted.",
      code:`import java.util.Arrays;

public class BubbleSort {
    static void bubbleSort(int[] arr) {
        int n = arr.length;
        for (int i = 0; i < n - 1; i++) {
            for (int j = 0; j < n - i - 1; j++) {
                if (arr[j] > arr[j + 1]) {
                    int temp = arr[j];
                    arr[j] = arr[j + 1];
                    arr[j + 1] = temp;
                }
            }
        }
    }

    public static void main(String[] args) {
        int[] nums = {64, 34, 25, 12, 22, 11, 90};
        System.out.println("Before: " + Arrays.toString(nums));
        bubbleSort(nums);
        System.out.println("After:  " + Arrays.toString(nums));

}`,      out:"Before: [64, 34, 25, 12, 22, 11, 90]\nAfter:  [11, 12, 22, 25, 34, 64, 90]"},

      code:`public class MyLinkedList<T> {
    private class Node {
        T data;
        Node next;
        Node(T data) { this.data = data; }
    }

    private Node head;
    private int size;

    public void addFirst(T value) {
        Node n = new Node(value);
        n.next = head;
        head = n;
        size++;
    }

    public void addLast(T value) {
        Node n = new Node(value);
        if (head == null) { head = n; size++; return; }
        Node cur = head;
        while (cur.next != null) cur = cur.next;
        cur.next = n;
        size++;
    }

    public void print() {
        Node cur = head;
        System.out.print("[");
        while (cur != null) {
            System.out.print(cur.data + (cur.next != null ? " -> " : ""));
            cur = cur.next;
        }
        System.out.println("]  size=" + size);
    }

    public static void main(String[] args) {
        MyLinkedList<Integer> list = new MyLinkedList<>();
        list.addLast(10); list.addLast(20); list.addLast(30);
        list.addFirst(5);
        list.print();

    { name:"Generic stack", diff:"adv", desc:"A type-safe stack using Java generics.", tags:["generics","OOP","data structures"],
      what:"Uses Java generics <T> so the same Stack class can hold integers, strings, or any object.",
      code:`public class GenericStack<T> {
    private Object[] data;
    private int top = -1;
    private int capacity;

    public GenericStack(int capacity) {
        this.capacity = capacity;
        data = new Object[capacity];
    }

    public void push(T item) {
        if (top == capacity - 1) { System.out.println("Stack full!"); return; }
        data[++top] = item;
    }

    @SuppressWarnings("unchecked")
    public T pop() {
        if (top == -1) throw new RuntimeException("Stack empty!");
        return (T) data[top--];
    }

    @SuppressWarnings("unchecked")
    public T peek() { return (T) data[top]; }

    public boolean isEmpty() { return top == -1; }
    public int size() { return top + 1; }

    public static void main(String[] args) {
        GenericStack<String> s = new GenericStack<>(5);
        s.push("Java"); s.push("Python"); s.push("C++");
        System.out.println("Size: " + s.size());
        System.out.println("Peek: " + s.peek());
        System.out.println("Pop:  " + s.pop());
        System.out.println("Pop:  " + s.pop());
        System.out.println("Size: " + s.size());
    }
}`,      out:"Size: 3\nPeek: C++\nPop:  C++\nPop:  Python\nSize: 1"},

    { name:"Binary search algorithm", diff:"adv", desc:"Efficiently searches a sorted array in O(log n).", tags:["algorithms","arrays","recursion"],
      what:"Binary search halves the search space every step, making it far faster than linear search for large arrays.",
      code:`public class BinarySearch {
    static int searchIterative(int[] arr, int target) {
        int left = 0, right = arr.length - 1;
        while (left <= right) {
            int mid = left + (right - left) / 2;
            if (arr[mid] == target) return mid;
            if (arr[mid] < target)  left  = mid + 1;
            else                    right = mid - 1;
        }
        return -1;
    }

    static int searchRecursive(int[] arr, int target, int left, int right) {
        if (left > right) return -1;
        int mid = left + (right - left) / 2;
        if (arr[mid] == target) return mid;
        if (arr[mid] < target)  return searchRecursive(arr, target, mid+1, right);
        return searchRecursive(arr, target, left, mid-1);
    }

    public static void main(String[] args) {
        int[] arr = {2, 5, 8, 12, 16, 23, 38, 45, 56, 72, 91};
        int idx = searchIterative(arr, 23);
        System.out.println("Search 23 (iterative): index " + idx);
        idx = searchRecursive(arr, 56, 0, arr.length-1);
        System.out.println("Search 56 (recursive): index " + idx);
        idx = searchIterative(arr, 99);
        System.out.println("Search 99: " + (idx == -1 ? "not found" : "index " + idx));
    }
}`,      out:"Search 23 (iterative): index 5\nSearch 56 (recursive): index 8\nSearch 99: not found"},

        syn: `<span class="cm">// ✗ DON'T — unhandled rejection crashes silently</span>\n<span class="kw">async function</span> <span class="fn">getData</span>() {\n  <span class="kw">const</span> res = <span class="kw">await</span> <span class="fn">fetch</span>(<span class="str">"/api"</span>); <span class="cm">// error = silent crash</span>\n}\n\n<span class="cm">// ✓ DO — always wrap in try/catch</span>\n<span class="kw">async function</span> <span class="fn">getData</span>() {\n  <span class="kw">try</span> {\n    <span class="kw">const</span> res = <span class="kw">await</span> <span class="fn">fetch</span>(<span class="str">"/api"</span>);\n    <span class="kw">const</span> data = <span class="kw">await</span> res.<span class="fn">json</span>();\n    <span class="kw">return</span> data;\n  } <span class="kw">catch</span> (err) {\n    <span class="fn">console</span>.<span class="fn">error</span>(<span class="str">"Fetch failed:"</span>, err);\n  }\n}`,
        out: "// Every await needs a try/catch" },
      { code: "Don't mutate arrays/objects",
        desc: "Mutating data in place causes hard-to-find bugs, especially in React. Create new arrays/objects using spread, map, filter, or Object.assign instead.",
        syn: `<span class="cm">// ✗ DON'T — mutates the original array</span>\n<span class="kw">const</span> nums = [<span class="num">1</span>, <span class="num">2</span>, <span class="num">3</span>];\nnums.<span class="fn">push</span>(<span class="num">4</span>);             <span class="cm">// mutates in place</span>\nnums[<span class="num">0</span>] = <span class="num">99</span>;             <span class="cm">// mutates in place</span>\n\n<span class="cm">// ✓ DO — create new arrays</span>\n<span class="kw">const</span> added   = [...nums, <span class="num">4</span>];          <span class="cm">// [1,2,3,4]</span>\n<span class="kw">const</span> updated = nums.<span class="fn">map</span>((n, i) => i === <span class="num">0</span> ? <span class="num">99</span> : n);\n<span class="kw">const</span> removed = nums.<span class="fn">filter</span>(n => n !== <span class="num">2</span>); <span class="cm">// [1,3]</span>`,
        out: "// Immutable updates prevent bugs in complex apps" },
      { code: "Other key rules",
        desc: "A quick checklist of important JavaScript best practices every developer should follow.",
        syn: `<span class="cm">// ✓ DO</span>\n<span class="kw">const</span> { name, age } = user;     <span class="cm">// destructure objects</span>\n<span class="kw">const</span> full = <span class="str">\`Hi \${name}!\`</span>;     <span class="cm">// template literals over +</span>\nuser?.profile?.bio;              <span class="cm">// optional chaining</span>\nvalue ?? <span class="str">"default"</span>;            <span class="cm">// nullish coalescing</span>\n\n<span class="cm">// ✗ DON'T</span>\n<span class="kw">eval</span>(<span class="str">"code here"</span>);              <span class="cm">// security risk — never use eval()</span>\n<span class="kw">for</span> (<span class="kw">let</span> i<span class="op">=</span><span class="num">0</span>; i<span class="op">&lt;</span>arr.length; i++) <span class="cm">// ← prefer .forEach / .map</span>\n<span class="kw">typeof</span> x === <span class="str">"undefined"</span>;      <span class="cm">// prefer: x == null (checks both)</span>`,
        out: "// Modern JS is expressive — use its features" },
    ]
  },
  {
    id: "js-decl", name: "Declarations & Scope", color: "#60a5fa",
    tBg: "rgba(96,165,250,0.12)", tC: "#60a5fa",
    items: [
      { code: "let", desc: "Block-scoped variable. Can be reassigned. Cannot be accessed before declaration (temporal dead zone).",
        syn: `<span class="kw">let</span> count = <span class="num">0</span>;\ncount = <span class="num">5</span>; <span class="cm">// ✓ reassignment OK</span>\n\n<span class="kw">let</span> x = <span class="num">10</span>;\n<span class="kw">if</span> (<span class="kw">true</span>) {\n  <span class="kw">let</span> x = <span class="num">99</span>; <span class="cm">// different block scope</span>\n  <span class="fn">console</span>.<span class="fn">log</span>(x); <span class="cm">// 99</span>\n}\n<span class="fn">console</span>.<span class="fn">log</span>(x); <span class="cm">// 10</span>`,
        out: "99\n10" },
      { code: "const", desc: "Block-scoped constant. Cannot be reassigned. Objects/arrays declared with const can still be mutated.",
        syn: `<span class="kw">const</span> PI = <span class="num">3.14159</span>;\n<span class="cm">// PI = 3; ← TypeError\!</span>\n\n<span class="kw">const</span> arr = [<span class="num">1</span>, <span class="num">2</span>, <span class="num">3</span>];\narr.<span class="fn">push</span>(<span class="num">4</span>); <span class="cm">// ✓ mutation OK</span>\n<span class="fn">console</span>.<span class="fn">log</span>(arr);\n\n<span class="kw">const</span> obj = { name: <span class="str">"Java"</span> };\nobj.name = <span class="str">"JS"</span>; <span class="cm">// ✓ property change OK</span>\n<span class="fn">console</span>.<span class="fn">log</span>(obj.name);`,
        out: "[1, 2, 3, 4]\nJS" },
      { code: "var", desc: "Function-scoped (legacy). Hoisted to top of function. Avoid in modern JS — prefer let/const.",
        syn: `<span class="fn">console</span>.<span class="fn">log</span>(x); <span class="cm">// undefined (hoisted, not an error)</span>\n<span class="kw">var</span> x = <span class="num">5</span>;\n<span class="fn">console</span>.<span class="fn">log</span>(x); <span class="cm">// 5</span>\n\n<span class="kw">function</span> <span class="fn">test</span>() {\n  <span class="kw">var</span> inside = <span class="str">"only here"</span>;\n  <span class="fn">console</span>.<span class="fn">log</span>(inside);\n}\n<span class="fn">test</span>();`,
        out: "undefined\n5\nonly here" },
      { code: "typeof", desc: "Returns a string describing the type of a value. typeof null === 'object' is a famous historical quirk.",
        syn: `<span class="fn">console</span>.<span class="fn">log</span>(<span class="kw">typeof</span> <span class="num">42</span>);           <span class="cm">// "number"</span>\n<span class="fn">console</span>.<span class="fn">log</span>(<span class="kw">typeof</span> <span class="str">"hello"</span>);      <span class="cm">// "string"</span>\n<span class="fn">console</span>.<span class="fn">log</span>(<span class="kw">typeof</span> <span class="kw">true</span>);         <span class="cm">// "boolean"</span>\n<span class="fn">console</span>.<span class="fn">log</span>(<span class="kw">typeof</span> <span class="kw">undefined</span>);    <span class="cm">// "undefined"</span>\n<span class="fn">console</span>.<span class="fn">log</span>(<span class="kw">typeof</span> <span class="kw">null</span>);         <span class="cm">// "object" ← famous quirk</span>\n<span class="fn">console</span>.<span class="fn">log</span>(<span class="kw">typeof</span> []);           <span class="cm">// "object"</span>\n<span class="fn">console</span>.<span class="fn">log</span>(<span class="kw">typeof</span> <span class="kw">function</span>(){});  <span class="cm">// "function"</span>`,
        out: "\"number\"\n\"string\"\n\"boolean\"\n\"undefined\"\n\"object\"\n\"object\"\n\"function\"" },
      { code: "Destructuring (array)", desc: "Extract values from arrays into variables by position. Use commas to skip elements. Rest (...) collects the remainder.",
        syn: `<span class="kw">const</span> [a, b, c] = [<span class="num">10</span>, <span class="num">20</span>, <span class="num">30</span>];\n<span class="fn">console</span>.<span class="fn">log</span>(a, b, c); <span class="cm">// 10 20 30</span>\n\n<span class="kw">const</span> [first, , third] = [<span class="num">1</span>, <span class="num">2</span>, <span class="num">3</span>]; <span class="cm">// skip second</span>\n<span class="fn">console</span>.<span class="fn">log</span>(first, third);\n\n<span class="kw">const</span> [head, ...rest] = [<span class="num">10</span>, <span class="num">20</span>, <span class="num">30</span>, <span class="num">40</span>];\n<span class="fn">console</span>.<span class="fn">log</span>(head, rest);`,
        out: "10 20 30\n1 3\n10 [20, 30, 40]" },
      { code: "Destructuring (object)", desc: "Extract named properties from objects. Rename with colon, set defaults with =. Works in function parameters too.",
        syn: `<span class="kw">const</span> user = { name: <span class="str">"Maria"</span>, age: <span class="num">25</span>, city: <span class="str">"Manila"</span> };\n<span class="kw">const</span> { name, age } = user;\n<span class="fn">console</span>.<span class="fn">log</span>(name, age);\n\n<span class="cm">// rename + default</span>\n<span class="kw">const</span> { name: fullName, country = <span class="str">"Philippines"</span> } = user;\n<span class="fn">console</span>.<span class="fn">log</span>(fullName);\n<span class="fn">console</span>.<span class="fn">log</span>(country);`,
        out: "Maria 25\nMaria\nPhilippines" },
      { code: "Spread / Rest (...)", desc: "Spread (...) expands iterables. Rest (...) collects remaining elements. Same syntax, opposite purpose.",
        syn: `<span class="kw">const</span> a = [<span class="num">1</span>, <span class="num">2</span>], b = [<span class="num">3</span>, <span class="num">4</span>];\n<span class="kw">const</span> c = [...a, ...b];\n<span class="fn">console</span>.<span class="fn">log</span>(c); <span class="cm">// [1,2,3,4]</span>\n\n<span class="kw">const</span> obj = { x: <span class="num">1</span> };\n<span class="kw">const</span> copy = { ...obj, y: <span class="num">2</span> };\n<span class="fn">console</span>.<span class="fn">log</span>(copy); <span class="cm">// {x:1, y:2}</span>\n\n<span class="kw">function</span> <span class="fn">sum</span>(...nums) { <span class="kw">return</span> nums.<span class="fn">reduce</span>((a,b)=>a+b,<span class="num">0</span>); }\n<span class="fn">console</span>.<span class="fn">log</span>(<span class="fn">sum</span>(<span class="num">1</span>,<span class="num">2</span>,<span class="num">3</span>,<span class="num">4</span>));`,
        out: "[1, 2, 3, 4]\n{x: 1, y: 2}\n10" },
    ]
  },
  {
    id: "js-types", name: "Data Types", color: "#a78bfa",
    tBg: "rgba(167,139,250,0.13)", tC: "#a78bfa",
    items: [
      { code: "number", desc: "Single numeric type for integers and decimals. Special values: Infinity, -Infinity, NaN.",
        syn: `<span class="kw">let</span> n = <span class="num">42</span>, f = <span class="num">3.14</span>;\n<span class="kw">let</span> big = <span class="num">1_000_000</span>; <span class="cm">// underscores for readability</span>\n<span class="fn">console</span>.<span class="fn">log</span>(<span class="num">10</span> / <span class="num">0</span>);           <span class="cm">// Infinity</span>\n<span class="fn">console</span>.<span class="fn">log</span>(<span class="num">0</span>  / <span class="num">0</span>);           <span class="cm">// NaN</span>\n<span class="fn">console</span>.<span class="fn">log</span>(<span class="fn">isNaN</span>(<span class="num">0</span>/<span class="num">0</span>));        <span class="cm">// true</span>\n<span class="fn">console</span>.<span class="fn">log</span>(<span class="cls">Number</span>.<span class="fn">isInteger</span>(<span class="num">4.0</span>)); <span class="cm">// true</span>`,
        out: "Infinity\nNaN\ntrue\ntrue" },
      { code: "string", desc: "Text in single, double, or backtick quotes. Backtick template literals embed expressions with ${}.",
        syn: `<span class="kw">const</span> name = <span class="str">"JavaScript"</span>;\n<span class="kw">const</span> tmpl = <span class="str">\`Hello, \${name}\! 2+2=\${2+2}\`</span>;\n<span class="fn">console</span>.<span class="fn">log</span>(tmpl);\n<span class="fn">console</span>.<span class="fn">log</span>(name.<span class="fn">length</span>);       <span class="cm">// 10</span>\n<span class="fn">console</span>.<span class="fn">log</span>(name[<span class="num">0</span>]);            <span class="cm">// "J"</span>\n<span class="fn">console</span>.<span class="fn">log</span>(name.<span class="fn">toUpperCase</span>()); <span class="cm">// "JAVASCRIPT"</span>`,
        out: "Hello, JavaScript\! 2+2=4\n10\nJ\nJAVASCRIPT" },
      { code: "boolean", desc: "true or false. Falsy: false, 0, '', null, undefined, NaN. Everything else is truthy.",
        syn: `<span class="fn">console</span>.<span class="fn">log</span>(\!\!<span class="num">0</span>);          <span class="cm">// false (falsy)</span>\n<span class="fn">console</span>.<span class="fn">log</span>(\!\!<span class="str">"hello"</span>);    <span class="cm">// true (truthy)</span>\n<span class="fn">console</span>.<span class="fn">log</span>(<span class="cls">Boolean</span>(<span class="str">""</span>));   <span class="cm">// false</span>\n<span class="fn">console</span>.<span class="fn">log</span>(<span class="cls">Boolean</span>(<span class="str">"0"</span>));  <span class="cm">// true\! (non-empty string)</span>\n<span class="fn">console</span>.<span class="fn">log</span>(<span class="kw">true</span> && <span class="str">"yes"</span>); <span class="cm">// "yes" (short-circuit)</span>`,
        out: "false\ntrue\nfalse\ntrue\nyes" },
      { code: "null & undefined", desc: "null = intentionally empty. undefined = not yet assigned. Use === to tell them apart.",
        syn: `<span class="kw">let</span> a;                          <span class="cm">// undefined</span>\n<span class="kw">let</span> b = <span class="kw">null</span>;                   <span class="cm">// intentionally empty</span>\n<span class="fn">console</span>.<span class="fn">log</span>(a);                 <span class="cm">// undefined</span>\n<span class="fn">console</span>.<span class="fn">log</span>(b);                 <span class="cm">// null</span>\n<span class="fn">console</span>.<span class="fn">log</span>(a == b);            <span class="cm">// true (loose)</span>\n<span class="fn">console</span>.<span class="fn">log</span>(a === b);           <span class="cm">// false (strict)</span>\n<span class="fn">console</span>.<span class="fn">log</span>(a ?? <span class="str">"default"</span>);   <span class="cm">// "default"</span>`,
        out: "undefined\nnull\ntrue\nfalse\ndefault" },
      { code: "BigInt", desc: "Arbitrary-precision integers beyond Number.MAX_SAFE_INTEGER. Append n or use BigInt(). Cannot mix with number.",
        syn: `<span class="kw">const</span> big = <span class="num">9007199254740991n</span>;\n<span class="kw">const</span> sum = big + <span class="num">1n</span>;\n<span class="fn">console</span>.<span class="fn">log</span>(sum);\n<span class="fn">console</span>.<span class="fn">log</span>(<span class="kw">typeof</span> big);  <span class="cm">// "bigint"</span>\n<span class="fn">console</span>.<span class="fn">log</span>(<span class="cls">Number</span>.<span class="fn">MAX_SAFE_INTEGER</span>);`,
        out: "9007199254740992n\nbigint\n9007199254740991" },
      { code: "Symbol", desc: "A unique, immutable primitive. Often used as object property keys to avoid name collisions.",
        syn: `<span class="kw">const</span> id1 = <span class="cls">Symbol</span>(<span class="str">"id"</span>);\n<span class="kw">const</span> id2 = <span class="cls">Symbol</span>(<span class="str">"id"</span>);\n<span class="fn">console</span>.<span class="fn">log</span>(id1 === id2);  <span class="cm">// false (always unique)</span>\n<span class="fn">console</span>.<span class="fn">log</span>(<span class="kw">typeof</span> id1);    <span class="cm">// "symbol"</span>\n\n<span class="kw">const</span> obj = { [id1]: <span class="str">"secret"</span> };\n<span class="fn">console</span>.<span class="fn">log</span>(obj[id1]);      <span class="cm">// "secret"</span>`,
        out: "false\nsymbol\nsecret" },
    ]
  },
  {
    id: "js-ops", name: "Operators", color: "#e879f9",
    tBg: "rgba(232,121,249,0.12)", tC: "#e879f9",
    items: [
      { code: "== vs === (equality)", desc: "== does type coercion (loose). === checks value AND type (strict). Always prefer === in modern JavaScript.",
        syn: `<span class="fn">console</span>.<span class="fn">log</span>(<span class="num">5</span> == <span class="str">"5"</span>);     <span class="cm">// true  (coerces string → number)</span>\n<span class="fn">console</span>.<span class="fn">log</span>(<span class="num">5</span> === <span class="str">"5"</span>);    <span class="cm">// false (different types)</span>\n<span class="fn">console</span>.<span class="fn">log</span>(<span class="num">0</span> == <span class="kw">false</span>);   <span class="cm">// true  (both falsy)</span>\n<span class="fn">console</span>.<span class="fn">log</span>(<span class="num">0</span> === <span class="kw">false</span>);  <span class="cm">// false (number vs boolean)</span>\n<span class="fn">console</span>.<span class="fn">log</span>(<span class="kw">null</span> == <span class="kw">undefined</span>);   <span class="cm">// true</span>\n<span class="fn">console</span>.<span class="fn">log</span>(<span class="kw">null</span> === <span class="kw">undefined</span>);  <span class="cm">// false</span>`,
        out: "true\nfalse\ntrue\nfalse\ntrue\nfalse" },
      { code: "Nullish coalescing (??)", desc: "Returns right side only if left is null or undefined. Unlike ||, it doesn't trigger on 0 or empty string.",
        syn: `<span class="kw">const</span> a = <span class="kw">null</span>      ?? <span class="str">"default"</span>; <span class="cm">// "default"</span>\n<span class="kw">const</span> b = <span class="kw">undefined</span>  ?? <span class="str">"default"</span>; <span class="cm">// "default"</span>\n<span class="kw">const</span> c = <span class="num">0</span>          ?? <span class="str">"default"</span>; <span class="cm">// 0  (0 is valid\!)</span>\n<span class="kw">const</span> d = <span class="str">""</span>         ?? <span class="str">"default"</span>; <span class="cm">// "" (empty str valid)</span>\n<span class="fn">console</span>.<span class="fn">log</span>(a, b, c, <span class="str">'"'</span>+d+<span class="str">'"'</span>);`,
        out: "default default 0 \"\"" },
      { code: "Optional chaining (?.)", desc: "Safely access deeply nested properties. Returns undefined instead of throwing TypeError on null/undefined.",
        syn: `<span class="kw">const</span> user = { profile: { name: <span class="str">"Maria"</span> } };\n<span class="fn">console</span>.<span class="fn">log</span>(user?.profile?.name);   <span class="cm">// "Maria"</span>\n<span class="fn">console</span>.<span class="fn">log</span>(user?.address?.city);   <span class="cm">// undefined (no error\!)</span>\n<span class="fn">console</span>.<span class="fn">log</span>(user?.greet?.());       <span class="cm">// undefined (safe call)</span>\n<span class="cm">// Without ?.: user.address.city → TypeError\!</span>`,
        out: "Maria\nundefined\nundefined" },
      { code: "Ternary ( ? : )", desc: "Compact if/else. condition ? valueIfTrue : valueIfFalse. Can be chained but keep it readable.",
        syn: `<span class="kw">const</span> age = <span class="num">20</span>;\n<span class="kw">const</span> status = age >= <span class="num">18</span> ? <span class="str">"adult"</span> : <span class="str">"minor"</span>;\n<span class="fn">console</span>.<span class="fn">log</span>(status);\n\n<span class="cm">// chained</span>\n<span class="kw">const</span> grade = age < <span class="num">13</span> ? <span class="str">"child"</span>\n             : age < <span class="num">18</span> ? <span class="str">"teen"</span>\n             : <span class="str">"adult"</span>;\n<span class="fn">console</span>.<span class="fn">log</span>(grade);`,
        out: "adult\nadult" },
      { code: "Logical assignment (&&=, ||=, ??=)", desc: "Assign only when the logical condition holds. Shorter than an explicit if check.",
        syn: `<span class="kw">let</span> a = <span class="kw">null</span>;\na ??= <span class="str">"default"</span>;  <span class="cm">// assign if null/undefined</span>\n<span class="fn">console</span>.<span class="fn">log</span>(a);   <span class="cm">// "default"</span>\n\n<span class="kw">let</span> b = <span class="num">5</span>;\nb &&= b * <span class="num">2</span>;    <span class="cm">// assign only if truthy</span>\n<span class="fn">console</span>.<span class="fn">log</span>(b);   <span class="cm">// 10</span>\n\n<span class="kw">let</span> c = <span class="num">0</span>;\nc ||= <span class="num">99</span>;       <span class="cm">// assign only if falsy</span>\n<span class="fn">console</span>.<span class="fn">log</span>(c);   <span class="cm">// 99</span>`,
        out: "default\n10\n99" },
    ]
  },
  {
    id: "js-flow", name: "Control Flow", color: "#4ade80",
    tBg: "rgba(74,222,128,0.12)", tC: "#4ade80",
    items: [
      { code: "if / else if / else", desc: "Conditional branching. JavaScript coerces the condition to boolean, so any truthy/falsy value works.",
        syn: `<span class="kw">const</span> score = <span class="num">85</span>;\n<span class="kw">if</span> (score >= <span class="num">90</span>) {\n  <span class="fn">console</span>.<span class="fn">log</span>(<span class="str">"A"</span>);\n} <span class="kw">else if</span> (score >= <span class="num">80</span>) {\n  <span class="fn">console</span>.<span class="fn">log</span>(<span class="str">"B"</span>);\n} <span class="kw">else if</span> (score >= <span class="num">70</span>) {\n  <span class="fn">console</span>.<span class="fn">log</span>(<span class="str">"C"</span>);\n} <span class="kw">else</span> {\n  <span class="fn">console</span>.<span class="fn">log</span>(<span class="str">"F"</span>);\n}`,
        out: "B" },
      { code: "switch", desc: "Matches a value against multiple cases. Use break to prevent fall-through. Default catches unmatched values.",
        syn: `<span class="kw">const</span> day = <span class="str">"Mon"</span>;\n<span class="kw">switch</span> (day) {\n  <span class="kw">case</span> <span class="str">"Sat"</span>:\n  <span class="kw">case</span> <span class="str">"Sun"</span>:\n    <span class="fn">console</span>.<span class="fn">log</span>(<span class="str">"Weekend"</span>); <span class="kw">break</span>;\n  <span class="kw">case</span> <span class="str">"Mon"</span>:\n    <span class="fn">console</span>.<span class="fn">log</span>(<span class="str">"Weekday"</span>); <span class="kw">break</span>;\n  <span class="kw">default</span>:\n    <span class="fn">console</span>.<span class="fn">log</span>(<span class="str">"Other"</span>);\n}`,
        out: "Weekday" },
      { code: "try / catch / finally", desc: "Handles runtime errors. finally always runs. Throw custom errors with 'throw new Error(...)'.",

  {

      { code: "Function declaration", desc: "Named function. Hoisted — callable before definition. Has its own 'this'. Supports default parameters.",

      { code: "Arrow function (=>)", desc: "Concise syntax. No own 'this' — inherits from surrounding scope. Perfect for callbacks.",

  {
    id: "js-oop", name: "OOP — Classes", color: "#2dd4bf",
    tBg: "rgba(45,212,191,0.12)", tC: "#2dd4bf",
    items: [
      { code: "class", desc: "Blueprint for objects. ES6 classes are syntactic sugar over JavaScript's prototype-based system.",
        syn: `<span class="kw">class</span> <span class="cls">Animal</span> {\n  <span class="fn">constructor</span>(name, sound) {\n    <span class="kw">this</span>.name  = name;\n    <span class="kw">this</span>.sound = sound;\n  }\n  <span class="fn">speak</span>() {\n    <span class="kw">return</span> <span class="str">\`\${this.name} says \${this.sound}\`</span>;\n  }\n}\n<span class="kw">const</span> dog = <span class="kw">new</span> <span class="cls">Animal</span>(<span class="str">"Dog"</span>, <span class="str">"Woof"</span>);\n<span class="fn">console</span>.<span class="fn">log</span>(dog.<span class="fn">speak</span>());\n<span class="fn">console</span>.<span class="fn">log</span>(dog <span class="kw">instanceof</span> <span class="cls">Animal</span>);`,
        out: "Dog says Woof\ntrue" },
      { code: "extends / super", desc: "extends creates a subclass. super() calls the parent constructor. Must be called before using 'this'.",
        syn: `<span class="kw">class</span> <span class="cls">Animal</span> {\n  <span class="fn">constructor</span>(name) { <span class="kw">this</span>.name = name; }\n  <span class="fn">speak</span>() { <span class="kw">return</span> <span class="str">\`\${this.name} makes a sound\`</span>; }\n}\n<span class="kw">class</span> <span class="cls">Dog</span> <span class="kw">extends</span> <span class="cls">Animal</span> {\n  <span class="fn">constructor</span>(name) { <span class="kw">super</span>(name); }\n  <span class="fn">speak</span>() { <span class="kw">return</span> <span class="str">\`\${this.name} barks\!\`</span>; }\n}\n<span class="kw">const</span> d = <span class="kw">new</span> <span class="cls">Dog</span>(<span class="str">"Rex"</span>);\n<span class="fn">console</span>.<span class="fn">log</span>(d.<span class="fn">speak</span>());\n<span class="fn">console</span>.<span class="fn">log</span>(d <span class="kw">instanceof</span> <span class="cls">Animal</span>);`,
        out: "Rex barks\!\ntrue" },
      { code: "static", desc: "Static methods/properties belong to the class itself, not to instances. Call with ClassName.method().",
        syn: `<span class="kw">class</span> <span class="cls">MathUtils</span> {\n  <span class="kw">static</span> PI = <span class="num">3.14159</span>;\n  <span class="kw">static</span> <span class="fn">square</span>(n) { <span class="kw">return</span> n * n; }\n  <span class="kw">static</span> <span class="fn">cube</span>(n)   { <span class="kw">return</span> n ** <span class="num">3</span>; }\n}\n<span class="fn">console</span>.<span class="fn">log</span>(<span class="cls">MathUtils</span>.PI);\n<span class="fn">console</span>.<span class="fn">log</span>(<span class="cls">MathUtils</span>.<span class="fn">square</span>(<span class="num">4</span>));\n<span class="fn">console</span>.<span class="fn">log</span>(<span class="cls">MathUtils</span>.<span class="fn">cube</span>(<span class="num">3</span>));`,
        out: "3.14159\n16\n27" },
      { code: "Private fields (#)", desc: "True private class fields using # prefix. Accessible only inside the class. Added in ES2022.",
        syn: `<span class="kw">class</span> <span class="cls">BankAccount</span> {\n  #balance = <span class="num">0</span>;\n  <span class="fn">constructor</span>(initial) { <span class="kw">this</span>.#balance = initial; }\n  <span class="fn">deposit</span>(amt)  { <span class="kw">this</span>.#balance += amt; }\n  <span class="fn">withdraw</span>(amt) { <span class="kw">this</span>.#balance -= amt; }\n  <span class="fn">getBalance</span>()  { <span class="kw">return</span> <span class="kw">this</span>.#balance; }\n}\n<span class="kw">const</span> acc = <span class="kw">new</span> <span class="cls">BankAccount</span>(<span class="num">100</span>);\nacc.<span class="fn">deposit</span>(<span class="num">50</span>);\nacc.<span class="fn">withdraw</span>(<span class="num">30</span>);\n<span class="fn">console</span>.<span class="fn">log</span>(acc.<span class="fn">getBalance</span>());`,
        out: "120" },
      { code: "Getters & Setters", desc: "Define computed properties with get/set. Accessed like properties but call a function underneath.",
        syn: `<span class="kw">class</span> <span class="cls">Circle</span> {\n  <span class="fn">constructor</span>(r) { <span class="kw">this</span>._r = r; }\n  <span class="kw">get</span> <span class="fn">radius</span>()  { <span class="kw">return</span> <span class="kw">this</span>._r; }\n  <span class="kw">set</span> <span class="fn">radius</span>(v) {\n    <span class="kw">if</span> (v < <span class="num">0</span>) <span class="kw">throw</span> <span class="kw">new</span> <span class="cls">Error</span>(<span class="str">"Negative\!"</span>);\n    <span class="kw">this</span>._r = v;\n  }\n  <span class="kw">get</span> <span class="fn">area</span>() { <span class="kw">return</span> (<span class="cls">Math</span>.PI * <span class="kw">this</span>._r ** <span class="num">2</span>).<span class="fn">toFixed</span>(<span class="num">2</span>); }\n}\n<span class="kw">const</span> c = <span class="kw">new</span> <span class="cls">Circle</span>(<span class="num">5</span>);\n<span class="fn">console</span>.<span class="fn">log</span>(c.area);\nc.radius = <span class="num">10</span>;\n<span class="fn">console</span>.<span class="fn">log</span>(c.area);`,
        out: "78.54\n314.16" },
    ]

  {

    tBg: "rgba(56,189,248,0.12)", tC: "#38bdf8",
    items: [
      { code: "map / filter / reduce", desc: "The core trio of array transformations. map transforms, filter selects, reduce aggregates. All non-mutating.",
        syn: `<span class="kw">const</span> nums = [<span class="num">1</span>, <span class="num">2</span>, <span class="num">3</span>, <span class="num">4</span>, <span class="num">5</span>];\n\n<span class="kw">const</span> sq    = nums.<span class="fn">map</span>(n => n ** <span class="num">2</span>);\n<span class="fn">console</span>.<span class="fn">log</span>(sq);\n\n<span class="kw">const</span> odds  = nums.<span class="fn">filter</span>(n => n % <span class="num">2</span> \!== <span class="num">0</span>);\n<span class="fn">console</span>.<span class="fn">log</span>(odds);\n\n<span class="kw">const</span> total = nums.<span class="fn">reduce</span>((sum, n) => sum + n, <span class="num">0</span>);\n<span class="fn">console</span>.<span class="fn">log</span>(total);`,

      { code: "find / some / every / includes", desc: "Query methods. find returns first match, some any match, every all match, includes checks existence.",
        syn: `<span class="kw">const</span> arr = [<span class="num">10</span>, <span class="num">25</span>, <span class="num">30</span>, <span class="num">45</span>];\n<span class="fn">console</span>.<span class="fn">log</span>(arr.<span class="fn">find</span>(n => n > <span class="num">20</span>));       <span class="cm">// 25</span>\n<span class="fn">console</span>.<span class="fn">log</span>(arr.<span class="fn">findIndex</span>(n => n > <span class="num">20</span>));  <span class="cm">// 1</span>\n<span class="fn">console</span>.<span class="fn">log</span>(arr.<span class="fn">some</span>(n => n > <span class="num">40</span>));        <span class="cm">// true</span>\n<span class="fn">console</span>.<span class="fn">log</span>(arr.<span class="fn">every</span>(n => n > <span class="num">5</span>));        <span class="cm">// true</span>\n<span class="fn">console</span>.<span class="fn">log</span>(arr.<span class="fn">includes</span>(<span class="num">30</span>));             <span class="cm">// true</span>`,
        out: "25\n1\ntrue\ntrue\ntrue" },
      { code: "push / pop / shift / unshift / splice", desc: "Mutating methods. push/pop work on end, shift/unshift on front. splice can insert, remove, or replace anywhere.",
        syn: `<span class="kw">const</span> a = [<span class="num">1</span>, <span class="num">2</span>, <span class="num">3</span>];\na.<span class="fn">push</span>(<span class="num">4</span>);       <span class="cm">// add to end → [1,2,3,4]</span>\na.<span class="fn">pop</span>();         <span class="cm">// remove end → [1,2,3]</span>\na.<span class="fn">unshift</span>(<span class="num">0</span>);   <span class="cm">// add to front → [0,1,2,3]</span>\na.<span class="fn">shift</span>();       <span class="cm">// remove front → [1,2,3]</span>\na.<span class="fn">splice</span>(<span class="num">1</span>, <span class="num">0</span>, <span class="num">99</span>); <span class="cm">// insert 99 at index 1</span>\n<span class="fn">console</span>.<span class="fn">log</span>(a);`,
        out: "[1, 99, 2, 3]" },
      { code: "flat / sort / slice", desc: "flat() flattens nested arrays. sort() sorts in place (default: alphabetical). slice() extracts non-destructively.",
        syn: `<span class="kw">const</span> nested = [<span class="num">1</span>, [<span class="num">2</span>, <span class="num">3</span>], [<span class="num">4</span>, [<span class="num">5</span>]]];\n<span class="fn">console</span>.<span class="fn">log</span>(nested.<span class="fn">flat</span>(<span class="cls">Infinity</span>));   <span class="cm">// [1,2,3,4,5]</span>\n\n<span class="kw">const</span> nums = [<span class="num">3</span>, <span class="num">1</span>, <span class="num">4</span>, <span class="num">1</span>, <span class="num">5</span>];\n<span class="fn">console</span>.<span class="fn">log</span>([...nums].<span class="fn">sort</span>((a,b)=>a-b)); <span class="cm">// ascending</span>\n<span class="fn">console</span>.<span class="fn">log</span>(nums.<span class="fn">slice</span>(<span class="num">1</span>,<span class="num">3</span>));            <span class="cm">// [1,4] (original unchanged)</span>`,

  {

      { code: "includes / startsWith / endsWith", desc: "Test string content. All return booleans and are case-sensitive.",

      { code: "slice / split / join", desc: "slice extracts a substring. split converts to array. join converts array to string.",

      { code: "replace / replaceAll / trim / padStart", desc: "replace() replaces first match. replaceAll() replaces all. trim removes whitespace. padStart pads to length.",
        syn: `<span class="kw">const</span> s = <span class="str">"  hello world  "</span>;\n<span class="fn">console</span>.<span class="fn">log</span>(s.<span class="fn">trim</span>());\n<span class="fn">console</span>.<span class="fn">log</span>(s.<span class="fn">trim</span>().<span class="fn">replace</span>(<span class="str">"l"</span>, <span class="str">"L"</span>));    <span class="cm">// first only</span>\n<span class="fn">console</span>.<span class="fn">log</span>(s.<span class="fn">trim</span>().<span class="fn">replaceAll</span>(<span class="str">"l"</span>, <span class="str">"L"</span>)); <span class="cm">// all</span>\n<span class="fn">console</span>.<span class="fn">log</span>(<span class="str">"42"</span>.<span class="fn">padStart</span>(<span class="num">5</span>, <span class="str">"0"</span>));`,

    items: [
      { code: "Promise", desc: "Represents a future value: pending → fulfilled or rejected. Chain .then(), .catch(), .finally().",
        syn: `<span class="kw">const</span> p = <span class="kw">new</span> <span class="cls">Promise</span>((resolve, reject) => {\n  <span class="kw">const</span> ok = <span class="kw">true</span>;\n  <span class="kw">if</span> (ok) resolve(<span class="str">"Done\!"</span>);\n  <span class="kw">else</span>    reject(<span class="kw">new</span> <span class="cls">Error</span>(<span class="str">"Failed"</span>));\n});\n\np\n  .<span class="fn">then</span>(val => <span class="fn">console</span>.<span class="fn">log</span>(<span class="str">"Result:"</span>, val))\n  .<span class="fn">catch</span>(err => <span class="fn">console</span>.<span class="fn">log</span>(<span class="str">"Error:"</span>, err.message))\n  .<span class="fn">finally</span>(()  => <span class="fn">console</span>.<span class="fn">log</span>(<span class="str">"Settled"</span>));`,
        out: "Result: Done\!\nSettled" },
      { code: "async / await", desc: "Syntactic sugar over Promises. async functions always return a Promise. await pauses until it settles.",
        syn: `<span class="kw">const</span> <span class="fn">wait</span> = ms => <span class="kw">new</span> <span class="cls">Promise</span>(r => <span class="fn">setTimeout</span>(r, ms));\n\n<span class="kw">async function</span> <span class="fn">run</span>() {\n  <span class="fn">console</span>.<span class="fn">log</span>(<span class="str">"start"</span>);\n  <span class="kw">await</span> <span class="fn">wait</span>(<span class="num">500</span>);\n  <span class="fn">console</span>.<span class="fn">log</span>(<span class="str">"after 0.5s"</span>);\n  <span class="kw">return</span> <span class="str">"done"</span>;\n}\n\n<span class="fn">run</span>().<span class="fn">then</span>(v => <span class="fn">console</span>.<span class="fn">log</span>(v));`,
        out: "start\nafter 0.5s\ndone" },
      { code: "Promise.all / Promise.allSettled", desc: "Promise.all waits for all, fails fast. Promise.allSettled always waits and reports every result.",
        syn: `<span class="kw">const</span> p1 = <span class="cls">Promise</span>.<span class="fn">resolve</span>(<span class="num">1</span>);\n<span class="kw">const</span> p2 = <span class="cls">Promise</span>.<span class="fn">resolve</span>(<span class="num">2</span>);\n\n<span class="cls">Promise</span>.<span class="fn">all</span>([p1, p2])\n  .<span class="fn">then</span>(vals => <span class="fn">console</span>.<span class="fn">log</span>(vals)); <span class="cm">// [1,2]</span>\n\n<span class="kw">const</span> p3 = <span class="cls">Promise</span>.<span class="fn">reject</span>(<span class="str">"oops"</span>);\n<span class="cls">Promise</span>.<span class="fn">allSettled</span>([p1, p3])\n  .<span class="fn">then</span>(res => res.<span class="fn">forEach</span>(r =>\n    <span class="fn">console</span>.<span class="fn">log</span>(r.status, r.value ?? r.reason)\n  ));`,
        out: "[1, 2]\nfulfilled 1\nrejected oops" },
    ]
  },
  {
    id: "js-modules", name: "Modules (import/export)", color: "#fb923c",
    tBg: "rgba(251,146,60,0.12)", tC: "#fb923c",
    items: [
      { code: "export (named)", desc: "Export multiple values. Importers use the exact name in curly braces. Can alias with 'as'.",
        syn: `<span class="cm">// math.js</span>\n<span class="kw">export const</span> PI = <span class="num">3.14159</span>;\n<span class="kw">export function</span> <span class="fn">square</span>(n) { <span class="kw">return</span> n * n; }\n<span class="kw">export function</span> <span class="fn">cube</span>(n)   { <span class="kw">return</span> n ** <span class="num">3</span>; }\n\n<span class="cm">// main.js</span>\n<span class="kw">import</span> { PI, square } <span class="kw">from</span> <span class="str">'./math.js'</span>;\n<span class="fn">console</span>.<span class="fn">log</span>(PI);\n<span class="fn">console</span>.<span class="fn">log</span>(<span class="fn">square</span>(<span class="num">4</span>));`,
        out: "3.14159\n16" },
      { code: "export default", desc: "One default export per file. Importers choose any name for it. Often used for a main class/function.",
        syn: `<span class="cm">// greet.js</span>\n<span class="kw">export default function</span> <span class="fn">greet</span>(name) {\n  <span class="kw">return</span> <span class="str">\`Hello, \${name}\!\`</span>;\n}\n\n<span class="cm">// main.js — importer picks the name</span>\n<span class="kw">import</span> sayHello <span class="kw">from</span> <span class="str">'./greet.js'</span>;\n<span class="fn">console</span>.<span class="fn">log</span>(<span class="fn">sayHello</span>(<span class="str">"World"</span>));\n\n<span class="cm">// import everything as namespace</span>\n<span class="kw">import</span> * <span class="kw">as</span> math <span class="kw">from</span> <span class="str">'./math.js'</span>;`,
        out: "Hello, World\!" },
      { code: "Dynamic import()", desc: "Load modules on demand. Returns a Promise. Ideal for code splitting and lazy loading.",
        syn: `<span class="kw">async function</span> <span class="fn">loadChart</span>() {\n  <span class="kw">const</span> { draw } = <span class="kw">await</span> <span class="kw">import</span>(<span class="str">'./chart.js'</span>);\n  <span class="fn">draw</span>();\n}\n\n<span class="cm">// conditional loading</span>\n<span class="kw">if</span> (needsDebug) {\n  <span class="kw">const</span> debug = <span class="kw">await</span> <span class="kw">import</span>(<span class="str">'./debug.js'</span>);\n  debug.<span class="fn">log</span>(<span class="str">"loaded"</span>);\n}`,
        out: "(module loaded on demand)" },
    ]
  },
  {
    id: "js-error", name: "Error Handling", color: "#f87171",
    tBg: "rgba(248,113,113,0.12)", tC: "#f87171",
    items: [
      { code: "Error types", desc: "Built-in error types: Error, TypeError, RangeError, SyntaxError, ReferenceError. Always inherit from Error.",
        syn: `<span class="kw">try</span> { <span class="kw">null</span>.<span class="fn">foo</span>(); } <span class="kw">catch</span>(e) { <span class="fn">console</span>.<span class="fn">log</span>(e.<span class="fn">constructor</span>.name); } <span class="cm">// TypeError</span>\n<span class="kw">try</span> { <span class="kw">new</span> <span class="cls">Array</span>(-<span class="num">1</span>); } <span class="kw">catch</span>(e) { <span class="fn">console</span>.<span class="fn">log</span>(e.<span class="fn">constructor</span>.name); } <span class="cm">// RangeError</span>\n\n<span class="cm">// Custom error class</span>\n<span class="kw">class</span> <span class="cls">AppError</span> <span class="kw">extends</span> <span class="cls">Error</span> {\n  <span class="fn">constructor</span>(msg, code) {\n    <span class="kw">super</span>(msg);\n    <span class="kw">this</span>.name = <span class="str">"AppError"</span>;\n    <span class="kw">this</span>.code = code;\n  }\n}\n<span class="kw">throw new</span> <span class="cls">AppError</span>(<span class="str">"Not found"</span>, <span class="num">404</span>);`,
        out: "TypeError\nRangeError\nAppError: Not found (code 404)" },
      { code: "Error properties", desc: "Every Error has name, message, and stack. Use them to log meaningful debugging information.",
        syn: `<span class="kw">try</span> {\n  <span class="kw">throw new</span> <span class="cls">TypeError</span>(<span class="str">"Bad input"</span>);\n} <span class="kw">catch</span> (e) {\n  <span class="fn">console</span>.<span class="fn">log</span>(e.name);     <span class="cm">// TypeError</span>\n  <span class="fn">console</span>.<span class="fn">log</span>(e.message);  <span class="cm">// Bad input</span>\n  <span class="fn">console</span>.<span class="fn">log</span>(<span class="kw">typeof</span> e.stack); <span class="cm">// string (call trace)</span>\n}`,
        out: "TypeError\nBad input\nstring" },
    ]
  },

  {
    id: "js-objects", name: "Objects & Methods", color: "#a78bfa",
    tBg: "rgba(167,139,250,0.12)", tC: "#a78bfa",
    items: [
      { code: "Object literal & access", desc: "Create objects with {} syntax. Access properties with dot notation or bracket notation.",
        syn: `<span class="kw">const</span> user = { name: <span class="str">"Ana"</span>, age: <span class="num">30</span>, active: <span class="kw">true</span> };
<span class="fn">console</span>.<span class="fn">log</span>(user.name);       <span class="cm">// dot notation</span>
<span class="fn">console</span>.<span class="fn">log</span>(user[<span class="str">"age"</span>]);    <span class="cm">// bracket notation</span>
user.role = <span class="str">"admin"</span>;           <span class="cm">// add property</span>
<span class="kw">delete</span> user.active;            <span class="cm">// remove property</span>`,
        out: "Ana\n30" },
      { code: "Shorthand & computed keys", desc: "ES6 shorthand properties and computed property names with [].",
        syn: `<span class="kw">const</span> name = <span class="str">"Sam"</span>, age = <span class="num">25</span>;
<span class="kw">const</span> user = { name, age };     <span class="cm">// shorthand: {name: name, age: age}</span>

<span class="kw">const</span> key = <span class="str">"score"</span>;
<span class="kw">const</span> data = { [key]: <span class="num">99</span> };    <span class="cm">// computed: {score: 99}</span>
<span class="fn">console</span>.<span class="fn">log</span>(data.score);       <span class="cm">// 99</span>`,
        out: "99" },
      { code: "Object destructuring", desc: "Unpack values from objects into variables. Supports renaming and default values.",
        syn: `<span class="kw">const</span> { name, age, city = <span class="str">"NYC"</span> } = user;
<span class="cm">// city defaults to "NYC" if undefined</span>

<span class="kw">const</span> { name: userName, age: userAge } = user;
<span class="cm">// rename: userName = user.name</span>

<span class="cm">// Nested destructuring</span>
<span class="kw">const</span> { address: { zip } } = { address: { zip: <span class="str">"10001"</span> } };`,
        out: "// variables extracted from object" },
      { code: "Spread & Object.assign", desc: "Copy or merge objects with spread (...) or Object.assign(). Both do shallow copies.",
        syn: `<span class="kw">const</span> a = { x: <span class="num">1</span>, y: <span class="num">2</span> };
<span class="kw">const</span> b = { ...a, z: <span class="num">3</span> };      <span class="cm">// {x:1, y:2, z:3}</span>
<span class="kw">const</span> c = { ...a, y: <span class="num">99</span> };     <span class="cm">// override y</span>
<span class="kw">const</span> merged = <span class="cls">Object</span>.<span class="fn">assign</span>({}, a, { z: <span class="num">3</span> });
<span class="fn">console</span>.<span class="fn">log</span>(merged);             <span class="cm">// {x:1, y:2, z:3}</span>`,
        out: "{x:1, y:2, z:3}" },
      { code: "Object static methods", desc: "Object.keys(), Object.values(), Object.entries() for iterating objects.",
        syn: `<span class="kw">const</span> obj = { a: <span class="num">1</span>, b: <span class="num">2</span>, c: <span class="num">3</span> };
<span class="cls">Object</span>.<span class="fn">keys</span>(obj);    <span class="cm">// ["a", "b", "c"]</span>
<span class="cls">Object</span>.<span class="fn">values</span>(obj);  <span class="cm">// [1, 2, 3]</span>
<span class="cls">Object</span>.<span class="fn">entries</span>(obj); <span class="cm">// [["a",1], ["b",2], ["c",3]]</span>

<span class="kw">for</span> (<span class="kw">const</span> [k, v] <span class="kw">of</span> <span class="cls">Object</span>.<span class="fn">entries</span>(obj)) {
  <span class="fn">console</span>.<span class="fn">log</span>(k, v);
}`,
        out: "a 1\nb 2\nc 3" },
      { code: "Optional chaining (?.) & nullish (??)", desc: "?. safely accesses nested properties. ?? returns right-hand value when left is null/undefined.",
        syn: `<span class="kw">const</span> user = { profile: { bio: <span class="str">"hello"</span> } };
<span class="fn">console</span>.<span class="fn">log</span>(user?.profile?.bio);  <span class="cm">// "hello"</span>
<span class="fn">console</span>.<span class="fn">log</span>(user?.address?.city); <span class="cm">// undefined (no error)</span>

<span class="kw">const</span> name = user.name ?? <span class="str">"Anonymous"</span>;
<span class="fn">console</span>.<span class="fn">log</span>(name);               <span class="cm">// "Anonymous"</span>`,
        out: "hello\nundefined\nAnonymous" },
    ]
  },
  {
    id: "js-mapset", name: "Map & Set", color: "#34d399",
    tBg: "rgba(52,211,153,0.12)", tC: "#34d399",
    items: [
      { code: "Map basics", desc: "Map holds key-value pairs where keys can be any type. Remembers insertion order.",
        syn: `<span class="kw">const</span> map = <span class="kw">new</span> <span class="cls">Map</span>();
map.<span class="fn">set</span>(<span class="str">"name"</span>, <span class="str">"Ana"</span>);
map.<span class="fn">set</span>(<span class="num">42</span>, <span class="str">"answer"</span>);
map.<span class="fn">set</span>(<span class="kw">true</span>, <span class="str">"yes"</span>);

<span class="fn">console</span>.<span class="fn">log</span>(map.<span class="fn">get</span>(<span class="str">"name"</span>)); <span class="cm">// "Ana"</span>
<span class="fn">console</span>.<span class="fn">log</span>(map.<span class="fn">has</span>(<span class="num">42</span>));      <span class="cm">// true</span>
<span class="fn">console</span>.<span class="fn">log</span>(map.size);         <span class="cm">// 3</span>`,
        out: "Ana\ntrue\n3" },
      { code: "Map iteration", desc: "Iterate Map with for...of. Get keys(), values(), or entries().",
        syn: `<span class="kw">const</span> scores = <span class="kw">new</span> <span class="cls">Map</span>([[<span class="str">"Alice"</span>, <span class="num">95</span>], [<span class="str">"Bob"</span>, <span class="num">87</span>], [<span class="str">"Carl"</span>, <span class="num">92</span>]]);

<span class="kw">for</span> (<span class="kw">const</span> [name, score] <span class="kw">of</span> scores) {
  <span class="fn">console</span>.<span class="fn">log</span>(name, score);
}

[...scores.<span class="fn">keys</span>()];   <span class="cm">// ["Alice","Bob","Carl"]</span>
[...scores.<span class="fn">values</span>()]; <span class="cm">// [95, 87, 92]</span>`,
        out: "Alice 95\nBob 87\nCarl 92" },
      { code: "Set basics", desc: "Set stores unique values of any type. Duplicate additions are silently ignored.",
        syn: `<span class="kw">const</span> set = <span class="kw">new</span> <span class="cls">Set</span>([<span class="num">1</span>, <span class="num">2</span>, <span class="num">3</span>, <span class="num">2</span>, <span class="num">1</span>]);
<span class="fn">console</span>.<span class="fn">log</span>(set.size);         <span class="cm">// 3 (duplicates removed)</span>

set.<span class="fn">add</span>(<span class="num">4</span>);
set.<span class="fn">has</span>(<span class="num">2</span>);                    <span class="cm">// true</span>
set.<span class="fn">delete</span>(<span class="num">1</span>);

<span class="cm">// Remove duplicates from array</span>
<span class="kw">const</span> unique = [...<span class="kw">new</span> <span class="cls">Set</span>([<span class="num">1</span>,<span class="num">1</span>,<span class="num">2</span>,<span class="num">3</span>,<span class="num">3</span>])]; <span class="cm">// [1,2,3]</span>`,
        out: "3\ntrue" },
      { code: "Set operations (union/intersection/difference)", desc: "JavaScript has no built-in set math — implement with spread and filter.",
        syn: `<span class="kw">const</span> a = <span class="kw">new</span> <span class="cls">Set</span>([<span class="num">1</span>,<span class="num">2</span>,<span class="num">3</span>]);
<span class="kw">const</span> b = <span class="kw">new</span> <span class="cls">Set</span>([<span class="num">2</span>,<span class="num">3</span>,<span class="num">4</span>]);

<span class="cm">// Union</span>
<span class="kw">const</span> union = <span class="kw">new</span> <span class="cls">Set</span>([...a, ...b]);        <span class="cm">// {1,2,3,4}</span>
<span class="cm">// Intersection</span>
<span class="kw">const</span> inter = <span class="kw">new</span> <span class="cls">Set</span>([...a].<span class="fn">filter</span>(x => b.<span class="fn">has</span>(x))); <span class="cm">// {2,3}</span>
<span class="cm">// Difference</span>
<span class="kw">const</span> diff  = <span class="kw">new</span> <span class="cls">Set</span>([...a].<span class="fn">filter</span>(x => \!b.<span class="fn">has</span>(x))); <span class="cm">// {1}</span>`,
        out: "{1,2,3,4}\n{2,3}\n{1}" },
    ]
  },
  {
    id: "js-regex", name: "Regular Expressions", color: "#f87171",
    tBg: "rgba(248,113,113,0.12)", tC: "#f87171",
    items: [
      { code: "Regex literals & flags", desc: "Create regex with /pattern/flags. Common flags: g (global), i (case-insensitive), m (multiline).",
        syn: `<span class="kw">const</span> re1 = <span class="str">/hello/i</span>;          <span class="cm">// case-insensitive</span>
<span class="kw">const</span> re2 = <span class="str">/\\d+/g</span>;          <span class="cm">// one or more digits, global</span>
<span class="kw">const</span> re3 = <span class="kw">new</span> <span class="cls">RegExp</span>(<span class="str">"\\d+"</span>, <span class="str">"g"</span>);

re1.<span class="fn">test</span>(<span class="str">"Hello World"</span>);       <span class="cm">// true</span>
<span class="str">"abc123"</span>.<span class="fn">match</span>(<span class="str">/\\d+/</span>);       <span class="cm">// ["123"]</span>`,
        out: "true\n[\"123\"]" },
      { code: "Common patterns", desc: "Frequently used regex patterns for validation and parsing.",
        syn: `<span class="str">/^\\d{3}-\\d{4}$/</span>            <span class="cm">// phone: 123-4567</span>
<span class="str">/^[\\w.-]+@[\\w.-]+\\.\\w{2,}$/</span> <span class="cm">// email</span>
<span class="str">/^https?:\\/\\//</span>              <span class="cm">// URL starts with http/https</span>
<span class="str">/^\\s*$/</span>                     <span class="cm">// blank/whitespace only</span>
<span class="str">/(\\d{4})-(\\d{2})-(\\d{2})/</span>   <span class="cm">// capture date YYYY-MM-DD</span>
<span class="str">/\\b\\w{5}\\b/g</span>               <span class="cm">// all 5-letter words</span>`,
        out: "// patterns for test() / match()" },
      { code: "String methods with regex", desc: "match(), search(), replace(), replaceAll(), split() all accept regex.",
        syn: `<span class="kw">const</span> str = <span class="str">"foo 123 bar 456"</span>;
str.<span class="fn">match</span>(<span class="str">/\\d+/g</span>);           <span class="cm">// ["123","456"]</span>
str.<span class="fn">search</span>(<span class="str">/\\d/</span>);            <span class="cm">// 4 (index)</span>
str.<span class="fn">replace</span>(<span class="str">/\\d+/g</span>, <span class="str">"#"</span>);    <span class="cm">// "foo # bar #"</span>
str.<span class="fn">split</span>(<span class="str">/\\s+/</span>);            <span class="cm">// ["foo","123","bar","456"]</span>`,
        out: "[\"123\",\"456\"]\n4\n\"foo # bar #\"" },
      { code: "Capture groups & exec()", desc: "Parentheses create capture groups. Use exec() in a loop for all matches.",
        syn: `<span class="kw">const</span> re = <span class="str">/([A-Z][a-z]+)\\s(\\d+)/g</span>;
<span class="kw">const</span> text = <span class="str">"Alice 30, Bob 25, Carol 28"</span>;
<span class="kw">let</span> m;
<span class="kw">while</span> ((m = re.<span class="fn">exec</span>(text)) \!== <span class="kw">null</span>) {
  <span class="fn">console</span>.<span class="fn">log</span>(m[<span class="num">1</span>], m[<span class="num">2</span>]);
}
<span class="cm">// Alice 30 / Bob 25 / Carol 28</span>`,
        out: "Alice 30\nBob 25\nCarol 28" },
    ]
  },
  {
    id: "js-dom", name: "DOM Manipulation", color: "#fb923c",
    tBg: "rgba(251,146,60,0.12)", tC: "#fb923c",
    items: [
      { code: "Selecting elements",
        desc: "querySelector returns the first matching element. querySelectorAll returns all matches as a NodeList. Use CSS selector syntax — same as you'd write in a stylesheet.",
        syn: `<span class="cm">// Single element — returns first match or null</span>\n<span class="kw">const</span> btn  = document.<span class="fn">querySelector</span>(<span class="str">"button"</span>);\n<span class="kw">const</span> hero = document.<span class="fn">querySelector</span>(<span class="str">"#hero"</span>);        <span class="cm">// by ID</span>\n<span class="kw">const</span> card = document.<span class="fn">querySelector</span>(<span class="str">".card.active"</span>);  <span class="cm">// by class</span>\n<span class="kw">const</span> inp  = document.<span class="fn">querySelector</span>(<span class="str">"form input[type=email]"</span>);\n\n<span class="cm">// All matches — returns NodeList (iterable)</span>\n<span class="kw">const</span> items = document.<span class="fn">querySelectorAll</span>(<span class="str">".item"</span>);\nitems.<span class="fn">forEach</span>(el => el.classList.<span class="fn">add</span>(<span class="str">"highlight"</span>));`,
        out: "// querySelector uses CSS selectors — very flexible" },
      { code: "Reading & changing content",
        desc: "textContent reads/sets plain text (safe). innerHTML reads/sets HTML markup (use with caution — sanitize untrusted input). style sets inline CSS. classList manages CSS classes.",
        syn: `<span class="kw">const</span> el = document.<span class="fn">querySelector</span>(<span class="str">"#msg"</span>);\n\n<span class="cm">// Read / write text</span>\n<span class="fn">console</span>.<span class="fn">log</span>(el.textContent);            <span class="cm">// get text</span>\nel.textContent = <span class="str">"Hello!"</span>;               <span class="cm">// set text (safe)</span>\nel.innerHTML   = <span class="str">"&lt;strong&gt;Bold&lt;/strong&gt;"</span>; <span class="cm">// set HTML</span>\n\n<span class="cm">// Inline styles</span>\nel.style.color      = <span class="str">"red"</span>;\nel.style.fontSize   = <span class="str">"20px"</span>;\n\n<span class="cm">// CSS classes</span>\nel.classList.<span class="fn">add</span>(<span class="str">"active"</span>);\nel.classList.<span class="fn">remove</span>(<span class="str">"hidden"</span>);\nel.classList.<span class="fn">toggle</span>(<span class="str">"open"</span>);            <span class="cm">// add if missing, remove if present</span>\nel.classList.<span class="fn">contains</span>(<span class="str">"active"</span>);        <span class="cm">// true/false</span>`,
        out: "// classList.toggle() is great for show/hide patterns" },

      code:`function debounce(fn, delay) {
  let timer;
  return (...args) => {
    clearTimeout(timer);
    timer = setTimeout(() => fn(...args), delay);
  };
}

function throttle(fn, interval) {
  let last = 0;
  return (...args) => {
    const now = Date.now();
    if (now - last >= interval) { last = now; fn(...args); }
  };
}

const log = debounce(msg => console.log("Debounced:", msg), 100);
log("a"); log("b"); log("c"); // only "c" fires after 100ms

const throttled = throttle(msg => console.log("Throttled:", msg), 200);
throttled("x"); throttled("y"); throttled("z"); // only "x" fires`,

      code:`class EventEmitter {
  #events = new Map();

  on(event, listener) {
    if (\!this.#events.has(event)) this.#events.set(event, []);
    this.#events.get(event).push(listener);
    return this;
  }

  off(event, listener) {
    const listeners = this.#events.get(event) || [];
    this.#events.set(event, listeners.filter(l => l \!== listener));
    return this;
  }

  emit(event, ...args) {
    (this.#events.get(event) || []).forEach(l => l(...args));
    return this;
  }

  once(event, listener) {
    const w = (...args) => { listener(...args); this.off(event, w); };
    return this.on(event, w);
  }
}

const emitter = new EventEmitter();
emitter.on("data",  chunk  => console.log("Data:", chunk));
emitter.once("end", reason => console.log("End:", reason));

emitter.emit("data", "chunk1")
       .emit("data", "chunk2")
       .emit("end",  "stream closed")

      code:`function memoize(fn) {
  const cache = new Map();
  return function(...args) {
    const key = JSON.stringify(args);
    if (cache.has(key)) return cache.get(key);
    const result = fn.apply(this, args);
    cache.set(key, result);
    return result;
  };
}

// Without memo: O(2^n) — exponential
function fib(n) {
  if (n <= 1) return n;
  return fib(n-1) + fib(n-2);
}

// With memo: O(n) — linear
const fibMemo = memoize(function(n) {
  if (n <= 1) return n;
  return fibMemo(n-1) + fibMemo(n-2);
});

console.time("memoized"); console.log(fibMemo(35));   console.timeEnd("memoized");`,
