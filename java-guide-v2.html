  { id:"prog-adv", name:"Advanced components", color:"#f97316", items:[
    { name:"Debounced Search", diff:"adv", desc:"Search input that debounces API calls with a custom hook.", tags:["custom-hooks","useEffect","performance","fetch"],
      what:"Combines a custom useDebounce hook with data fetching. Avoids firing an API call on every keystroke.",
      code:`import { useEffect, useState } from 'react';

function useDebounce(value, delay = 400) {
  // value = latest value to watch
  // delay = wait time in milliseconds before updating
  const [debouncedValue, setDebouncedValue] = useState(value);

  useEffect(() => {
    const timerId = setTimeout(() => {
      setDebouncedValue(value);
    }, delay);

    return () => clearTimeout(timerId);
  }, [value, delay]);

  return debouncedValue;
}

function useFetch(url) {
  // url = endpoint to fetch from
  const [data, setData] = useState([]);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  useEffect(() => {
    if (!url) {
      setData([]);
      setError('');
      return;
    }

    let ignore = false;

    async function runFetch() {
      try {
        setLoading(true);
        setError('');

        const response = await fetch(url);

        if (!response.ok) {
          throw new Error('Request failed');
        }

        const json = await response.json();

        if (!ignore) {
          setData(json);
        }
      } catch (err) {
        if (!ignore) {
          setError(err.message);
          setData([]);
        }
      } finally {
        if (!ignore) {
          setLoading(false);
        }
      }
    }

    runFetch();

    return () => {
      ignore = true;
    };
  }, [url]);

  return { data, loading, error };
}

function DebouncedSearch() {
  const [query, setQuery] = useState('');
  const debouncedQuery = useDebounce(query, 400);
  const url = debouncedQuery
    ? \`https://jsonplaceholder.typicode.com/posts?q=\${debouncedQuery}&_limit=3\`
    : '';
  const { data, loading, error } = useFetch(url);

  return (
    <div>
      <input
        value={query}
        onChange={(event) => setQuery(event.target.value)} // event = input change event
        placeholder="Search posts..."
      />
      {loading && <p>Searching...</p>}
      {error && <p style={{ color: 'red' }}>Error: {error}</p>}
      {!loading && !error && data.map((post) => <p key={post.id}>{post.title}</p>)}
    </div>
  );
}

export default DebouncedSearch;`,
      out:"Search with 400ms debounce, shows matching posts" },
    { name:"Drag & Drop List", diff:"adv", desc:"Reorder a list with drag-and-drop using only React state.", tags:["useState","events","arrays","patterns"],
      what:"Implements drag-and-drop entirely with React drag events and state manipulation — no library needed.",
      code:`import { useState, useRef } from 'react';

const INITIAL = [
  { id: 1, text: 'Design UI' },
  { id: 2, text: 'Write code' },
  { id: 3, text: 'Write tests' },
  { id: 4, text: 'Deploy' },
  { id: 5, text: 'Monitor' },
];

function DragList() {
  const [items,    setItems]    = useState(INITIAL);
  const [dragging, setDragging] = useState(null);
  const dragOverRef = useRef(null);

  const handleDragStart = (id)    => setDragging(id);
  const handleDragEnter = (id)    => { dragOverRef.current = id; };
  const handleDragEnd   = ()      => {
    if (dragging === null || dragOverRef.current === null) return;
    const from = items.findIndex(i => i.id === dragging);
    const to   = items.findIndex(i => i.id === dragOverRef.current);
    const next = [...items];
    next.splice(to, 0, next.splice(from, 1)[0]);
    setItems(next);
    setDragging(null);
    dragOverRef.current = null;
  };

  return (
    <ul style={{ listStyle: 'none', padding: 0, maxWidth: '300px' }}>
      {items.map(item => (
        <li
          key={item.id}
          draggable
          onDragStart={() => handleDragStart(item.id)}
          onDragEnter={() => handleDragEnter(item.id)}
          onDragEnd={handleDragEnd}
          style={{
            padding: '0.75rem 1rem',
            marginBottom: '0.5rem',
            background: dragging === item.id ? '#1a1e28' : '#13161e',
            border: '1px solid #2a2e3a',
            borderRadius: '8px',
            cursor: 'grab',
            opacity: dragging === item.id ? 0.5 : 1,
          }}
        >
          ⠿ {item.text}
        </li>
      ))}
    </ul>
  );
}

export default DragList;`,
      out:"Reorderable list via drag and drop" },
    { name:"useReducer Form", diff:"adv", desc:"Complex form state managed with useReducer.", tags:["useReducer","forms","validation","patterns"],
      what:"useReducer handles complex state transitions better than multiple useState calls. Mirrors the Redux pattern.",
      code:`import { useReducer } from 'react';

const INITIAL_STATE = {
  name: '',
  email: '',
  password: '',
  errors: {},
  submitted: false,
};

function reducer(state, action) {
  // state = current form state
  // action = instruction object like { type, field, value }
  switch (action.type) {
    case 'SET_FIELD':
      return {
        ...state,
        [action.field]: action.value,
        errors: { ...state.errors, [action.field]: '' },
      };

    case 'SET_ERRORS':
      return { ...state, errors: action.errors };

    case 'SUBMIT':
      return { ...state, submitted: true };

    case 'RESET':
      return INITIAL_STATE;

    default:
      return state;
  }
}

function validate({ name, email, password }) {
  // name, email, password = values taken from the current form state
  const errors = {};

  if (!name.trim()) errors.name = 'Name is required';
  if (!/\S+@\S+\.\S+/.test(email)) errors.email = 'Invalid email';
  if (password.length < 8) errors.password = 'Min 8 characters';

  return errors;
}

function RegistrationForm() {
  const [state, dispatch] = useReducer(reducer, INITIAL_STATE);

  const setField = (field, value) => {
    // field = which input to update
    // value = latest input value typed by the user
    dispatch({ type: 'SET_FIELD', field, value });
  };

  const handleSubmit = (event) => {
    event.preventDefault();

    const errors = validate(state);

    if (Object.keys(errors).length > 0) {
      dispatch({ type: 'SET_ERRORS', errors });
      return;
    }

    dispatch({ type: 'SUBMIT' });
  };

  if (state.submitted) return <p>✓ Registered as {state.name}!</p>;

  return (
    <form onSubmit={handleSubmit} style={{ maxWidth: '360px' }}>
      {['name', 'email', 'password'].map((field) => (
        <div key={field} style={{ marginBottom: '1rem' }}>
          <label>{field}</label>
          <input
            type={field === 'password' ? 'password' : 'text'}
            value={state[field]}
            onChange={(event) => setField(field, event.target.value)}
            style={{ display: 'block', width: '100%', marginTop: '4px' }}
          />
          {state.errors[field] && (
            <small style={{ color: 'red' }}>{state.errors[field]}</small>
          )}
        </div>
      ))}

      <div style={{ display: 'flex', gap: '0.5rem' }}>
        <button type="submit">Register</button>
        <button type="button" onClick={() => dispatch({ type: 'RESET' })}>
          Reset
        </button>
      </div>
    </form>
  );
}

export default RegistrationForm;`,
      out:"Validated registration form, success message on submit" },
  ]},

git log --oneline --graph --decorate -15

# Compare two commits
git diff COMMIT_A COMMIT_B -- src/App.jsx

# See who changed each line
git blame src/App.jsx

# Inspect one commit closely
git show COMMIT_HASH`,
      out:"(history narrowed down to the likely bug source)" },
  ]},
];


/* ===== STATE ===== */
let mode = "ref";
let lang = "java";
let activeId = "all";
let srchQ = "";
const openCards = new Set();
const curREF  = () =>
  lang === "java" ? REF :
  lang === "js" ? JS_REF :
  lang === "react" ? REACT_REF :
  GIT_REF;
const curPROG = () =>
  lang === "java" ? PROG :
  lang === "js" ? JS_PROG :
  lang === "react" ? REACT_PROG :
  GIT_PROG;
const progPrefix = () => lang === "java" ? "prog-" : "prog-";

/* ===== SIDEBAR BUILD ===== */
function buildSB() {
  const R = curREF(), P = curPROG();
  const langColor =
    lang === "java" ? "#f97316" :
    lang === "js" ? "#60a5fa" :
    lang === "react" ? "#61dafb" :
    "#22c55e";
  let h = `<div class="sb-section">Reference</div>
    <div class="sb-item ${activeId==='all'?'active':''}" onclick="go('all')">
      <span class="sb-dot" style="background:${langColor}"></span>All codes
      <span class="sb-cnt">${R.reduce((a,g)=>a+g.items.length,0)}</span>
    </div>`;
  for (const g of R)
    h += `<div class="sb-item ${activeId===g.id?'active':''}" onclick="go('${g.id}')">
      <span class="sb-dot" style="background:${g.color}"></span>${g.name}
      <span class="sb-cnt">${g.items.length}</span>
    </div>`;
  h += `<div class="sb-section" style="margin-top:4px">Programs</div>`;
  for (const p of P)
    h += `<div class="sb-item ${activeId===p.id?'active':''}" onclick="go('${p.id}')">
      <span class="sb-dot" style="background:${p.color}"></span>${p.name}
      <span class="sb-cnt">${p.items.length}</span>
    </div>`;
  document.getElementById("sbNav").innerHTML = h;
}

function go(id) {
  activeId = id;
  if (id.startsWith("prog-")) mode = "prog";
  else if (mode === "prog") mode = "ref";
  buildSB();
  render();
  if (window.innerWidth <= 768) closeSB();
}

function setMode(m) {
  mode = m;
  if (m !== "prog" && activeId.startsWith("prog-")) activeId = "all";
  ["btnRef","btnProg","btnTbl"].forEach(b => document.getElementById(b).classList.remove("active"));
  document.getElementById(m === "ref" ? "btnRef" : m === "prog" ? "btnProg" : "btnTbl").classList.add("active");
  buildSB();
  render();
}

function switchLang(l) {
  lang = l;
  activeId = "all";
  openCards.clear();
  document.getElementById("btnJava").classList.toggle("active", l === "java");
  document.getElementById("btnJS").classList.toggle("active", l === "js");
  document.getElementById("btnReact").classList.toggle("active", l === "react");
  document.getElementById("btnGit").classList.toggle("active", l === "git");
  if (document.getElementById("sbTitle")) {
    document.getElementById("sbTitle").innerHTML =
      l === "java" ? 'Java<span>Guide</span>' :
      l === "js" ? 'JS<span>Guide</span>' :
      l === "react" ? 'React<span>Guide</span>' :
      'Git<span>Guide</span>';
  }
  buildSB();
  render();
}

function doSearch() {
  srchQ = document.getElementById("srch").value.toLowerCase();
  render();
}

function toggleCard(uid) {
  openCards.has(uid) ? openCards.delete(uid) : openCards.add(uid);
  render();
}

function escapeHtml(value) {
  return String(value)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function copyCode(uid, code) {
  navigator.clipboard.writeText(code).then(() => {
    const btn = document.getElementById("cpbtn-"+uid);
    if (!btn) return;
    btn.textContent = "Copied!";
    btn.classList.add("copied");
    setTimeout(() => { btn.textContent = "Copy"; btn.classList.remove("copied"); }, 1500);
  });
}

function copyCodeFromBtn(btn, uid) {
  const encoded = btn.dataset.code || "";
  const code = decodeURIComponent(encoded);
  copyCode(uid, code);
}

/* ===== RENDER ===== */
function getRefFiltered() {
  return curREF().map(g => {
    if (activeId !== "all" && activeId === g.id || activeId === "all" || (!activeId.startsWith("prog-") && activeId === g.id)) {
      if (activeId !== "all" && g.id !== activeId) return {...g, items:[]};
      return {...g, items: g.items.filter(i =>
        i.code.toLowerCase().includes(srchQ) || i.desc.toLowerCase().includes(srchQ))};
    }
    return {...g, items:[]};
  }).filter(g => g.items.length);
}

function getProgFiltered() {
  return curPROG().map(g => {
    const pid = g.id;
    if (activeId !== "all" && !activeId.startsWith("prog-") && pid !== activeId) return {...g, items:[]};
    if (activeId.startsWith("prog-") && pid !== activeId) return {...g, items:[]};
    return {...g, items: g.items.filter(i =>
      i.name.toLowerCase().includes(srchQ) ||
      i.desc.toLowerCase().includes(srchQ) ||
      i.tags.some(t => t.toLowerCase().includes(srchQ)))};
  }).filter(g => g.items.length);
}

function render() {
  const rv = document.getElementById("refView");
  const pv = document.getElementById("progView");
  const tv = document.getElementById("tblView");
  rv.style.display = pv.style.display = tv.style.display = "none";

  const refF = getRefFiltered();
  const progF = getProgFiltered();
  const refTotal = refF.reduce((a,g)=>a+g.items.length,0);
  const progTotal = progF.reduce((a,g)=>a+g.items.length,0);
  const total = mode === "prog" ? progTotal : refTotal;

  const R = curREF(), P = curPROG();
  document.getElementById("statsBar").innerHTML = `
    <div class="stat"><div class="stat-v" style="color:var(--accent)">${R.length}</div><div class="stat-l">Reference groups</div></div>
    <div class="stat"><div class="stat-v" style="color:var(--blue)">${R.reduce((a,g)=>a+g.items.length,0)}</div><div class="stat-l">Total codes</div></div>
    <div class="stat"><div class="stat-v" style="color:var(--green)">${P.reduce((a,g)=>a+g.items.length,0)}</div><div class="stat-l">Programs</div></div>
    <div class="stat"><div class="stat-v" style="color:var(--yellow)">${total}</div><div class="stat-l">Showing</div></div>`;

  const grp = [...R,...P].find(g=>g.id===activeId);
  document.getElementById("tbTitle").innerHTML = activeId==="all"
    ? `All <span style="color:var(--accent)">Guides</span>`
    : `<span style="color:${grp?.color||'var(--accent)'}">${grp?.name||''}</span>`;
  document.getElementById("tbMeta").textContent = `${total} item${total!==1?'s':''} found`;

  document.getElementById("btnRef").classList.toggle("active", mode==="ref");
  document.getElementById("btnProg").classList.toggle("active", mode==="prog");
  document.getElementById("btnTbl").classList.toggle("active", mode==="tbl");

  if (mode === "ref") { rv.style.display = "block"; renderRef(rv, refF); }
  else if (mode === "prog") { pv.style.display = "block"; renderProg(pv, progF); }
  else { tv.style.display = "block"; renderTbl(tv, refF); }
}

function renderRef(el, filtered) {
  if (!filtered.length) { el.innerHTML = `<div class="nores">No codes found for "${srchQ}"</div>`; return; }
  let h = "";
  for (const g of filtered) {
    h += `<div style="margin-bottom:32px">
      <div class="sec-hdr">
        <span class="sec-dot" style="background:${g.color}"></span>
        <div><div class="sec-name">${g.name}</div><div class="sec-sub">${g.items.length} codes</div></div>
      </div>
      <div class="grid">`;
    for (const item of g.items) {
      const uid = g.id+"_"+item.code.replace(/\s+/g,"_");
      const isOpen = openCards.has(uid);
      h += `<div class="card ${isOpen?'open':''}" onclick="toggleCard('${uid}')">
        <div class="card-top">
          <span class="card-code" style="color:${g.color}">${item.code}</span>
          <span class="card-tag" style="background:${g.tBg};color:${g.tC}">${g.name}</span>
        </div>
        <div class="card-desc">${item.desc}</div>
        <div class="card-body">
          <div class="lbl">Syntax example</div>
          <div class="codeblock">${item.syn}</div>
          <div class="lbl">Output</div>
          <div class="outblock">${String(item.out).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}</div>
        </div>
        <div class="card-foot">
          <button class="tog" onclick="event.stopPropagation();toggleCard('${uid}')">
            ${isOpen?'Hide':'Show'} example <span class="arr">▼</span>
          </button>
          <span style="font-size:11px;color:var(--muted)">${isOpen?'collapse':'expand'}</span>
        </div>
      </div>`;
    }
    h += `</div></div>`;
  }
  el.innerHTML = h;
}

function renderProg(el, filtered) {
  if (!filtered.length) { el.innerHTML = `<div class="nores">No programs found for "${srchQ}"</div>`; return; }
  let h = "";
  for (const g of filtered) {
    h += `<div style="margin-bottom:32px">
      <div class="sec-hdr">
        <span class="sec-dot" style="background:${g.color}"></span>
        <div><div class="sec-name">${g.name}</div><div class="sec-sub">${g.items.length} programs</div></div>
      </div>
      <div class="prog-grid">`;
    for (const p of g.items) {
      const uid = g.id+"_"+p.name.replace(/\s+/g,"_");
      const isOpen = openCards.has(uid);
      const diffClass = p.diff==="beg"?"diff-beg":p.diff==="int"?"diff-int":"diff-adv";
      const diffLabel = p.diff==="beg"?"Beginner":p.diff==="int"?"Intermediate":"Advanced";
      const encodedCode = encodeURIComponent(p.code);
      h += `<div class="prog-card ${isOpen?'open':''}">
        <div class="prog-head" data-uid="${escapeHtml(uid)}">
          <div class="prog-top">
            <div class="prog-name">${escapeHtml(p.name)}</div>
            <span class="prog-diff ${diffClass}">${diffLabel}</span>
          </div>
          <div class="prog-desc">${escapeHtml(p.desc)}</div>
          <div class="prog-tags">${p.tags.map(t=>`<span class="prog-tag">${escapeHtml(t)}</span>`).join("")}</div>
        </div>
        <div class="prog-body">
          <div class="prog-what">${escapeHtml(p.what)}</div>
          <button class="copy-btn" id="cpbtn-${uid}" data-uid="${escapeHtml(uid)}" data-code="${escapeHtml(encodedCode)}">Copy</button>
          <div class="lbl">Complete program</div>
          <div class="codeblock">${escapeHtml(p.code)}</div>
          <div class="lbl" style="margin-top:10px">Expected output</div>
          <div class="outblock">${escapeHtml(p.out)}</div>
        </div>
      </div>`;
    }
    h += `</div></div>`;
  }
  el.innerHTML = h;

  el.querySelectorAll('.prog-head').forEach(head => {
    head.addEventListener('click', () => {
      toggleCard(head.dataset.uid);
    });
  });

  el.querySelectorAll('.copy-btn').forEach(btn => {
    btn.addEventListener('click', (event) => {
      event.stopPropagation();
      copyCodeFromBtn(btn, btn.dataset.uid);
    });
  });
}

function renderTbl(el, filtered) {
  if (!filtered.length) { el.innerHTML = `<div class="nores">No codes found for "${srchQ}"</div>`; return; }
  let h = "";
  for (const g of filtered) {
    h += `<div style="margin-bottom:32px">
      <div class="sec-hdr">
        <span class="sec-dot" style="background:${g.color}"></span>
        <div><div class="sec-name">${g.name}</div></div>
      </div>
      <div class="tbl-wrap"><table class="ref">
        <thead><tr><th>Code</th><th>Function</th><th>Output</th></tr></thead>
        <tbody>`;
    for (const item of g.items) {
      h += `<tr>
        <td style="color:${g.color}">${item.code}</td>
        <td style="color:var(--muted)">${item.desc}</td>
        <td style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--green)">${item.out.split('\n')[0]}</td>
      </tr>`;
    }
    h += `</tbody></table></div></div>`;
  }
  el.innerHTML = h;
}

function openSB()  { document.getElementById("sidebar").classList.add("open"); document.getElementById("overlay").classList.add("show"); }
function closeSB() { document.getElementById("sidebar").classList.remove("open"); document.getElementById("overlay").classList.remove("show"); }

buildSB();
render();
</script>
</body>
</html>
